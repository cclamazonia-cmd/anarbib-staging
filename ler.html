<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnarBib – leitor pdf</title>
  <style>
    :root {
      --bg: #120b0c;
      --panel: #1a1113;
      --panel-2: #211517;
      --border: rgba(255,255,255,.12);
      --text: #f6efef;
      --muted: #cab9ba;
      --accent: #d44b57;
      --accent-2: #f0d6d8;
      --ok: #8fd1a7;
      --warn: #f2c572;
      --err: #ff9ba3;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
      --canvas-filter: none;
      --viewer-bg: #0f0a0b;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,75,87,.14), transparent 38%),
        linear-gradient(180deg, #120b0c 0%, #0e090a 100%);
      color: var(--text);
      overflow-y: auto;
    }

    body.fullscreen-mode {
      overflow: hidden;
    }

    .page {
      width: min(1520px, calc(100% - 24px));
      margin: 18px auto 32px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 18px 18px 14px;
      display: grid;
      gap: 12px;
      background: linear-gradient(180deg, rgba(212,75,87,.18), rgba(212,75,87,.06));
      border: 1px solid rgba(212,75,87,.25);
      border-radius: 18px;
    }

    .hero-top {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .title-wrap {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      line-height: 1.15;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--accent-2);
      font-size: .95rem;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: .86rem;
      white-space: nowrap;
    }

    .toolbar {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
      background: rgba(255,255,255,.03);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .toolbar-line {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn,
    .select,
    .input {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      background: #23181a;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      transition: transform .08s ease, border-color .12s ease, background .12s ease;
    }

    .btn {
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover,
    .select:hover,
    .input:hover,
    .select:focus,
    .input:focus {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.25);
      background: #2c1d20;
      outline: none;
    }

    .btn.primary {
      background: #7f202a;
      border-color: rgba(212,75,87,.7);
    }

    .btn.primary:hover {
      background: #972b36;
    }

    .btn.ghost {
      background: transparent;
    }

    .btn[disabled],
    .select[disabled],
    .input[disabled] {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .input.page-input {
      width: 86px;
      text-align: center;
      padding-right: 10px;
      padding-left: 10px;
    }

    .status {
      margin: 0;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--muted);
    }

    .status.ok { color: var(--ok); border-color: rgba(143,209,167,.35); background: rgba(143,209,167,.08); }
    .status.warn { color: var(--warn); border-color: rgba(242,197,114,.35); background: rgba(242,197,114,.08); }
    .status.err { color: var(--err); border-color: rgba(255,155,163,.35); background: rgba(255,155,163,.08); }

    .viewer-shell {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .error-box {
      display: none;
      padding: 14px;
      border: 1px solid rgba(255,155,163,.35);
      background: rgba(255,155,163,.08);
      color: var(--err);
      border-radius: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error-box.show { display: block; }

    .viewer {
      min-height: 70vh;
      max-height: 78vh;
      padding: 16px;
      border-radius: 16px;
      background: var(--viewer-bg);
      border: 1px solid var(--border);
      overflow: auto;
      position: relative;
      overscroll-behavior: contain;
    }

    body.fullscreen-mode .viewer {
      max-height: calc(100vh - 240px);
    }

    .pages {
      display: grid;
      gap: 16px;
      justify-content: center;
    }

    .page-card {
      padding: 12px;
      background: #1b1214;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.28);
      scroll-margin-top: 24px;
    }

    .page-card.current {
      border-color: rgba(212,75,87,.55);
      box-shadow: 0 0 0 1px rgba(212,75,87,.15), 0 10px 24px rgba(0,0,0,.28);
    }

    .page-card canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: white;
      filter: var(--canvas-filter);
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .page-card.hidden-page {
      display: none;
    }

    .page-label {
      margin: 0 0 8px;
      font-size: .84rem;
      color: var(--muted);
    }

    .meta {
      color: var(--muted);
      font-size: .92rem;
    }

    .shortcut-note {
      color: var(--muted);
      font-size: .84rem;
    }

    .hidden { display: none !important; }

    .no-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
    .no-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 999px; }
    .no-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,.03); }

    @media print {
      body * { display: none !important; }
      body::before {
        content: "Impressão desativada neste leitor.";
        display: block !important;
        color: #111;
        padding: 24px;
        font: 16px/1.4 system-ui, sans-serif;
      }
    }

    @media (max-width: 900px) {
      .toolbar-line { justify-content: flex-start; }
      .viewer { max-height: none; min-height: 62vh; }
      body.fullscreen-mode .viewer { max-height: calc(100vh - 260px); }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100%, calc(100% - 12px));
        margin: 8px auto 20px;
      }

      .viewer-shell,
      .toolbar,
      .hero { padding-left: 12px; padding-right: 12px; }

      .viewer { padding: 10px; }
      .page-card { padding: 8px; }
    }
  </style>
</head>
<body>
  <main class="page" id="pageRoot">
    <section class="hero panel">
      <div class="hero-top">
        <div class="title-wrap">
          <h1>Leitor PDF</h1>
          <p class="sub" id="subline">Preparando a leitura…</p>
        </div>
        <div class="chip-row">
          <span class="chip" id="chipRef">Ref. —</span>
          <span class="chip" id="chipPages">Páginas —</span>
          <span class="chip" id="chipMode">Modo contínuo</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div class="toolbar-line">
          <div class="toolbar-group">
            <a class="btn ghost" id="btnBackBook" href="livro.html">Voltar ao livro</a>
            <button class="btn" id="btnReload" type="button">Recarregar</button>
            <a class="btn hidden" id="btnLogin" href="#">Entrar</a>
            <button class="btn" id="btnFullscreen" type="button">Tela cheia</button>
          </div>
          <div class="toolbar-group">
            <button class="btn" id="btnPrev" type="button">← Página</button>
            <input class="input page-input" id="pageInput" type="number" min="1" value="1" />
            <span class="meta" id="pageCount">/ —</span>
            <button class="btn" id="btnNext" type="button">Página →</button>
          </div>
        </div>
        <div class="toolbar-line">
          <div class="toolbar-group">
            <button class="btn" id="btnZoomOut" type="button">− Zoom</button>
            <button class="btn" id="btnZoomIn" type="button">+ Zoom</button>
            <button class="btn" id="btnFitWidth" type="button">Ajustar à largura</button>
            <button class="btn" id="btnMode" type="button">Modo contínuo</button>
          </div>
          <div class="toolbar-group">
            <label class="meta" for="themeSelect">Tema</label>
            <select class="select" id="themeSelect">
              <option value="dark">Escuro</option>
              <option value="light">Claro</option>
              <option value="sepia">Sépia</option>
              <option value="night">Noite</option>
            </select>
          </div>
        </div>
        <div class="shortcut-note">Atalhos: ←/→ mudar página · +/− zoom · F tela cheia.</div>
      </div>

      <div class="viewer-shell">
        <p class="status" id="statusBox">A iniciar…</p>
        <div class="error-box" id="errorBox"></div>
        <div class="viewer no-scrollbar" id="viewer">
          <div class="pages" id="pages"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { supabase } from "./js/blmf-supabase.js";

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmbHdtaWtpeWpmbmlraXBodGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzIyNDUsImV4cCI6MjA4OTQwODI0NX0.kCs7nPg08ofjb9CWwRH9xVN6BjanrAC5pj418line1o";
    const PDFJS_MAIN = "./vendor/pdfjs/build/pdf.mjs";
    const PDFJS_WORKER = "./vendor/pdfjs/build/pdf.worker.mjs";

    const params = new URLSearchParams(location.search);
    const bibRef = (params.get("ref") || "").trim();
    const storageKey = bibRef ? `anarbib:ler:${bibRef}` : "anarbib:ler:default";

    const state = {
      scale: 1.15,
      blobUrl: null,
      pdfDoc: null,
      rendering: false,
      pageElements: [],
      currentPage: 1,
      totalPages: 0,
      mode: "continuous",
      theme: "dark",
      observer: null,
      fitWidth: false,
      fitWidthLocked: false,
    };

    const $ = (id) => document.getElementById(id);

    function setStatus(message, kind = "") {
      const box = $("statusBox");
      box.textContent = message;
      box.className = `status${kind ? ` ${kind}` : ""}`;
    }

    function showError(message, details = "") {
      const box = $("errorBox");
      box.textContent = details ? `${message}\n\n${details}` : message;
      box.classList.add("show");
      setStatus(message, "err");
    }

    function clearError() {
      const box = $("errorBox");
      box.textContent = "";
      box.classList.remove("show");
    }

    function buildLoginUrl() {
      const url = new URL("https://cclamazonia-cmd.github.io/anarbib-conta-staging/cadastro.html");
      url.searchParams.set("next", location.href);
      return url.toString();
    }

    function loadPrefs() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (typeof data.scale === "number") state.scale = Math.min(3, Math.max(.6, data.scale));
        if (typeof data.currentPage === "number") state.currentPage = Math.max(1, Math.floor(data.currentPage));
        if (["continuous", "single"].includes(data.mode)) state.mode = data.mode;
        if (["dark", "light", "sepia", "night"].includes(data.theme)) state.theme = data.theme;
        state.fitWidth = !!data.fitWidth;
      } catch (err) {
        console.warn("BLMF ler v2: prefs ignoradas", err);
      }
    }

    function savePrefs() {
      try {
        localStorage.setItem(storageKey, JSON.stringify({
          scale: state.scale,
          currentPage: state.currentPage,
          mode: state.mode,
          theme: state.theme,
          fitWidth: state.fitWidth,
        }));
      } catch (err) {
        console.warn("BLMF ler v2: prefs não gravadas", err);
      }
    }

    function applyTheme() {
      const root = document.documentElement;
      if (state.theme === "light") {
        root.style.setProperty("--viewer-bg", "#f4eeef");
        root.style.setProperty("--canvas-filter", "none");
      } else if (state.theme === "sepia") {
        root.style.setProperty("--viewer-bg", "#2a211c");
        root.style.setProperty("--canvas-filter", "sepia(.55) saturate(.9) brightness(.98)");
      } else if (state.theme === "night") {
        root.style.setProperty("--viewer-bg", "#050607");
        root.style.setProperty("--canvas-filter", "invert(1) hue-rotate(180deg) contrast(.95) brightness(.9)");
      } else {
        root.style.setProperty("--viewer-bg", "#0f0a0b");
        root.style.setProperty("--canvas-filter", "none");
      }
      $("themeSelect").value = state.theme;
      savePrefs();
    }

    async function ensureSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.access_token) {
        $("btnLogin").classList.remove("hidden");
        $("btnLogin").href = buildLoginUrl();
        throw new Error("Sessão ausente. Entra novamente para abrir esta leitura.");
      }
      return session;
    }

    async function ensureProfile() {
      try {
        const { error } = await supabase.rpc("fn_ensure_current_user_profile");
        if (error) {
          console.warn("BLMF ler v2: erro ao garantir profile", error);
        }
      } catch (err) {
        console.warn("BLMF ler v2: exceção ao garantir profile", err);
      }
    }

    async function loadPdfJs() {
      try {
        const pdfjsLib = await import(PDFJS_MAIN);
        pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
        return pdfjsLib;
      } catch (err) {
        throw new Error(
          `PDF.js não foi encontrado em ./vendor/pdfjs/build/. Confere se os ficheiros pdf.mjs e pdf.worker.mjs foram colocados nesse caminho.\n\n${err?.message || err}`
        );
      }
    }

    function normalizeBlob(data) {
      if (data instanceof Blob) return data;
      if (data instanceof ArrayBuffer) return new Blob([data], { type: "application/pdf" });
      if (data instanceof Uint8Array) return new Blob([data], { type: "application/pdf" });
      if (typeof data === "string") return new Blob([data], { type: "application/pdf" });
      if (data) return new Blob([data], { type: "application/pdf" });
      throw new Error("Resposta vazia ao pedir o PDF.");
    }

    async function downloadPdfBlob(ref) {
      const session = await ensureSession();
      await ensureProfile();

      const invokeAttempt = await supabase.functions.invoke("read-pdf", {
        body: { bib_ref: ref },
      });

      if (!invokeAttempt.error && invokeAttempt.data) {
        return normalizeBlob(invokeAttempt.data);
      }

      const fallbackResponse = await fetch(`${supabase.supabaseUrl}/functions/v1/read-pdf`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`,
          "apikey": SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({ bib_ref: ref }),
      });

      if (!fallbackResponse.ok) {
        const details = await fallbackResponse.text().catch(() => "");
        const invokeMessage = invokeAttempt.error?.message ? `\n\n${invokeAttempt.error.message}` : "";
        throw new Error(`Falha ao pedir o PDF (${fallbackResponse.status}).${invokeMessage}${details ? `\n\n${details}` : ""}`);
      }

      return await fallbackResponse.blob();
    }

    function updatePageUi() {
      $("pageInput").value = String(state.currentPage || 1);
      $("pageCount").textContent = `/ ${state.totalPages || "—"}`;
      $("chipPages").textContent = `Páginas ${state.totalPages || "—"}`;
      state.pageElements.forEach((el, index) => {
        const pageNo = index + 1;
        el.classList.toggle("current", pageNo === state.currentPage);
        if (state.mode === "single") {
          el.classList.toggle("hidden-page", pageNo !== state.currentPage);
        } else {
          el.classList.remove("hidden-page");
        }
      });
      $("chipMode").textContent = state.mode === "single" ? "Modo uma página" : "Modo contínuo";
      $("btnMode").textContent = state.mode === "single" ? "Modo uma página" : "Modo contínuo";
      savePrefs();
    }

    function scrollToCurrentPage(behavior = "smooth") {
      const el = state.pageElements[state.currentPage - 1];
      if (!el) return;
      if (state.mode === "single") {
        $("viewer").scrollTo({ top: 0, behavior });
      } else {
        el.scrollIntoView({ behavior, block: "start" });
      }
    }

    function clampPage(page) {
      return Math.max(1, Math.min(state.totalPages || 1, Math.floor(page || 1)));
    }

    function setCurrentPage(page, behavior = "smooth") {
      state.currentPage = clampPage(page);
      updatePageUi();
      scrollToCurrentPage(behavior);
    }

    function setupObserver() {
      if (state.observer) {
        state.observer.disconnect();
      }
      if (state.mode !== "continuous") return;

      const viewer = $("viewer");
      state.observer = new IntersectionObserver((entries) => {
        let best = null;
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          if (!best || entry.intersectionRatio > best.intersectionRatio) {
            best = entry;
          }
        }
        if (!best) return;
        const pageNo = Number(best.target.dataset.pageNo || "1");
        if (pageNo && pageNo !== state.currentPage) {
          state.currentPage = pageNo;
          updatePageUi();
        }
      }, {
        root: viewer,
        threshold: [0.35, 0.6, 0.85],
      });

      state.pageElements.forEach((el) => state.observer.observe(el));
    }

    function computeFitWidthScale(page) {
      const viewer = $("viewer");
      const horizontalPadding = 32;
      const cardPadding = 24;
      const available = Math.max(260, viewer.clientWidth - horizontalPadding - cardPadding);
      const unscaledViewport = page.getViewport({ scale: 1 });
      return Math.max(.6, Math.min(3, +(available / unscaledViewport.width).toFixed(2)));
    }

    async function renderAllPages(pdfjsLib) {
      if (!state.pdfDoc || state.rendering) return;
      state.rendering = true;
      for (const id of ["btnZoomIn", "btnZoomOut", "btnFitWidth", "btnPrev", "btnNext", "btnMode", "pageInput", "themeSelect"]) {
        $(id).disabled = true;
      }
      const pagesRoot = $("pages");
      pagesRoot.innerHTML = "";
      state.pageElements = [];

      try {
        if (state.fitWidth || state.fitWidthLocked) {
          const firstPage = await state.pdfDoc.getPage(1);
          state.scale = computeFitWidthScale(firstPage);
        }

        for (let num = 1; num <= state.pdfDoc.numPages; num += 1) {
          setStatus(`A renderizar página ${num} de ${state.pdfDoc.numPages}…`, "warn");
          const page = await state.pdfDoc.getPage(num);
          const viewport = page.getViewport({ scale: state.scale });
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d", { alpha: false });
          canvas.width = Math.ceil(viewport.width);
          canvas.height = Math.ceil(viewport.height);
          canvas.setAttribute("aria-hidden", "true");

          const wrap = document.createElement("section");
          wrap.className = "page-card";
          wrap.dataset.pageNo = String(num);
          const label = document.createElement("p");
          label.className = "page-label";
          label.textContent = `Página ${num}`;
          wrap.append(label, canvas);
          pagesRoot.appendChild(wrap);
          state.pageElements.push(wrap);

          await page.render({ canvasContext: ctx, viewport }).promise;
        }

        state.totalPages = state.pdfDoc.numPages;
        state.currentPage = clampPage(state.currentPage);
        updatePageUi();
        setupObserver();
        scrollToCurrentPage("auto");
        setStatus("PDF carregado com sucesso.", "ok");
      } finally {
        state.rendering = false;
        for (const id of ["btnZoomIn", "btnZoomOut", "btnFitWidth", "btnPrev", "btnNext", "btnMode", "pageInput", "themeSelect"]) {
          $(id).disabled = false;
        }
      }
    }

    async function boot() {
      loadPrefs();
      applyTheme();
      document.title = "AnarBib – leitor pdf";
      $("chipRef").textContent = `Ref. ${bibRef || "—"}`;
      $("btnBackBook").href = bibRef ? `livro.html?ref=${encodeURIComponent(bibRef)}` : "livro.html";
      $("btnLogin").href = buildLoginUrl();
      $("subline").textContent = bibRef
        ? `Abrindo ${bibRef}.`
        : "Falta a referência do livro.";

      if (!bibRef) {
        showError("Referência ausente.", "Abre esta página a partir do botão Ler na ficha do livro.");
        return;
      }

      clearError();
      setStatus("A verificar sessão e permissões…", "warn");

      try {
        const pdfjsLib = await loadPdfJs();
        const blob = await downloadPdfBlob(bibRef);

        if (state.blobUrl) {
          URL.revokeObjectURL(state.blobUrl);
        }

        state.blobUrl = URL.createObjectURL(blob);
        setStatus("PDF autorizado. A preparar renderização…", "warn");
        state.pdfDoc = await pdfjsLib.getDocument({
          url: state.blobUrl,
          disableAutoFetch: true,
          disableStream: true,
          isEvalSupported: false,
        }).promise;
        await renderAllPages(pdfjsLib);
      } catch (err) {
        console.error("BLMF ler v2: falha ao abrir leitura", err);
        showError("Leitura indisponível neste momento.", err?.message || String(err));
      }
    }

    async function rerenderKeepingPosition() {
      if (!state.pdfDoc) return;
      const pdfjsLib = await loadPdfJs();
      await renderAllPages(pdfjsLib);
    }

    function toggleFullscreen() {
      const root = $("pageRoot");
      if (!document.fullscreenElement) {
        root.requestFullscreen?.().catch((err) => {
          console.warn("BLMF ler v2: fullscreen recusado", err);
        });
      } else {
        document.exitFullscreen?.().catch(() => {});
      }
    }

    $("btnReload").addEventListener("click", () => location.reload());
    $("btnZoomIn").addEventListener("click", async () => {
      if (!state.pdfDoc) return;
      state.fitWidth = false;
      state.fitWidthLocked = false;
      state.scale = Math.min(3, +(state.scale + 0.15).toFixed(2));
      savePrefs();
      await rerenderKeepingPosition();
    });

    $("btnZoomOut").addEventListener("click", async () => {
      if (!state.pdfDoc) return;
      state.fitWidth = false;
      state.fitWidthLocked = false;
      state.scale = Math.max(0.6, +(state.scale - 0.15).toFixed(2));
      savePrefs();
      await rerenderKeepingPosition();
    });

    $("btnFitWidth").addEventListener("click", async () => {
      if (!state.pdfDoc) return;
      state.fitWidth = true;
      state.fitWidthLocked = true;
      savePrefs();
      await rerenderKeepingPosition();
    });

    $("btnPrev").addEventListener("click", () => setCurrentPage(state.currentPage - 1));
    $("btnNext").addEventListener("click", () => setCurrentPage(state.currentPage + 1));
    $("pageInput").addEventListener("change", () => setCurrentPage(Number($("pageInput").value || 1)));
    $("pageInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        setCurrentPage(Number($("pageInput").value || 1));
      }
    });

    $("btnMode").addEventListener("click", () => {
      state.mode = state.mode === "continuous" ? "single" : "continuous";
      updatePageUi();
      setupObserver();
      scrollToCurrentPage("auto");
    });

    $("themeSelect").addEventListener("change", (event) => {
      state.theme = event.target.value;
      applyTheme();
    });

    $("btnFullscreen").addEventListener("click", toggleFullscreen);

    document.addEventListener("fullscreenchange", () => {
      document.body.classList.toggle("fullscreen-mode", !!document.fullscreenElement);
      $("btnFullscreen").textContent = document.fullscreenElement ? "Sair da tela cheia" : "Tela cheia";
    });

    document.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    document.addEventListener("dragstart", (event) => {
      event.preventDefault();
    });

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      const ctrlOrMeta = event.ctrlKey || event.metaKey;

      if (ctrlOrMeta && ["p", "s", "u"].includes(key)) {
        event.preventDefault();
        event.stopPropagation();
        setStatus("Este atalho não está disponível neste leitor.", "warn");
        return;
      }

      if (key === "printscreen") {
        event.preventDefault();
        setStatus("Este atalho não está disponível neste leitor.", "warn");
        return;
      }

      if (key === "arrowleft") {
        event.preventDefault();
        setCurrentPage(state.currentPage - 1);
      } else if (key === "arrowright") {
        event.preventDefault();
        setCurrentPage(state.currentPage + 1);
      } else if ((key === "+" || key === "=") && !ctrlOrMeta) {
        event.preventDefault();
        $("btnZoomIn").click();
      } else if ((key === "-" || key === "_") && !ctrlOrMeta) {
        event.preventDefault();
        $("btnZoomOut").click();
      } else if (key === "f") {
        event.preventDefault();
        toggleFullscreen();
      }
    });

    $("viewer").addEventListener("scroll", () => {
      if (state.mode !== "continuous") return;
      savePrefs();
    }, { passive: true });

    window.addEventListener("resize", async () => {
      if (!state.pdfDoc || !state.fitWidthLocked) return;
      await rerenderKeepingPosition();
    });

    window.addEventListener("beforeunload", () => {
      savePrefs();
      if (state.blobUrl) {
        URL.revokeObjectURL(state.blobUrl);
      }
    });

    boot();
  </script>
</body>
</html>
