            .from("user_library_memberships")
            .select("library_id,is_primary,status,libraries!left(slug,name)")
            .eq("user_id", session.user.id)
            .in("status", ["ativa", "active"])
            .order("is_primary", { ascending: false })
            .limit(1);

          const membership = Array.isArray(memberships) ? memberships[0] : null;
          const linkedLibrary = membership?.libraries || null;

          membershipScope = {
            libraryId: firstNonEmptyString(membership?.library_id),
            librarySlug: firstNonEmptyString(linkedLibrary?.slug),
            libraryName: firstNonEmptyString(linkedLibrary?.name)
          };
        } catch (_) {}

        const effectiveScope = await enrichLibraryScope(
          mergeLibraryScopes(contextScope, profileScope, membershipScope)
        );

        currentUserContext = {
          isLoggedIn: true,
          userId: String(session.user.id || "").trim(),
          isLibrarian,
          profile,
          libraryId: effectiveScope.libraryId,
          librarySlug: effectiveScope.librarySlug,
          libraryName: effectiveScope.libraryName
        };

        const targetHref = isLibrarian ? ROUTES.PAINEL : ROUTES.CONTA;
        btnConta.textContent = isLibrarian ? "Painel" : "Minha conta";
        btnConta.setAttribute("aria-disabled", "false");
        btnConta.title = isLibrarian ? "Abrir painel" : "Abrir minha conta";
        btnConta.onclick = () => location.assign(targetHref);

        btnEntrar.textContent = "Logout";
        btnEntrar.setAttribute("aria-disabled", "false");
        btnEntrar.classList.remove("disabled");
        btnEntrar.title = "Sair";
        btnEntrar.href = "#";
        btnEntrar.onclick = async (e) => {
          e.preventDefault();
          try {
            await supabase.auth.signOut();
          } catch (err) {
            console.warn("AnarBib livro: falha ao encerrar sessão", err);
          }
          location.assign(location.href);
        };
      } else {
        btnConta.textContent = "Painel / minha conta";
        btnConta.setAttribute("aria-disabled", "true");
        btnConta.title = "Disponível apenas quando logado(a/e).";
        btnConta.onclick = (e) => e.preventDefault();

        btnEntrar.textContent = "Entrar";
        btnEntrar.setAttribute("aria-disabled", "false");
        btnEntrar.classList.remove("disabled");
        btnEntrar.title = "Entrar";
        btnEntrar.href = buildCadastroUrl(location.href);
        btnEntrar.onclick = null;
      }
    }

    async function reserve(bib_ref, bookRow = {}, libraryContext = {}) {
      setStatus("", "");
      const compatBibRef = firstNonEmptyString(bib_ref, bookRow?.bib_ref);
      const consultaAction = isConsultaActionState();

      if (consultaAction && String(publicServiceState?.service_mode || "").trim() === "pausada") {
        setStatus("A biblioteca está pausada no momento.", "warn");
        return;
      }

      if (!consultaAction && publicServiceState?.allow_reservations === false) {
        setStatus("As reservas públicas estão temporariamente fechadas no momento.", "warn");
        return;
      }

      if (currentBookAccessState?.canReserve === false && currentUserContext?.isLoggedIn) {
        setStatus(currentBookAccessState?.label || "Esta ação não está disponível neste contexto.", currentBookAccessState?.cls || "warn");
        return;
      }

      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        if (currentBookAccessState?.allowLoginReserve === false) {
          setStatus(currentBookAccessState?.label || "Esta ação não está disponível neste contexto.", currentBookAccessState?.cls || "warn");
          return;
        }
        setStatus(consultaAction ? "Para marcar consulta, você precisa entrar." : "Para reservar, você precisa entrar.", "warn");
        location.assign(buildCadastroUrl(location.href));
        return;
      }

      if (consultaAction) {
        let consultaError = null;
        try {
          const holdingAttempt = await tryResolveLocalReservaHolding(bookRow, compatBibRef, libraryContext);
          if (!holdingAttempt?.resolved) {
            setStatus("Não foi possível localizar o exemplar desta biblioteca para consulta local.", "warn");
            return;
          }

          const byHoldings = await supabase.rpc("fn_v2_create_consulta_local_by_holdings", {
            p_user_id: session.user.id,
            p_holding_ids: [holdingAttempt.holdingId],
            p_expires_at: null,
            p_notes: "Consulta local criada pela página pública do livro."
          });

          if (!byHoldings.error) {
            if (compatBibRef) currentActiveConsultaBibRefs.add(normalizeBibRefValue(compatBibRef));
            setReserveButtonState({
              key: "consulta_requested",
              label: "Consulta já solicitada",
              cls: "ok",
              canReserve: false,
              allowLoginReserve: false,
              reserveTitle: "Consulta já solicitada",
              actionType: "consulta"
            });
            setStatus("Consulta local registrada.", "ok");
            return;
          }

          consultaError = byHoldings.error;
        } catch (err) {
          consultaError = err;
        }

        if (consultaError && isDuplicateReservaErrorMessage(consultaError.message)) {
          if (compatBibRef) currentActiveConsultaBibRefs.add(normalizeBibRefValue(compatBibRef));
          setReserveButtonState({
            key: "consulta_requested",
            label: "Consulta já solicitada",
            cls: "ok",
            canReserve: false,
            allowLoginReserve: false,
            reserveTitle: "Consulta já solicitada",
            actionType: "consulta"
          });
          setStatus("Esta consulta já está solicitada na sua conta.", "ok");
          return;
        }

        setStatus("Não foi possível marcar consulta: " + String(consultaError?.message || consultaError || "erro desconhecido"), "warn");
        return;
      }

      let reservaError = null;
      try {
        const holdingAttempt = await tryResolveLocalReservaHolding(bookRow, compatBibRef, libraryContext);
        if (holdingAttempt?.resolved) {
          const byHoldings = await supabase.rpc("fn_v2_create_reserva_by_holdings", {
            p_user_id: session.user.id,
            p_holding_ids: [holdingAttempt.holdingId],
            p_expires_at: null,
            p_notes: "Reserva criada pela página pública do livro."
          });

          if (!byHoldings.error) {
            if (compatBibRef) currentActiveReservationBibRefs.add(normalizeBibRefValue(compatBibRef));
            setReserveButtonState({
              key: "already_reserved",
              label: "Já reservado na sua conta",
              cls: "ok",
              canReserve: false,
              allowLoginReserve: false,
              reserveTitle: "Já reservado na sua conta",
              actionType: "reserva"
            });
            setStatus("Reserva registrada.", "ok");
            return;
          }

          if (!isMissingFunctionError(byHoldings.error) && !canFallbackHoldingResolutionError(byHoldings.error)) {
            reservaError = byHoldings.error;
          }
        }
      } catch (err) {
        reservaError = err;
      }

      if (!reservaError) {
        if (!compatBibRef) {
          setStatus("Reserva indisponível sem referência de compatibilidade ou holding local resolvido.", "warn");
          return;
        }

        const byBibRef = await supabase.rpc("fn_v2_create_reserva_by_bib_refs", {
          p_user_id: session.user.id,
          p_bib_refs: [compatBibRef],
          p_expires_at: null,
          p_notes: "Reserva criada pela página pública do livro."
        });

        if (!byBibRef.error) {
          if (compatBibRef) currentActiveReservationBibRefs.add(normalizeBibRefValue(compatBibRef));
          setReserveButtonState({
            key: "already_reserved",
            label: "Já reservado na sua conta",
            cls: "ok",
            canReserve: false,
            allowLoginReserve: false,
            reserveTitle: "Já reservado na sua conta",
            actionType: "reserva"
          });
          setStatus("Reserva registrada.", "ok");
          return;
        }

        reservaError = byBibRef.error;
      }

      if (reservaError && isDuplicateReservaErrorMessage(reservaError.message)) {
        if (compatBibRef) currentActiveReservationBibRefs.add(normalizeBibRefValue(compatBibRef));
        setReserveButtonState({
          key: "already_reserved",
          label: "Já reservado na sua conta",
          cls: "ok",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Já reservado na sua conta",
          actionType: "reserva"
        });
        setStatus("Este livro já está reservado na sua conta.", "ok");
        return;
      }

      setStatus("Não foi possível reservar: " + String(reservaError?.message || reservaError || "erro desconhecido"), "warn");
    }


    async function tryResolveBookViaPublicViewFullScanFallback(refOrId = "", libraryContext = {}, v2Select = "") {
      const rawRef = String(refOrId || "").trim();
      if (!rawRef) return null;

      try {
        const scan = await supabase
          .from("v_book_detail_public_v2")
          .select("id,book_id,bib_ref,holding_libraries_json")
          .limit(8000);

        if (scan.error || !Array.isArray(scan.data) || !scan.data.length) return null;

        const normalizedRef = normalizeBibRefValue(rawRef);
        const matchedPublicRow = scan.data.find((row) => {
          if (normalizeBibRefValue(row?.bib_ref) === normalizedRef) return true;
          const rowId = Number(row?.id || 0);
          const rowBookId = Number(row?.book_id || 0);
          if (/^\d+$/.test(normalizedRef) && (String(rowId) === normalizedRef || String(rowBookId) === normalizedRef)) return true;

          const holdings = parseJsonArray(row?.holding_libraries_json);
          if (!holdings.length) return false;

          const matchingHoldings = holdings.filter((holding) => {
            const holdingRef = normalizeBibRefValue(firstNonEmptyString(holding?.local_bib_ref, holding?.bib_ref));
            return holdingRef === normalizedRef;
          });

          if (!matchingHoldings.length) return false;

          if (libraryContext?.libraryId || libraryContext?.librarySlug || libraryContext?.libraryName) {
            return matchingHoldings.some((holding) => librariesMatch(buildLibraryScopeFromHolding(holding), libraryContext));
          }

          return true;
        }) || null;

        const resolvedBookId = Number(matchedPublicRow?.book_id || matchedPublicRow?.id || 0);
        if (!Number.isFinite(resolvedBookId) || resolvedBookId <= 0) return null;

        const full = await supabase
          .from("v_book_detail_public_v2")
          .select(v2Select)
          .or(`id.eq.${resolvedBookId},book_id.eq.${resolvedBookId}`)
          .limit(50);

        if (full.error || !Array.isArray(full.data) || !full.data.length) return null;

        const chosenFullRow = (() => {
          if (libraryContext?.libraryId || libraryContext?.librarySlug || libraryContext?.libraryName) {
            return full.data.find((row) => findHoldingForLibraryContext(row?.holding_libraries_json, libraryContext)) || full.data[0] || null;
          }
          return full.data[0] || null;
        })();

        if (!chosenFullRow) return null;

        const candidateRow = { ...chosenFullRow };
        const matchedHolding = findHoldingForLibraryContext(candidateRow?.holding_libraries_json, libraryContext);
        if (matchedHolding) {
          if (matchedHolding?.library_id != null) candidateRow.library_id = matchedHolding.library_id;
          if (matchedHolding?.library_slug) candidateRow.library_slug = matchedHolding.library_slug;
          if (matchedHolding?.library_name) {
            candidateRow.library_name = matchedHolding.library_name;
            candidateRow.biblioteca = matchedHolding.library_name;
          }
        }

        return {
          booksTable: "v_book_detail_public_v2",
          data: candidateRow
        };
      } catch (err) {
        console.warn("AnarBib livro: falha no fallback full-scan da vista pública", err);
        return null;
      }
    }

    async function loadBook() {
      let bib_ref = getBibRefFromUrl();
      const requestedBookId = getBookIdFromUrl();
      const libraryContext = await enrichLibraryScope(getLibraryContextFromUrl());

      if (!bib_ref && !requestedBookId) {
        $("title").textContent = "Livro não encontrado";
        $("heroIntro").textContent = "Faltou a referência ou o id na URL (ex.: livro.html?ref=0000124 ou livro.html?id=12).";
        setLine("subtitleLine", "");
        $("authorLine").textContent = "—";
        setCover("");
        document.title = "AnarBib - Livro";
        setStatus("Faltou a referência ou o id na URL (ex.: livro.html?ref=0000124 ou livro.html?id=12).", "warn");
        return;
      }

      let booksTable = null;
      let data = null;
      let keys = [];
      let sample = {};
      const localContextRequested = !!(libraryContext.libraryId || libraryContext.librarySlug);
      const v2Select = [
        "id","book_id","bib_ref","autor","author_display","author_chips","authors_json",
        "titulo","subtitulo","ano","editora","cdd","loanable","available_count","created_at",
        "cover_object_path","edicao","local_publicacao","isbn","issn","idioma","paginas","notas",
        "tipo_material","autores_secundarios","colecao","volume","assuntos","tradutor","organizador",
        "author_id","catalog_source","library_id","library_slug","library_name","biblioteca",
        "has_online_reading","exemplares_total","bibliotecas_count","holding_libraries_json","tombos_json"
      ].join(",");
      const fallbackSelect = [
        "id","bib_ref","autor","titulo","subtitulo","ano","editora","cdd","loanable","available_count",
        "created_at","cover_object_path","edicao","local_publicacao","isbn","issn","idioma","paginas",
        "notas","tipo_material","autores_secundarios","colecao","volume","assuntos","tradutor",
        "organizador","author_id","catalog_source","library_id","library_slug","library_name","biblioteca",
        "has_online_reading","tombo"
      ].join(",");

      if (!requestedBookId && localContextRequested && libraryContext.libraryId && bib_ref) {
        const holdingContextBook = await tryLoadBookByHoldingContext(bib_ref, libraryContext, v2Select, fallbackSelect);
        if (holdingContextBook?.booksTable && holdingContextBook?.data) {
          booksTable = holdingContextBook.booksTable;
          data = holdingContextBook.data;
          sample = data;
          keys = Object.keys(data);
        }
      }

      if (!booksTable) try {
        let v2Query = supabase
          .from("v_book_detail_public_v2")
          .select(v2Select)
          .limit(50);

        if (requestedBookId) {
          v2Query = v2Query.or(`id.eq.${requestedBookId},book_id.eq.${requestedBookId}`);
        } else {
          v2Query = v2Query.eq("bib_ref", bib_ref);
        }

        const v2 = await v2Query;

        if (!v2.error && Array.isArray(v2.data) && v2.data.length) {
          const chosenRow = (() => {
            if (localContextRequested) {
              return v2.data.find((row) => findHoldingForLibraryContext(row?.holding_libraries_json, libraryContext)) || v2.data[0] || null;
            }
            return v2.data[0] || null;
          })();

          if (chosenRow) {
            const candidateRow = { ...chosenRow };
            const matchedHolding = findHoldingForLibraryContext(candidateRow?.holding_libraries_json, libraryContext);
            if (matchedHolding) {
              if (matchedHolding?.library_id != null) candidateRow.library_id = matchedHolding.library_id;
              if (matchedHolding?.library_slug) candidateRow.library_slug = matchedHolding.library_slug;
              if (matchedHolding?.library_name) {
                candidateRow.library_name = matchedHolding.library_name;
                candidateRow.biblioteca = matchedHolding.library_name;
              }
            }
            booksTable = "v_book_detail_public_v2";
            data = candidateRow;
            sample = candidateRow;
            keys = Object.keys(candidateRow);
          }
        }
      } catch (err) {
        console.warn("AnarBib livro: falha ao consultar v_book_detail_public_v2", err);
      }


      if (!booksTable) {
        try {
          const fallbackBooks = await supabase
            .from("books")
            .select("id,bib_ref,autor,titulo,subtitulo,ano,editora,cdd,loanable,available_count,created_at,cover_object_path,edicao,local_publicacao,isbn,issn,idioma,paginas,notas,tipo_material,autores_secundarios,colecao,volume,assuntos,tradutor,organizador,author_id,catalog_source")
            .eq(requestedBookId ? "id" : "bib_ref", requestedBookId || bib_ref)
            .maybeSingle();

          if (!fallbackBooks.error && fallbackBooks.data) {
            booksTable = "books";
            data = fallbackBooks.data;
            sample = data;
            keys = Object.keys(data);
          }
        } catch (err) {
          console.warn("AnarBib livro: falha ao consultar books em fallback", err);
        }
      }

      if (!booksTable && !requestedBookId && bib_ref) {
        try {
          let holdingsByLocalRef = supabase
            .from("book_holdings")
            .select("book_id,library_id,local_bib_ref")
            .eq("local_bib_ref", bib_ref)
            .limit(5);

          if (libraryContext.libraryId) {
            holdingsByLocalRef = holdingsByLocalRef.eq("library_id", libraryContext.libraryId);
          }

          const { data: localHoldingRows, error: localHoldingError } = await holdingsByLocalRef;

          if (!localHoldingError && Array.isArray(localHoldingRows) && localHoldingRows.length) {
            const chosenHoldingRow = (() => {
              if (libraryContext.libraryId) {
                return localHoldingRows.find((row) => String(row?.library_id || "").trim() === String(libraryContext.libraryId || "").trim()) || null;
              }
              return localHoldingRows[0] || null;
            })();

            const localBookId = Number(chosenHoldingRow?.book_id || 0);
            if (Number.isFinite(localBookId) && localBookId > 0) {
              const localV2 = await supabase
                .from("v_book_detail_public_v2")
                .select(v2Select)
                .eq("book_id", localBookId)
                .limit(50);

              if (!localV2.error && Array.isArray(localV2.data) && localV2.data.length) {
                const chosenLocalRow = localV2.data.find((row) => findHoldingForLibraryContext(row?.holding_libraries_json, libraryContext)) || localV2.data[0] || null;
                if (chosenLocalRow) {
                  booksTable = "v_book_detail_public_v2";
                  data = chosenLocalRow;
                  sample = chosenLocalRow;
                  keys = Object.keys(chosenLocalRow);
                }
              }

              if (!booksTable) {
                const localBookFallback = await supabase
                  .from("books")
                  .select("id,bib_ref,autor,titulo,subtitulo,ano,editora,cdd,loanable,available_count,created_at,cover_object_path,edicao,local_publicacao,isbn,issn,idioma,paginas,notas,tipo_material,autores_secundarios,colecao,volume,assuntos,tradutor,organizador,author_id,catalog_source")
                  .eq("id", localBookId)
                  .maybeSingle();

                if (!localBookFallback.error && localBookFallback.data) {
                  booksTable = "books";
                  data = localBookFallback.data;
                  sample = data;
                  keys = Object.keys(data);
                }
              }
            }
          }
        } catch (err) {
          console.warn("AnarBib livro: falha ao resolver local_bib_ref em fallback final", err);
        }
      }


      if (!booksTable && bib_ref) {
        const scannedPublicBook = await tryResolveBookViaPublicViewFullScanFallback(bib_ref || requestedBookId, libraryContext, v2Select);
        if (scannedPublicBook?.booksTable && scannedPublicBook?.data) {
          booksTable = scannedPublicBook.booksTable;
          data = scannedPublicBook.data;
          sample = data;
          keys = Object.keys(data);
        }

      if (!booksTable) {
        $("title").textContent = "Livro não encontrado";
        $("heroIntro").textContent = "Não encontrei esse livro no catálogo público.";
        setLine("subtitleLine", "");
        $("authorLine").textContent = "—";
        setCover("");

        setStatus("Não encontrei esse livro no catálogo.", "warn");

      }

      if (data?.author_id == null || String(data.author_id || '').trim() === '') {
        try {
          const fallbackAuthor = await supabase
            .from("books")
            .select("author_id")
            .eq(data?.id != null ? "id" : "bib_ref", data?.id ?? bib_ref)
            .maybeSingle();
          if (!fallbackAuthor.error && fallbackAuthor.data?.author_id != null) {

      const colRef = findCol(keys, ["bib_ref", "bibref", "ref", "referencia", "referência"]) || "bib_ref";
      const colTit = findCol(keys, ["titulo", "título", "title", "nome"]);

      const colAut = findCol(keys, ["autor_exibicao", "autor_texto_livro", "autor", "author", "autores"]);

      const colTradutor = findCol(keys, ["tradutor", "translator"]);

      const marcJson = colMarcJson ? data[colMarcJson] : null;
      const tradutor = colTradutor ? (data[colTradutor] || "") : "";
      const organizador = colOrganizador ? (data[colOrganizador] || "") : "";
      const autoresSecundarios = colAutoresSec ? (data[colAutoresSec] || "") : "";
      const assuntos = colAssuntos ? (data[colAssuntos] || "") : "";
      const cdd = colCDD ? (data[colCDD] || "") : "";
      const resumo = colRes ? (data[colRes] || "") : "";
      const pdf = colPdf ? (data[colPdf] || "") : "";
      const localLibraryName = colLibraryName ? firstNonEmptyString(data[colLibraryName]) : "";
      if (localContextRequested && localLibraryName) libraryContext.libraryName = localLibraryName;
      if (localContextRequested && !libraryContext.libraryId && colLibraryId && data[colLibraryId] != null) libraryContext.libraryId = String(data[colLibraryId]).trim();
      if (localContextRequested && !libraryContext.librarySlug && colLibrarySlug && data[colLibrarySlug] != null) libraryContext.librarySlug = String(data[colLibrarySlug]).trim();
      let cover = colCover ? (data[colCover] || "") : "";

      if (!cover) {
        const fallback = await supabase
          .from("books")
          .select("cover_object_path")
          .eq("bib_ref", bib_ref)
          .maybeSingle();

        if (!fallback.error && fallback.data?.cover_object_path) {
          cover = fallback.data.cover_object_path;
        }
      }

      if (!String(colecao || "").trim()) {
        const fallbackColecao = await supabase
          .from("books")
          .select("colecao")
          .eq("bib_ref", bib_ref)
          .maybeSingle();

        if (!fallbackColecao.error && fallbackColecao.data?.colecao) {
          colecao = fallbackColecao.data.colecao;
        }
      }

      setCover(cover);

      $("title").textContent = titulo || "Sem título";
      setLine("subtitleLine", subtitulo);
      await renderBookAuthors(autor, data);

      setPill("bibRefPill", "ref", data[colRef] || "", true);
      setPill("heroRefChip", "ref", data[colRef] || "");
      setPill("yearPill", "ano", ano, true);
      setPill("heroYearChip", "ano", ano);
      const materialTypeLabel = getPublicMaterialTypeLabel(tipoMaterial);
      const materialContextSummary = buildMaterialContextSummary({
        tipoMaterial,
        tituloPeriodico,
        volume,
        numero,
        fasciculo,
        dataEdicao,
        periodicidade,
        idioma,
        localPublicacao,
        editora,
        marcJson
      });
      const publicationLabel = (["tract", "cartaz"].includes(normalizeMaterialType(tipoMaterial)))
        ? "edição / difusão"
        : ((["audio", "audiovisual", "recurso_digital"].includes(normalizeMaterialType(tipoMaterial))) ? "produção / difusão" : "editora");
      const locationLabel = (["tract", "cartaz"].includes(normalizeMaterialType(tipoMaterial))) ? "lugar" : "local";
      const volumeLabel = (["periodico", "boletim"].includes(normalizeMaterialType(tipoMaterial))) ? "volume / número" : "volume";
      const volumeValue = (["periodico", "boletim"].includes(normalizeMaterialType(tipoMaterial)))
        ? joinContextParts([
            volume ? `vol. ${volume}` : "",
            numero ? `n. ${numero}` : "",
            fasciculo ? `fasc. ${fasciculo}` : ""
          ])
        : volume;
      const descValue = sanitizePublicResumo(resumo) || materialContextSummary || "—";

      const detailSectionTitle = $("detailSectionTitle");
      if (detailSectionTitle) detailSectionTitle.textContent = getDetailSectionTitle(tipoMaterial);

      setPill("pubPill", publicationLabel, editora, true);
      setPill("heroPubChip", publicationLabel, editora);
      setPill("placePill", locationLabel, localPublicacao);
      setPill("editionPill", "edição", edicao);
      setPill("isbnPill", "ISBN", isbn);
      setPill("issnPill", "ISSN", issn);
      setPill("langPill", "idioma", idioma);
      setPill("pagesPill", "páginas", paginas);
      setPill("typePill", "tipo", materialTypeLabel);
      setPill("collectionPill", "coleção / série", colecao || periodicidade || tituloPeriodico);
      setPill("volumePill", volumeLabel, volumeValue);
      setPill("translatorPill", "tradutor", tradutor);
      setPill("organizerPill", "organizador", organizador);
      setPill("secondaryAuthorsPill", "autores sec.", autoresSecundarios);
      setPill("subjectsPill", "assuntos", assuntos);
      setPill("cddPill", "CDD", cdd, true);

      $("desc").textContent = descValue;

      async function loadTombosForBook(bookRow, bib_ref, libraryContext = {}) {
        const matchedHolding = findHoldingForLibraryContext(bookRow?.holding_libraries_json, libraryContext);
        let tombos = parseJsonArray(matchedHolding?.tombos_json)
          .map(v => String(v || "").trim())
          .filter(Boolean);

        if (!tombos.length) {
          tombos = parseJsonArray(bookRow?.tombos_json)
            .map(v => String(v || "").trim())
            .filter(Boolean);
        }

        const inBook = findCol(Object.keys(bookRow || {}), ["tombo", "rotulo", "rótulo", "etiqueta", "label"]);

        if (!tombos.length && inBook && bookRow?.[inBook] != null) {
          const raw = bookRow[inBook];
          if (Array.isArray(raw)) {
            tombos = raw
              .flatMap(v => String(v || "").split(/[;,\n]+/))
              .map(v => String(v || "").trim())
              .filter(Boolean);
          } else {
            tombos = String(raw || "")
              .split(/[;,\n]+/)
              .map(v => String(v || "").trim())
              .filter(Boolean);
          }
        }

        if (tombos.length) {
          return Array.from(new Set(tombos));
        }

        const candidates = ["v_exemplares_public", "exemplares_public", "v_exemplares", "exemplares"];

        for (const table of candidates) {
          const peekEx = await supabase.from(table).select("*").limit(1);
          if (peekEx.error) continue;

          const exKeys = Object.keys((peekEx.data && peekEx.data[0]) ? peekEx.data[0] : {});
          const exTombo = findCol(exKeys, ["tombo", "rotulo", "rótulo", "etiqueta", "label"]);
          const exBibRef = findCol(exKeys, ["bib_ref", "bibref", "ref", "referencia", "referência"]);
          const exBookId = findCol(exKeys, ["book_id", "livro_id", "id_livro"]);
          const exLibraryId = findCol(exKeys, ["library_id"]);
          const exLibrarySlug = findCol(exKeys, ["library_slug"]);

          if (!exTombo) continue;

          let rows = [];

          if (exBibRef) {
            let byRefQuery = supabase.from(table).select("*").eq(exBibRef, bib_ref);
            if (libraryContext?.libraryId && exLibraryId) byRefQuery = byRefQuery.eq(exLibraryId, libraryContext.libraryId);
            if (libraryContext?.librarySlug && exLibrarySlug) byRefQuery = byRefQuery.eq(exLibrarySlug, libraryContext.librarySlug);
            const byRef = await byRefQuery.limit(100);
            if (!byRef.error && byRef.data?.length) rows = byRef.data;
          }

          if (!rows.length && exBookId && bookRow?.id != null) {
            let byBookIdQuery = supabase.from(table).select("*").eq(exBookId, bookRow.id);
            if (libraryContext?.libraryId && exLibraryId) byBookIdQuery = byBookIdQuery.eq(exLibraryId, libraryContext.libraryId);
            if (libraryContext?.librarySlug && exLibrarySlug) byBookIdQuery = byBookIdQuery.eq(exLibrarySlug, libraryContext.librarySlug);
            const byBookId = await byBookIdQuery.limit(100);
            if (!byBookId.error && byBookId.data?.length) rows = byBookId.data;
          }

          if (rows.length) {
            const vals = rows.map(r => String(r?.[exTombo] || "").trim()).filter(Boolean);
            if (vals.length) return Array.from(new Set(vals));
          }
        }

        return [];
      }

      const tombos = await loadTombosForBook(data, bib_ref, libraryContext);
      const holdingsInfo = summarizeHoldings(data?.holding_libraries_json, libraryContext);
      const exemplaresCount = holdingsInfo.totalCount || tombos.length;
      document.title = `${titulo || "Livro"} - AnarBib`;
      const libraryLine = holdingsInfo.libraryLine || await getLibraryLineForBibRef(bib_ref, data, libraryContext);
      $("heroIntro").textContent = buildHeroIntro({ tipoMaterial, libraryLine, editora, ano, tombosCount: exemplaresCount, contextSummary: materialContextSummary });
      renderHeroHoldingsDetail(holdingsInfo);
      setPill("tomboPill", "tombo", tombos.length ? tombos.join(", ") : "", true);
      setPill("exemplaresPill", "exemplares", exemplaresCount > 1 ? String(exemplaresCount) : "");
      setPill("heroExemplaresChip", "exemplares", exemplaresCount ? String(exemplaresCount) : "");

      const publicDigitalAccess = await resolvePublicDigitalAccess(data, bib_ref, pdf);
      const restrictedDigitalAccess = await resolveRestrictedDigitalAccess(data, bib_ref);
      const directPdfUrl = publicDigitalAccess.previewUrl;
      if (directPdfUrl) {
        $("btnAbrirPdf").style.display = "inline-flex";
        $("btnAbrirPdf").addEventListener("click", () => location.assign(directPdfUrl));
      }

      setDigitalAvailability({
        hasPublicAccess: publicDigitalAccess.hasDigitalAvailability,
        hasRestrictedAccess: restrictedDigitalAccess.hasRestrictedAccess,
        canReadRestrictedNow: restrictedDigitalAccess.canReadRestrictedNow
      });

      const sessionScopedHolding = await resolveSessionScopedHoldingForBibRef(bib_ref, data);
      if (sessionScopedHolding) {
        data = applySessionScopedHoldingToBookRow(data, sessionScopedHolding);
        if (!libraryContext.libraryId && sessionScopedHolding.libraryId) libraryContext.libraryId = sessionScopedHolding.libraryId;
        if (!libraryContext.librarySlug && sessionScopedHolding.librarySlug) libraryContext.librarySlug = sessionScopedHolding.librarySlug;
        if (!libraryContext.libraryName && sessionScopedHolding.libraryName) libraryContext.libraryName = sessionScopedHolding.libraryName;
      }

      await loadReaderScopedServiceChip(data, libraryContext);

      const accessState = computeBookAccessState(data, libraryContext);
      setStatus(accessState.label, accessState.cls);
      setReserveButtonState(accessState);

      $("btnLer").addEventListener("click", async () => {
        const compatBibRef = firstNonEmptyString(bib_ref, data?.bib_ref);
        const targetLerUrl = buildLerUrl(compatBibRef, data, libraryContext, publicDigitalAccess);
        const hasAnyDigitalAccess = publicDigitalAccess.hasDigitalAvailability || restrictedDigitalAccess.hasRestrictedAccess;
        if (!hasAnyDigitalAccess) return;

        if (publicDigitalAccess.assetId || publicDigitalAccess.previewBucket || publicDigitalAccess.previewPath || publicDigitalAccess.previewUrl) {
          location.assign(targetLerUrl);
          return;
        }

        if (!compatBibRef) {
          setStatus("Leitura restrita indisponível sem referência de compatibilidade deste livro.", "warn");
          return;
        }

        try {
          const { data: { session } } = await supabase.auth.getSession();

          if (!session?.user?.id) {
            location.assign(buildCadastroUrl(targetLerUrl));
            return;
          }

          let restrictedRow = restrictedDigitalAccess.row;
          if (!restrictedRow) {
            const { data: readState, error: readStateError } = await supabase.rpc(
              "fn_book_restricted_pdf_state_for_current_user",
              { p_bib_ref: compatBibRef }
            );

            if (readStateError) {
              console.warn("AnarBib livro: erro na RPC de leitura restrita", readStateError);
              setStatus("Não foi possível verificar o acesso ao exemplar digital agora.", "warn");
              return;
            }

            restrictedRow = Array.isArray(readState)
              ? readState[0]
              : (readState && typeof readState === "object" ? readState : null);
          }

          if (restrictedRow?.can_show_read_button) {
            location.assign(targetLerUrl);
            return;
          }

          if (restrictedRow?.has_reading_resource && restrictedRow?.user_account_active === false) {
            setStatus("O exemplar digital existe, mas a leitura está reservada a contas ativas.", "warn");
            return;
          }

          setStatus("O exemplar digital existe, mas a leitura está reservada a contas ativas com acesso autorizado.", "warn");
        } catch (err) {
          console.warn("AnarBib livro: falha ao verificar leitura restrita", err);
          setStatus("Não foi possível verificar o acesso ao exemplar digital agora.", "warn");
        }
      });

      $("btnReservar").addEventListener("click", () => reserve(bib_ref, data, libraryContext));
    }

    await setupContaButton();
    await loadCurrentActiveReservationBibRefs();
    await loadCurrentActiveConsultaBibRefs();
    applyPublicServiceState();
    await loadBook();
  </script>
</body>
</html>
