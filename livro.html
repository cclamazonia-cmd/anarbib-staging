<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnarBib - Livro</title>
  <link rel="icon" type="image/png" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="shortcut icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="apple-touch-icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">

  <style>
    :root{
      --panel:rgba(10,10,10,.90);
      --text:#f4f4f4; --muted:rgba(255,255,255,.78);
      --red:#7a0b14; --red2:#bb1e2c;
      --line:rgba(255,255,255,.12);
      --shadow: 0 16px 38px rgba(0,0,0,.42);
      --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185; --info:#60a5fa;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text);font-family:Inter, Segoe UI, Arial, sans-serif;}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,.62), rgba(0,0,0,.62)),
        url('https://cclamazonia.noblogs.org/files/2026/03/ni-dieu-ni-maitre-une-histoire-de-lanarchisme-episodes-3-et-4-09-15-2022-1024x639-1441403844.png');
      background-size:cover;
      background-position:center center;
      background-attachment:fixed;
      background-repeat:no-repeat;
    }
    a, a:visited{color:inherit;text-decoration:none}
    .wrap{max-width:1680px;margin:0 auto;padding:24px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      height:64px;width:auto;max-width:170px;object-fit:contain;display:block;flex-shrink:0;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))
    }
    .btn{
      border:1px solid var(--line);
      background:rgba(12,12,12,.84);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      cursor:pointer;
      box-shadow: var(--shadow);
      font-weight:900;
      font-size:.95rem;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .btn:disabled{opacity:.58;cursor:default}
    .btn.mini{padding:7px 10px;font-size:.85rem;border-radius:12px}
    .btn.disabled, .btn[aria-disabled="true"]{opacity:.55;cursor:not-allowed;pointer-events:none}
    .card{
      border:1px solid rgba(255,255,255,.10);
      background:var(--panel);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow)
    }
    .hero{
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(135deg, rgba(122,11,20,.92), rgba(50,7,11,.94));
      border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px;
    }
    .hero h1{margin:0 0 6px;font-size:1.5rem}
    .hero p{margin:0;color:rgba(255,255,255,.92)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{
      display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.72);padding:7px 10px;border-radius:999px;font-size:.9rem;color:rgba(255,255,255,.86)
    }
    .hero-holdings-detail{display:none;gap:8px;margin-top:12px;flex-direction:column}
    .hero-holding-line{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
      border:1px solid rgba(255,255,255,.12);background:rgba(10,10,10,.38);
      border-radius:14px;padding:10px 12px;color:rgba(255,255,255,.90)
    }
    .hero-holding-library{color:#fff;font-weight:900}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .section-title{margin:0 0 12px;font-size:1.05rem}
    .mini{font-size:.86rem;color:var(--muted)}
    .subtle{opacity:.92}
    .hidden{display:none !important}
    .title{margin:0 0 6px;font-size:1.45rem}
    .muted{color:var(--muted)}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    @media (max-width:720px){.meta{grid-template-columns:1fr}}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.72);
      padding:7px 10px;border-radius:999px;
      font-size:.9rem;color:var(--muted);
      flex-wrap:wrap;overflow-wrap:anywhere;
    }
    .digital-access{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:14px}
    .digital-access-label{font-size:.92rem;color:var(--muted);font-weight:700}
    .digital-chip{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:6px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14);font-size:.88rem;font-weight:800;line-height:1.2}
    .digital-chip.yes{background:rgba(34,197,94,.18);color:#d8ffe2;border-color:rgba(34,197,94,.35)}
    .digital-chip.no{background:rgba(251,191,36,.18);color:#fff2cc;border-color:rgba(251,191,36,.35)}
    .status{margin-top:10px;font-size:.92rem;min-height:1.2em}
    .status.ok{color:var(--ok)} .status.warn{color:var(--warn)} .status.bad{color:var(--bad)} .status.info{color:var(--info)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .hr{height:1px;background:rgba(255,255,255,.10);margin:14px 0}
    .detail{
      display:grid;
      grid-template-columns: 260px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }
    @media (max-width:820px){.detail{grid-template-columns:1fr}}
    .coverbox{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.02);
      border-radius:18px;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:320px;
    }
    .coverbox.empty{display:none}
    .coverimg{
      width:100%;
      max-width:220px;
      height:auto;
      max-height:340px;
      object-fit:contain;
      display:block;
      border-radius:12px;
      box-shadow:var(--shadow);
    }
    .contentbox{min-width:0}

    .author-inline-wrap { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .author-card-link,
    .author-card-static {
      display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px;
      border:1px solid rgba(140,110,115,.65); background:transparent; text-decoration:none;
      font-weight:600; transition:background .15s ease, border-color .15s ease, transform .15s ease;
    }
    .author-card-link { color:#f4f4f4; }
    .author-card-static { color: var(--muted); cursor:default; }
    .author-card-link:hover { background:rgba(255,255,255,.04); border-color:rgba(170,140,145,.85); transform:translateY(-1px); }
    .author-separator { color: var(--muted); margin:0 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img class="logo"
             src="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png"
             alt="AnarBib" />

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" id="btnCatalogo" href="#" rel="noopener">Voltar ao(s) catálogo(s)</a>
        <button class="btn" id="btnConta" type="button" aria-disabled="true" title="Disponível apenas quando logado(a/e).">Painel / minha conta</button>

    <div class="hero">

    <div class="card">
      <div class="detail">
        <div class="coverbox empty" id="coverBox">
          <img class="coverimg" id="coverImg" alt="Capa do livro" />
        </div>

        <div class="contentbox">
          <h2 class="section-title" id="detailSectionTitle">Detalhes da edição</h2>

          <div class="meta" style="margin-top:12px">
            <div class="pill" id="bibRefPill">ref: —</div>
            <div class="pill" id="tomboPill">tombo: —</div>

            <div class="pill" id="editionPill" style="display:none"></div>
            <div class="pill" id="isbnPill" style="display:none"></div>
            <div class="pill" id="issnPill" style="display:none"></div>
            <div class="pill" id="langPill" style="display:none"></div>
            <div class="pill" id="pagesPill" style="display:none"></div>
            <div class="pill" id="typePill" style="display:none"></div>
            <div class="pill" id="collectionPill" style="display:none"></div>
            <div class="pill" id="volumePill" style="display:none"></div>

            <div class="pill" id="organizerPill" style="display:none"></div>

          <div class="muted" id="serviceMessageLine" style="display:none;margin-top:10px"></div>

          <div class="digital-access">
            <span class="digital-access-label">Exemplar digital disponível:</span>

          <div class="actions">
            <button class="btn primary" id="btnReservar" type="button">Reservar este livro</button>

  <script type="module">
    import { supabase } from "./js/blmf-supabase.js";

    const GH_BASE = location.origin;
    const ROUTES = {
      BLOG_HOME: "https://cclamazonia.noblogs.org/",
      CATALOGO: `${GH_BASE}/anarbib-staging/index.html`,
      CADASTRO: `${GH_BASE}/anarbib-conta-staging/cadastro.html`,
      CONTA: `${GH_BASE}/anarbib-conta-staging/conta.html`,
      PAINEL: `${GH_BASE}/anarbib-conta-staging/painel.html`,
      AUTOR: new URL("autor.html", location.href).toString(),
      AUTHOR_PAGE_VERSION: '20260313-1',
    };

    document.getElementById("btnCatalogo").href = getCatalogReturnUrlFromUrl();

    const $ = (id) => document.getElementById(id);

    function apiFrom(schema, relation) {
      if (typeof supabase?.schema === "function") {
        return supabase.schema(schema).from(relation);
      }
      return supabase.from(`${schema}.${relation}`);
    }

    function firstNonEmptyString(...values) {
      for (const value of values) {
        const txt = String(value ?? "").trim();
        if (txt) return txt;
      }
      return "";
    }

    function extractLibraryScopeCandidate(source = {}) {
      return {
        libraryId: firstNonEmptyString(source?.library_id, source?.biblioteca_id, source?.default_library_id, source?.home_library_id),
        librarySlug: firstNonEmptyString(source?.library_slug, source?.biblioteca_slug, source?.default_library_slug, source?.home_library_slug, source?.slug),
        libraryName: firstNonEmptyString(source?.library_name, source?.biblioteca, source?.biblioteca_nome, source?.default_library_name, source?.home_library_name, source?.name)
      };
    }

    function mergeLibraryScopes(...scopes) {
      return {
        libraryId: firstNonEmptyString(...scopes.map((scope) => scope?.libraryId)),
        librarySlug: firstNonEmptyString(...scopes.map((scope) => scope?.librarySlug)),
        libraryName: firstNonEmptyString(...scopes.map((scope) => scope?.libraryName))
      };
    }

    const sessionScopedHoldingCache = new Map();
async function fetchBookSessionContextForCurrentUser(bookRow = {}, bibRef = "") {
  if (!currentUserContext?.isLoggedIn) return null;

  const compatBibRef = normalizeBibRefValue(firstNonEmptyString(bibRef, bookRow?.bib_ref));
  const bookId = Number(bookRow?.book_id || bookRow?.id || 0) || null;

  if (!compatBibRef && !(bookId > 0)) return null;

  try {
    const rpc = await supabase.rpc("fn_v2_book_session_context_for_current_user", {
      p_book_id: bookId > 0 ? bookId : null,
      p_bib_ref: compatBibRef || null
    });

    if (rpc.error) return null;
    const row = Array.isArray(rpc.data) ? (rpc.data[0] || null) : (rpc.data || null);
    if (!row || typeof row !== "object") return null;
    return row;
  } catch (_) {
    return null;
  }
}


    async function resolveSessionScopedHoldingForBibRef(bibRef = "", bookRow = {}) {
  const compatBibRef = normalizeBibRefValue(firstNonEmptyString(bibRef, bookRow?.bib_ref));
  if (!compatBibRef || !currentUserContext?.isLoggedIn) return null;
  if (sessionScopedHoldingCache.has(compatBibRef)) {
    return sessionScopedHoldingCache.get(compatBibRef);
  }

  let resolved = null;

  const sessionContextRow = await fetchBookSessionContextForCurrentUser(bookRow, compatBibRef);
  if (sessionContextRow) {
    const holdingId = Number(sessionContextRow?.session_holding_id || 0);
    const sessionHasHolding = sessionContextRow?.session_has_holding === true || holdingId > 0;
    resolved = {
      holdingId: holdingId > 0 ? holdingId : null,
      libraryId: firstNonEmptyString(sessionContextRow?.session_library_id, currentUserContext?.libraryId),
      librarySlug: firstNonEmptyString(sessionContextRow?.session_library_slug, currentUserContext?.librarySlug),
      libraryName: firstNonEmptyString(sessionContextRow?.session_library_name, currentUserContext?.libraryName),
      localBibRef: firstNonEmptyString(sessionContextRow?.session_local_bib_ref, compatBibRef),
      availableCount: sessionContextRow?.session_available_count,
      exemplaresTotal: sessionContextRow?.session_exemplares_total,
      loanable: typeof sessionContextRow?.session_loanable === "boolean" ? sessionContextRow.session_loanable : null,
      statusHint: firstNonEmptyString(sessionContextRow?.session_status_hint),
      nextAvailableOn: firstNonEmptyString(sessionContextRow?.session_next_available_on),
      dueAt: firstNonEmptyString(sessionContextRow?.session_due_at, sessionContextRow?.due_at, sessionContextRow?.return_due_at, sessionContextRow?.loan_due_at),
      pickupScheduledFor: firstNonEmptyString(sessionContextRow?.session_pickup_scheduled_for, sessionContextRow?.pickup_scheduled_for, sessionContextRow?.scheduled_for, sessionContextRow?.retirada_agendada_para),
      sessionHasHolding,
      bookId: Number(sessionContextRow?.book_id || bookRow?.book_id || bookRow?.id || 0) || null
    };
  }

  if (!resolved) {
    try {
      const rpc = await supabase.rpc("fn_v2_resolve_catalog_refs_for_current_user", {
        p_refs: [compatBibRef]
      });

      if (!rpc.error && Array.isArray(rpc.data) && rpc.data.length) {
        const row = rpc.data.find((entry) => {
          return normalizeBibRefValue(entry?.input_ref || entry?.ref_trimmed || entry?.bib_ref || entry?.session_local_bib_ref) === compatBibRef;
        }) || rpc.data[0];

        const holdingId = Number(row?.session_holding_id || 0);
        if (row?.matched === true && holdingId > 0) {
          resolved = {
            holdingId,
            libraryId: firstNonEmptyString(row?.library_id, currentUserContext?.libraryId),
            librarySlug: firstNonEmptyString(currentUserContext?.librarySlug),
            libraryName: firstNonEmptyString(currentUserContext?.libraryName),
            localBibRef: firstNonEmptyString(row?.session_local_bib_ref, row?.bib_ref, compatBibRef),
            availableCount: row?.session_available_count,
            exemplaresTotal: null,
            loanable: typeof row?.session_loanable === "boolean" ? row.session_loanable : null,
            statusHint: firstNonEmptyString(row?.session_status_hint),
            nextAvailableOn: "",
            dueAt: firstNonEmptyString(row?.session_due_at, row?.due_at, row?.return_due_at, row?.loan_due_at),
            pickupScheduledFor: firstNonEmptyString(row?.session_pickup_scheduled_for, row?.pickup_scheduled_for, row?.scheduled_for, row?.retirada_agendada_para),
            sessionHasHolding: true,
            bookId: Number(row?.book_id || bookRow?.book_id || bookRow?.id || 0) || null
          };
        }
      }
    } catch (_) {}
  }

  if (resolved?.libraryId && (!resolved.librarySlug || !resolved.libraryName)) {
    try {
      const { data, error } = await supabase
        .from("libraries")
        .select("id,slug,name")
        .eq("id", resolved.libraryId)
        .maybeSingle();

      if (!error && data) {
        resolved.librarySlug = firstNonEmptyString(resolved.librarySlug, data?.slug);
        resolved.libraryName = firstNonEmptyString(resolved.libraryName, data?.name);
      }
    } catch (_) {}
  }

  if (resolved?.holdingId) {
    try {
      const { data, error } = await supabase
        .from("book_holdings")
        .select("id,book_id,library_id,local_bib_ref,available_count,exemplares_total,loanable")
        .eq("id", resolved.holdingId)
        .maybeSingle();

      if (!error && data) {
        resolved.bookId = Number(data?.book_id || resolved.bookId || 0) || null;
        resolved.libraryId = firstNonEmptyString(data?.library_id, resolved.libraryId);
        resolved.localBibRef = firstNonEmptyString(data?.local_bib_ref, resolved.localBibRef, compatBibRef);
        resolved.availableCount = data?.available_count;
        resolved.exemplaresTotal = data?.exemplares_total;
        if (typeof data?.loanable === "boolean") resolved.loanable = data.loanable;
        resolved.sessionHasHolding = true;
      }
    } catch (_) {}
  }

  if (!resolved && currentUserContext?.libraryId) {
    try {
      const { data, error } = await supabase
        .from("book_holdings")
        .select("id,book_id,library_id,local_bib_ref,available_count,exemplares_total,loanable")
        .eq("library_id", currentUserContext.libraryId)
        .eq("local_bib_ref", compatBibRef)
        .limit(2);

      const row = !error && Array.isArray(data) && data.length ? data[0] : null;
      const holdingId = Number(row?.id || 0);
      if (holdingId > 0) {
        resolved = {
          holdingId,
          libraryId: firstNonEmptyString(row?.library_id, currentUserContext?.libraryId),
          librarySlug: firstNonEmptyString(currentUserContext?.librarySlug),
          libraryName: firstNonEmptyString(currentUserContext?.libraryName),
          localBibRef: firstNonEmptyString(row?.local_bib_ref, compatBibRef),
          availableCount: row?.available_count,
          exemplaresTotal: row?.exemplares_total,
          loanable: typeof row?.loanable === "boolean" ? row.loanable : null,
          statusHint: "",
          nextAvailableOn: "",
          dueAt: "",
          pickupScheduledFor: "",
          sessionHasHolding: true,
          bookId: Number(row?.book_id || bookRow?.book_id || bookRow?.id || 0) || null
        };
      }
    } catch (_) {}
  }

  sessionScopedHoldingCache.set(compatBibRef, resolved);
  return resolved;
}

    function applySessionScopedHoldingToBookRow(bookRow = {}, sessionHolding = null) {
      if (!sessionHolding || typeof sessionHolding !== "object") return bookRow;
      const nextRow = { ...bookRow };

      if (Number(sessionHolding?.holdingId || 0) > 0) {
        nextRow.session_holding_id = Number(sessionHolding.holdingId);
      }
      if (sessionHolding?.libraryId) nextRow.session_library_id = sessionHolding.libraryId;
      if (sessionHolding?.librarySlug) nextRow.session_library_slug = sessionHolding.librarySlug;
      if (sessionHolding?.libraryName) nextRow.session_library_name = sessionHolding.libraryName;
      if (sessionHolding?.localBibRef) nextRow.session_local_bib_ref = sessionHolding.localBibRef;
      if (sessionHolding?.availableCount != null) nextRow.session_available_count = sessionHolding.availableCount;
      if (sessionHolding?.exemplaresTotal != null) nextRow.session_exemplares_total = sessionHolding.exemplaresTotal;
      if (typeof sessionHolding?.loanable === "boolean") nextRow.session_loanable = sessionHolding.loanable;
      if (typeof sessionHolding?.sessionHasHolding === "boolean") nextRow.session_has_holding = sessionHolding.sessionHasHolding;
      if (sessionHolding?.statusHint) nextRow.session_status_hint = sessionHolding.statusHint;
      if (sessionHolding?.nextAvailableOn) nextRow.session_next_available_on = sessionHolding.nextAvailableOn;
      if (sessionHolding?.dueAt) nextRow.session_due_at = sessionHolding.dueAt;
      if (sessionHolding?.pickupScheduledFor) nextRow.session_pickup_scheduled_for = sessionHolding.pickupScheduledFor;

      return nextRow;
    }

    async function enrichLibraryScope(scope = {}) {
      const base = {
        libraryId: firstNonEmptyString(scope?.libraryId),
        librarySlug: firstNonEmptyString(scope?.librarySlug),
        libraryName: firstNonEmptyString(scope?.libraryName)
      };

      if (base.libraryId && base.librarySlug && base.libraryName) return base;

      try {
        let query = supabase.from("libraries").select("id,slug,name").limit(1);
        if (base.libraryId) query = query.eq("id", base.libraryId);
        else if (base.librarySlug) query = query.eq("slug", base.librarySlug);
        else return base;

        const { data, error } = await query.maybeSingle();
        if (error || !data) return base;

        return mergeLibraryScopes(base, {
          libraryId: firstNonEmptyString(data?.id),
          librarySlug: firstNonEmptyString(data?.slug),
          libraryName: firstNonEmptyString(data?.name)
        });
      } catch (_) {
        return base;
      }
    }

    function normalizeCoverObjectPath(pathOrUrl) {
      const raw = String(pathOrUrl || "").trim();
      if (!raw) return "";

      let candidate = raw;
      if (/^https?:\/\//i.test(candidate)) {
        try {
          const url = new URL(candidate);
          const marker = "/storage/v1/object/public/covers/";
          const idx = url.pathname.indexOf(marker);
          if (idx >= 0) {
            candidate = url.pathname.slice(idx + marker.length);
          } else {
            return candidate;
          }
        } catch (_) {
          return candidate;
        }
      }

      return candidate
        .replace(/^\/+/, "")
        .replace(/^storage\/v1\/object\/public\/covers\/+?/i, "")
        .replace(/^covers\/+?/i, "");
    }

    function buildExternalBookCoverUrl(pathOrUrl) {
      const clean = normalizeCoverObjectPath(pathOrUrl);
      if (!clean) return "";
      if (/^https?:\/\//i.test(clean)) return clean;

      try {
        const { data } = supabase.storage.from("covers").getPublicUrl(clean);
        return String(data?.publicUrl || "").trim();
      } catch (_) {
        return "";
      }
    }

    function getCatalogReturnUrlFromUrl() {
      try {
        const raw = new URL(location.href).searchParams.get("return_to");
        if (!raw) return ROUTES.CATALOGO;
        const fallback = new URL(ROUTES.CATALOGO, location.origin);
        const candidate = new URL(raw, location.origin);
        const allowedPaths = new Set([
          fallback.pathname,
          '/anarbib-staging/catalogacao.html',
          '/anarbib-conta-staging/catalogacao.html'
        ]);
        if (candidate.origin !== fallback.origin) return ROUTES.CATALOGO;
        if (!allowedPaths.has(candidate.pathname)) return ROUTES.CATALOGO;
        return candidate.toString();
      } catch (_) {
        return ROUTES.CATALOGO;
      }
    }

    function normalizeCount(value) {
      const n = Number(value);
      return Number.isFinite(n) && n > 0 ? n : 0;
    }

    function parseAvailabilityDate(value) {
      if (value == null || value === "") return null;
      if (value instanceof Date) {
        return Number.isNaN(value.getTime()) ? null : value;
      }
      const raw = String(value || "").trim();
      if (!raw) return null;

      let parsed = null;
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
        parsed = new Date(`${raw}T00:00:00Z`);
      } else {
        parsed = new Date(raw);
      }

      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatAvailabilityDate(value) {
      const parsed = parseAvailabilityDate(value);
      if (!parsed) return "";
      return parsed.toLocaleDateString("pt-BR", {
        timeZone: "UTC",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
    }

    function addUtcDays(value, days) {
      const parsed = parseAvailabilityDate(value);
      if (!parsed) return null;
      const next = new Date(Date.UTC(parsed.getUTCFullYear(), parsed.getUTCMonth(), parsed.getUTCDate()));
      next.setUTCDate(next.getUTCDate() + Number(days || 0));
      return Number.isNaN(next.getTime()) ? null : next;
    }

    function collectDirectAvailabilityDateCandidates(source, collector = []) {
      if (!source || typeof source !== "object") return collector;

      const candidateKeys = [
        "session_next_available_on",
        "next_available_at",
        "next_available_on",
        "available_from",
        "available_on",
        "expected_available_at",
        "expected_available_on",
        "estimated_available_at",
        "estimated_available_on",
        "proxima_disponibilidade",
        "proxima_disponibilidade_em",
        "data_disponivel",
        "data_disponibilidade",
        "data_prevista_disponibilidade",
        "return_due_at",
        "due_at",
        "devolucao_prevista",
        "devolucao_prevista_em",
        "expected_return_at",
        "loan_due_at"
      ];

      for (const key of candidateKeys) {
        const parsed = parseAvailabilityDate(source?.[key]);
        if (!parsed) continue;
        collector.push({ key, date: parsed, iso: parsed.toISOString() });
      }

      return collector;
    }

    function collectScheduledLoanAvailabilityDateCandidates(source, collector = []) {
      if (!source || typeof source !== "object") return collector;

      const candidateKeys = [
        "pickup_scheduled_for",
        "scheduled_for",
        "retirada_agendada_para"
      ];

      for (const key of candidateKeys) {
        const parsed = addUtcDays(source?.[key], STANDARD_LOAN_DAYS);
        if (!parsed) continue;
        collector.push({ key, date: parsed, iso: parsed.toISOString() });
      }

      return collector;
    }

    function pickEarliestAvailabilityDate(candidates = []) {
      return (Array.isArray(candidates) ? candidates : [])
        .filter((entry) => entry?.date instanceof Date && !Number.isNaN(entry.date.getTime()))
        .sort((a, b) => a.date.getTime() - b.date.getTime())[0] || null;
    }

    function deriveAvailabilityInfo(bookRow = {}, libraryContext = {}) {
      const candidateSources = [];
      const explicitScope = !!(libraryContext?.libraryId || libraryContext?.librarySlug || libraryContext?.libraryName);
      const sessionHolding = getSessionHoldingForBook(bookRow);
      const scopedHolding = findHoldingForLibraryContext(bookRow?.holding_libraries_json, libraryContext);
      const holdings = parseJsonArray(bookRow?.holding_libraries_json);

      if (sessionHolding) candidateSources.push(sessionHolding);
      if (scopedHolding && scopedHolding !== sessionHolding) candidateSources.push(scopedHolding);
      if (!explicitScope && !scopedHolding && holdings.length) {
        candidateSources.push(...holdings);
      }
      candidateSources.push(bookRow);

      const countKeys = [
        "session_available_count",
        "available_count",
        "available_now_count",
        "disponiveis",
        "disponiveis_agora",
        "copies_available",
        "available_items"
      ];

      const hasAvailableNow = candidateSources.some((source) => {
        return countKeys.some((key) => normalizeCount(source?.[key]) > 0);
      });

      if (hasAvailableNow) {
        return {
          isAvailableNow: true,
          nextDate: null,
          nextDateLabel: ""
        };
      }

      const directDateCandidates = [];
      const scheduledLoanDateCandidates = [];
      candidateSources.forEach((source) => {
        collectDirectAvailabilityDateCandidates(source, directDateCandidates);
        collectScheduledLoanAvailabilityDateCandidates(source, scheduledLoanDateCandidates);
      });

      const earliest = directDateCandidates.length
        ? pickEarliestAvailabilityDate(directDateCandidates)
        : (scheduledLoanDateCandidates.length ? pickEarliestAvailabilityDate(scheduledLoanDateCandidates) : null);

      return {
        isAvailableNow: false,
        nextDate: earliest?.date || null,
        nextDateLabel: earliest ? formatAvailabilityDate(earliest.date) : ""
      };
    }

    function getSessionHoldingForBook(bookRow = {}) {
      const sessionScope = {
        libraryId: currentUserContext?.libraryId,
        librarySlug: currentUserContext?.librarySlug,
        libraryName: currentUserContext?.libraryName
      };

      const resolvedSessionScope = {
        libraryId: firstNonEmptyString(bookRow?.session_library_id),
        librarySlug: firstNonEmptyString(bookRow?.session_library_slug),
        libraryName: firstNonEmptyString(bookRow?.session_library_name)
      };
      const resolvedSessionHoldingId = Number(bookRow?.session_holding_id || 0);
      const resolvedSessionHasHolding = bookRow?.session_has_holding === true || resolvedSessionHoldingId > 0;

      if (resolvedSessionHasHolding) {
        return {
          holding_id: resolvedSessionHoldingId > 0 ? resolvedSessionHoldingId : null,
          id: resolvedSessionHoldingId > 0 ? resolvedSessionHoldingId : null,
          library_id: firstNonEmptyString(resolvedSessionScope.libraryId, sessionScope.libraryId),
          library_slug: firstNonEmptyString(resolvedSessionScope.librarySlug, sessionScope.librarySlug),
          library_name: firstNonEmptyString(resolvedSessionScope.libraryName, sessionScope.libraryName),
          local_bib_ref: firstNonEmptyString(bookRow?.session_local_bib_ref, bookRow?.bib_ref),
          session_exemplares_total: bookRow?.session_exemplares_total,
          session_available_count: bookRow?.session_available_count,
          available_count: bookRow?.session_available_count ?? bookRow?.available_count,
          next_available_on: firstNonEmptyString(bookRow?.session_next_available_on),
          due_at: firstNonEmptyString(bookRow?.session_due_at, bookRow?.due_at, bookRow?.return_due_at, bookRow?.loan_due_at, bookRow?.devolucao_prevista),
          pickup_scheduled_for: firstNonEmptyString(bookRow?.session_pickup_scheduled_for, bookRow?.pickup_scheduled_for, bookRow?.scheduled_for, bookRow?.retirada_agendada_para),
          loanable: typeof bookRow?.session_loanable === "boolean" ? bookRow.session_loanable : bookRow?.loanable
        };
      }

      if (bookRow?.session_has_holding === false || String(bookRow?.session_status_hint || "").trim() === "indisponivel_para_voce") {
        return null;
      }

      if (!(sessionScope.libraryId || sessionScope.librarySlug || sessionScope.libraryName)) {
        return null;
      }

      const matchedHolding = findHoldingForLibraryContext(bookRow?.holding_libraries_json, sessionScope);
      if (matchedHolding) {
        return matchedHolding;
      }

      const directScope = {
        libraryId: firstNonEmptyString(bookRow?.library_id),
        librarySlug: firstNonEmptyString(bookRow?.library_slug),
        libraryName: firstNonEmptyString(bookRow?.library_name, bookRow?.biblioteca)
      };

      if (librariesMatch(sessionScope, directScope)) {
        return {
          library_id: directScope.libraryId,
          library_slug: directScope.librarySlug,
          library_name: directScope.libraryName,
          exemplares_total: bookRow?.exemplares_total,
          session_exemplares_total: bookRow?.session_exemplares_total ?? bookRow?.exemplares_total,
          session_available_count: bookRow?.session_available_count,
          available_count: bookRow?.session_available_count ?? bookRow?.available_count,
          due_at: firstNonEmptyString(bookRow?.session_due_at, bookRow?.due_at, bookRow?.return_due_at, bookRow?.loan_due_at, bookRow?.devolucao_prevista),
          pickup_scheduled_for: firstNonEmptyString(bookRow?.session_pickup_scheduled_for, bookRow?.pickup_scheduled_for, bookRow?.scheduled_for, bookRow?.retirada_agendada_para),
          loanable: typeof bookRow?.session_loanable === "boolean" ? bookRow.session_loanable : bookRow?.loanable
        };
      }

      return null;
    }

    function computeBookAccessState(bookRow = {}, libraryContext = {}) {
      const loanable = bookRow?.loanable !== false;
      const compatBibRef = firstNonEmptyString(bookRow?.bib_ref);
      const availabilityInfo = deriveAvailabilityInfo(bookRow, libraryContext);
      const availableNowLabel = "Disponível agora";
      const availableLaterLabel = availabilityInfo?.nextDateLabel ? `Disponível dia ${availabilityInfo.nextDateLabel}` : "Indisponível no momento";
      const consultaAvailableLabel = "Disponível para consulta";
      const serviceMode = String(publicServiceState?.service_mode || "").trim();
      const consultaPaused = serviceMode === "pausada";

      const sessionHolding = getSessionHoldingForBook(bookRow);
      const hasSessionHolding = !!sessionHolding;

      if (!loanable) {
        if (!currentUserContext?.isLoggedIn) {
          return {
            key: consultaPaused ? "consulta_paused_public" : "consulta_local_public",
            label: consultaPaused ? "Consulta indisponível no momento" : consultaAvailableLabel,
            cls: consultaPaused ? "warn" : "info",
            canReserve: !consultaPaused,
            allowLoginReserve: true,
            reserveTitle: "Marcar consulta",
            actionType: "consulta"
          };
        }

        if (!hasSessionHolding) {
          return {
            key: "not_for_you",
            label: "Indisponível para sua biblioteca",
            cls: "warn",
            canReserve: false,
            allowLoginReserve: false,
            reserveTitle: "Indisponível para sua biblioteca",
            actionType: "consulta"
          };
        }

        const explicitContextActive = !!(libraryContext?.libraryId || libraryContext?.librarySlug || libraryContext?.libraryName);
        const sessionScope = {
          libraryId: currentUserContext?.libraryId,
          librarySlug: currentUserContext?.librarySlug,
          libraryName: currentUserContext?.libraryName
        };
        const contextMatchesSession = !explicitContextActive || librariesMatch(libraryContext, sessionScope);

        if (!contextMatchesSession) {
          return {
            key: "other_library_consulta",
            label: "Mude para sua biblioteca para consultar",
            cls: "warn",
            canReserve: false,
            allowLoginReserve: false,
            reserveTitle: "Mude para sua biblioteca para consultar",
            actionType: "consulta"
          };
        }

        if (hasActiveConsultaForBibRef(compatBibRef)) {
          return {
            key: "consulta_requested",
            label: "Consulta já solicitada",
            cls: "ok",
            canReserve: false,
            allowLoginReserve: false,
            reserveTitle: "Consulta já solicitada",
            actionType: "consulta"
          };
        }

        if (consultaPaused) {
          return {
            key: "consulta_paused",
            label: "Consulta indisponível no momento",
            cls: "warn",
            canReserve: false,
            allowLoginReserve: false,
            reserveTitle: "Marcar consulta",
            actionType: "consulta"
          };
        }

        return {
          key: "consulta_local",
          label: consultaAvailableLabel,
          cls: "info",
          canReserve: true,
          allowLoginReserve: true,
          reserveTitle: "Marcar consulta",
          actionType: "consulta"
        };
      }

      if (!currentUserContext?.isLoggedIn) {
        return {
          key: availabilityInfo?.isAvailableNow ? "available_public" : (availabilityInfo?.nextDateLabel ? "available_later_public" : "check"),
          label: availabilityInfo?.isAvailableNow ? availableNowLabel : (availabilityInfo?.nextDateLabel ? availableLaterLabel : "Disponibilidade a verificar"),
          cls: availabilityInfo?.isAvailableNow ? "ok" : "warn",
          canReserve: true,
          allowLoginReserve: true,
          reserveTitle: "Entre para reservar",
          actionType: "reserva"
        };
      }

      if (hasActiveReservationForBibRef(compatBibRef)) {
        return {
          key: "already_reserved",
          label: "Já reservado na sua conta",
          cls: "ok",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Já reservado na sua conta",
          actionType: "reserva"
        };
      }

      if (!hasSessionHolding) {
        return {
          key: "not_for_you",
          label: availabilityInfo?.isAvailableNow ? availableNowLabel : availableLaterLabel,
          cls: availabilityInfo?.isAvailableNow ? "ok" : "warn",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Indisponível para sua biblioteca",
          actionType: "reserva"
        };
      }

      const explicitContextActive = !!(libraryContext?.libraryId || libraryContext?.librarySlug || libraryContext?.libraryName);
      const sessionScope = {
        libraryId: currentUserContext?.libraryId,
        librarySlug: currentUserContext?.librarySlug,
        libraryName: currentUserContext?.libraryName
      };
      const contextMatchesSession = !explicitContextActive || librariesMatch(libraryContext, sessionScope);

      if (!contextMatchesSession) {
        return {
          key: "other_library",
          label: availabilityInfo?.isAvailableNow ? availableNowLabel : availableLaterLabel,
          cls: availabilityInfo?.isAvailableNow ? "ok" : "warn",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Mude para sua biblioteca para reservar",
          actionType: "reserva"
        };
      }

      const sessionAvailableNow = normalizeCount(
        sessionHolding?.session_available_count ?? sessionHolding?.available_count ?? bookRow?.session_available_count ?? bookRow?.available_count ?? 0
      );

      if (sessionAvailableNow > 0 || availabilityInfo?.isAvailableNow) {
        return {
          key: "available",
          label: availableNowLabel,
          cls: "ok",
          canReserve: true,
          allowLoginReserve: true,
          reserveTitle: "Reservar este livro",
          actionType: "reserva"
        };
      }

      return {
        key: "unavailable_now",
        label: availableLaterLabel,
        cls: "warn",
        canReserve: false,
        allowLoginReserve: false,
        reserveTitle: availabilityInfo?.nextDateLabel ? `Disponível dia ${availabilityInfo.nextDateLabel}` : "Indisponível no momento",
        actionType: "reserva"
      };
    }

    async function resolveRestrictedDigitalAccess(bookRow = {}, bibRef = "") {
      const access = {
        hasRestrictedAccess: false,
        canReadRestrictedNow: false,
        userAccountActive: false,
        row: null
      };

      const rowFlag = bookRow?.has_online_reading === true || String(bookRow?.has_online_reading || "").trim().toLowerCase() === "true";
      access.hasRestrictedAccess = rowFlag;

      if (!currentUserContext?.isLoggedIn) {
        return access;
      }

      const compatBibRef = firstNonEmptyString(bibRef, bookRow?.bib_ref);
      if (!compatBibRef) {
        return access;
      }

      try {
        const { error: ensureProfileError } = await supabase.rpc("fn_ensure_current_user_profile");
        if (ensureProfileError) {
          console.warn("AnarBib livro: erro ao garantir profile antes da verificação da leitura restrita", ensureProfileError);
        }
      } catch (ensureProfileException) {
        console.warn("AnarBib livro: exceção ao garantir profile antes da verificação da leitura restrita", ensureProfileException);
      }

      try {
        const { data: readState, error: readStateError } = await supabase.rpc(
          "fn_book_restricted_pdf_state_for_current_user",
          { p_bib_ref: compatBibRef }
        );

        if (readStateError) {
          console.warn("AnarBib livro: erro na RPC de leitura restrita", readStateError);
          return access;
        }

        const row = Array.isArray(readState)
          ? readState[0]
          : (readState && typeof readState === "object" ? readState : null);

        access.row = row || null;
        access.hasRestrictedAccess = access.hasRestrictedAccess || !!row?.has_reading_resource;
        access.canReadRestrictedNow = !!row?.can_show_read_button;
        access.userAccountActive = !!row?.user_account_active;
      } catch (err) {
        console.warn("AnarBib livro: falha ao verificar leitura restrita", err);
      }

      return access;
    }

    function extractHoldingLibraryNames(raw) {
      const rows = Array.isArray(raw)
        ? raw
        : (typeof raw === "string" && raw.trim()
            ? (() => {
                try { return JSON.parse(raw); } catch (_) { return []; }
              })()
            : []);

      const names = [];
      for (const row of rows) {
        const label = firstNonEmptyString(row?.library_name, row?.biblioteca, row?.name)
          .split(" - ")[0]
          .trim();
        if (label && !names.includes(label)) names.push(label);
      }
      return names;
    }

    function parseJsonArray(raw) {
      if (Array.isArray(raw)) return raw;
      if (typeof raw === "string" && raw.trim()) {
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
          return [];
        }
      }
      return [];
    }

    function normalizeLoose(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function extractProfileLibraryScope(profile) {
      return {
        libraryId: firstNonEmptyString(profile?.library_id, profile?.biblioteca_id, profile?.default_library_id, profile?.home_library_id),
        librarySlug: firstNonEmptyString(profile?.library_slug, profile?.biblioteca_slug, profile?.default_library_slug, profile?.home_library_slug),
        libraryName: firstNonEmptyString(profile?.library_name, profile?.biblioteca, profile?.biblioteca_nome, profile?.default_library_name, profile?.home_library_name)
      };
    }

    function librariesMatch(a = {}, b = {}) {
      const aId = String(a.libraryId || "").trim();
      const bId = String(b.libraryId || "").trim();
      if (aId && bId) return aId === bId;

      const aSlug = normalizeLoose(a.librarySlug);
      const bSlug = normalizeLoose(b.librarySlug);

      const ctxName = normalizeLoose(firstNonEmptyString(libraryContext?.libraryName).split(" - ")[0]);

        const matchById = holdings.find((row) => String(row?.library_id || "").trim() === ctxId);

      if (ctxSlug) {
        const matchBySlug = holdings.find((row) => normalizeLoose(row?.library_slug) === ctxSlug);
        if (matchBySlug) return matchBySlug;
      }
      if (ctxName) {
        const matchByName = holdings.find((row) => normalizeLoose(firstNonEmptyString(row?.library_name).split(" - ")[0]) === ctxName);

    function parsePublicStorageLocation(rawValue) {
      const raw = firstNonEmptyString(rawValue);
      if (!raw) return null;
      try {
        const url = new URL(raw, location.href);
        const marker = "/storage/v1/object/public/";
        const idx = url.pathname.indexOf(marker);
        if (idx >= 0) {
          const rest = url.pathname.slice(idx + marker.length);
          const slash = rest.indexOf("/");
          if (slash > 0) {
            const bucket = decodeURIComponent(rest.slice(0, slash));
            const path = decodeURIComponent(rest.slice(slash + 1));
            if (bucket && path) return { bucket, path };
          }
        }
      } catch (_) {}
      return null;
    }

    function buildPublicStorageUrl(bucket, path) {
      const bucketName = String(bucket || "").trim();
      const objectPath = String(path || "").trim().replace(/^\/+/, "");
      if (!bucketName || !objectPath) return "";
      try {
        const { data } = supabase.storage.from(bucketName).getPublicUrl(objectPath);
        return String(data?.publicUrl || "").trim();
      } catch (_) {
        return "";
      }
    }

      };

      if (publishedBookId > 0) {
        try {
          const { data, error } = await supabase.rpc("get_book_primary_public_digital_asset", { p_book_id: publishedBookId });
          if (!error) {
            const row = Array.isArray(data) ? data[0] : data;
            if (row?.asset_id) {
              access.assetId = String(row.asset_id);
              if (row?.storage_bucket && row?.storage_path) {
                access.previewBucket = String(row.storage_bucket).trim();
                access.previewPath = String(row.storage_path).trim();
                access.previewUrl = buildPublicStorageUrl(access.previewBucket, access.previewPath);
              }
              access.hasDigitalAvailability = true;
              return access;
            }
            if (row?.storage_bucket && row?.storage_path) {
              access.previewBucket = String(row.storage_bucket).trim();
              access.previewPath = String(row.storage_path).trim();
              access.previewUrl = buildPublicStorageUrl(access.previewBucket, access.previewPath);
              access.hasDigitalAvailability = !!(access.previewBucket && access.previewPath);
              if (access.hasDigitalAvailability) return access;
            }
          }
        } catch (err) {
          console.warn("AnarBib livro: falha ao resolver asset público principal", err);
        }
      }

      const parsedLocation = parsePublicStorageLocation(pdfValue);
      if (parsedLocation) {
        access.previewBucket = parsedLocation.bucket;
        access.previewPath = parsedLocation.path;
        access.previewUrl = buildPublicStorageUrl(access.previewBucket, access.previewPath) || String(pdfValue || "").trim();
        access.hasDigitalAvailability = true;
        return access;
      }

      if (/^https?:\/\//i.test(String(pdfValue || "").trim())) {
        access.previewUrl = String(pdfValue || "").trim();
        access.hasDigitalAvailability = true;
        return access;
      }

      return access;
    }

        viewerUrl.searchParams.set("book_id", String(publishedBookId));
      }
      if (compatBibRef) viewerUrl.searchParams.set("ref", compatBibRef);
      const bookTitle = firstNonEmptyString(bookRow?.titulo, bookRow?.title, bookRow?.nome);
      const bookSubtitle = firstNonEmptyString(bookRow?.subtitulo, bookRow?.subtitle);
      if (bookTitle) viewerUrl.searchParams.set("title", bookTitle);
      if (bookSubtitle) viewerUrl.searchParams.set("subtitle", bookSubtitle);
      const libraryId = firstNonEmptyString(libraryContext?.libraryId, bookRow?.library_id);
      const librarySlug = firstNonEmptyString(libraryContext?.librarySlug, bookRow?.library_slug);
      const libraryName = firstNonEmptyString(libraryContext?.libraryName, bookRow?.library_name, bookRow?.biblioteca);
      if (libraryId) viewerUrl.searchParams.set("library_id", libraryId);
      if (librarySlug) viewerUrl.searchParams.set("library_slug", librarySlug);
      if (libraryName) viewerUrl.searchParams.set("library_name", libraryName);
      viewerUrl.searchParams.set("return_to", getCatalogReturnUrlFromUrl());
      viewerUrl.searchParams.set("book_return_to", location.href);
      if (digitalAccess?.assetId) {
        viewerUrl.searchParams.set("asset_id", String(digitalAccess.assetId));
      } else if (digitalAccess?.previewBucket && digitalAccess?.previewPath) {
        viewerUrl.searchParams.set("public_bucket", String(digitalAccess.previewBucket));
        viewerUrl.searchParams.set("public_path", String(digitalAccess.previewPath));
      } else if (digitalAccess?.previewUrl) {
        viewerUrl.searchParams.set("public_url", String(digitalAccess.previewUrl));

        .split("\n")

          if (!norm) return true;
          return !(/^(catalog_source|origem do import|import btl|importado da btl)\b/.test(norm)

    function formatExemplarCount(count) {
      const n = Number(count || 0);
      if (!Number.isFinite(n) || n <= 0) return "";
      return n === 1 ? "1 exemplar identificado" : `${n} exemplares identificados`;
    }

    function summarizeHoldings(rawHoldings, libraryContext = {}) {
      const holdings = parseJsonArray(rawHoldings);
      if (!holdings.length) {
        return { lines: [], totalCount: 0, libraryLine: "" };
      }

      let scoped = holdings;
      if (libraryContext?.libraryId || libraryContext?.librarySlug || libraryContext?.libraryName) {
        const matched = findHoldingForLibraryContext(holdings, libraryContext);
        if (matched) scoped = [matched];
      }

      const grouped = new Map();
      for (const row of scoped) {
        const libraryName = firstNonEmptyString(row?.library_name, row?.biblioteca, row?.name)
          .split(" - ")[0]
          .trim();
        if (!libraryName) continue;

        const rowTombos = parseJsonArray(row?.tombos_json)
          .map(v => String(v || "").trim())
          .filter(Boolean);
        const countCandidates = [row?.exemplares_total, row?.holdings_count, row?.copies_count, row?.items_count, row?.count]
          .map(v => Number(v))
          .filter(v => Number.isFinite(v) && v > 0);
        const count = countCandidates.length ? countCandidates[0] : rowTombos.length;
        const previous = grouped.get(libraryName) || { libraryName, count: 0 };
        previous.count += count;
        grouped.set(libraryName, previous);
      }

      const lines = [...grouped.values()].map(entry => ({
        libraryName: entry.libraryName,
        count: entry.count,
        label: formatExemplarCount(entry.count)
      }));

      return {
        lines,
        totalCount: lines.reduce((sum, entry) => sum + (Number(entry.count) || 0), 0),
        libraryLine: lines.map(entry => entry.libraryName).join(" / ")
      };
    }

    function parseJsonObject(raw) {
      if (raw && typeof raw === "object" && !Array.isArray(raw)) return raw;
      if (typeof raw === "string" && raw.trim()) {
        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch (_) {
          return {};
        }
      }
      return {};
    }

    function normalizeMaterialType(value) {

    function getPublicMaterialTypeLabel(value) {
      const key = normalizeMaterialType(value);
      return PUBLIC_MATERIAL_TYPE_LABELS[key] || (key ? key.replace(/_/g, " ") : "Livro");
    }

    function getMaterialDetailBridge(marcJson) {
      const marc = parseJsonObject(marcJson);
      const detail = marc?.anarbib_material_detail;
      return detail && typeof detail === "object" && !Array.isArray(detail) ? detail : {};
    }

    function joinContextParts(parts = []) {
      return parts.map((part) => String(part || "").trim()).filter(Boolean).join(" · " );
    }

    function buildMaterialContextSummary({ tipoMaterial, tituloPeriodico, volume, numero, fasciculo, dataEdicao, periodicidade, idioma, localPublicacao, editora, marcJson }) {
      const typeKey = normalizeMaterialType(tipoMaterial);
      const detail = getMaterialDetailBridge(marcJson);

      if (typeKey === "periodico" || typeKey === "boletim") {
        return joinContextParts([
          tituloPeriodico,
          volume ? `vol. ${volume}` : "",
          numero ? `n. ${numero}` : "",
          fasciculo ? `fasc. ${fasciculo}` : "",
          dataEdicao,
          periodicidade
        ]);
      }

      if (typeKey === "tract" || typeKey === "cartaz") {
        return joinContextParts([
          detail?.emitter_org,
          detail?.tract_campaign,
          detail?.diffusion_place || localPublicacao,
          detail?.approximate_date
        ]);
      }

      if (typeKey === "audio") {
        return joinContextParts([
          detail?.audio_duration,
          detail?.audio_support,
          detail?.audio_language || idioma,
          detail?.audio_recording_type
        ]);
      }

      if (typeKey === "audiovisual") {
        return joinContextParts([
          detail?.audiovisual_duration,
          detail?.audiovisual_support,
          detail?.audiovisual_language || idioma,
          detail?.audiovisual_director
        ]);
      }

      if (typeKey === "recurso_digital") {
        return joinContextParts([
          detail?.digital_native_access,
          detail?.digital_native_restriction,
          detail?.digital_native_file_note,
          editora
        ]);
      }

      if (typeKey === "dossie") {
        return joinContextParts([
          detail?.dossier_scope,
          detail?.dossier_period,
          detail?.dossier_organizations,
          detail?.dossier_context
        ]);
      }

      return joinContextParts([editora, localPublicacao, idioma]);
    }

    function getDetailSectionTitle(tipoMaterial) {
      const typeKey = normalizeMaterialType(tipoMaterial);
      if (typeKey === "periodico" || typeKey === "boletim") return "Detalhes da publicação";
      if (typeKey === "tract" || typeKey === "cartaz") return "Detalhes do documento";
      if (typeKey === "audio" || typeKey === "audiovisual" || typeKey === "recurso_digital") return "Detalhes do suporte";
      if (typeKey === "dossie") return "Detalhes do dossiê";
      return "Detalhes da edição";
    }

    function buildHeroIntro({ tipoMaterial, libraryLine, editora, ano, tombosCount, contextSummary }) {
      const parts = [];
      const tipo = getPublicMaterialTypeLabel(tipoMaterial);
      const libraries = String(libraryLine || "").trim();
      const context = String(contextSummary || "").trim();
      const year = String(ano || "").trim();

      if (tipo) parts.push(tipo);
      if (libraries) parts.push(libraries);
      else if (context) parts.push(context);
      if (libraries && context) parts.push(context);
      if (year) parts.push(year);

      const countLabel = formatExemplarCount(tombosCount);
      if (countLabel) parts.push(countLabel);

      return parts.join(" · ") || "Documento publicado no catálogo AnarBib.";

        btnReservar.setAttribute("aria-disabled", "true");

    function normalizeAuthorName(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function splitAuthorDisplay(raw) {
      const txt = String(raw || "").trim();
      if (!txt) return [];
      return txt.split(/\s*;\s*/).map(v => String(v || "").trim()).filter(Boolean);
    }

    function buildAuthorVariants(name) {
      const out = new Set();
      const clean = String(name || "").trim();
      const base = normalizeAuthorName(clean);
      if (base) out.add(base);
      if (clean.includes(",")) {
        const bits = clean.split(",").map(v => v.trim()).filter(Boolean);
        if (bits.length >= 2) {
          const swapped = normalizeAuthorName(bits.slice(1).join(" ") + " " + bits[0]);
          if (swapped) out.add(swapped);
        }
      }
      return Array.from(out);
    }

    function authorUrl(authorId) {
      const params = new URLSearchParams();
      params.set("v", ROUTES.AUTHOR_PAGE_VERSION);
      params.set("_cb", `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`);
      if (authorId != null && String(authorId).trim()) {
        const id = String(authorId).trim();
        params.set("id", id);
        params.set("author_id", id);
      }
      const libraryContext = getLibraryContextFromUrl();
      if (libraryContext?.libraryId) params.set("library_id", libraryContext.libraryId);
      if (libraryContext?.librarySlug) params.set("library_slug", libraryContext.librarySlug);
      if (libraryContext?.libraryName) params.set("library_name", libraryContext.libraryName);
      params.set("return_to", getCatalogReturnUrlFromUrl());
      params.set("book_return_to", location.href);
      return `${ROUTES.AUTOR}?${params.toString()}`;
    }

    async function renderBookAuthors(authorText, bookRow) {
      const host = $("authorLine");
      if (!host) return;

      const names = splitAuthorDisplay(authorText);
      const linkedAuthors = [];

      const rawJson = bookRow?.authors_json;
      if (Array.isArray(rawJson)) {
        linkedAuthors.push(...rawJson);
      } else if (typeof rawJson === "string" && rawJson.trim()) {
        try {
          const parsed = JSON.parse(rawJson);
          if (Array.isArray(parsed)) linkedAuthors.push(...parsed);
        } catch (_) {}
      }

      if (!linkedAuthors.length) {
        try {
          let rel = null;
          if (bookRow?.id != null) {
            const byBookId = await supabase
              .from("author_books_public")
              .select("author_id,author_name,preferred_name,sort_name,book_id,bib_ref,role,ord")
              .eq("book_id", bookRow.id)
              .order("ord", { ascending: true })
              .limit(20);
            if (!byBookId.error && Array.isArray(byBookId.data) && byBookId.data.length) rel = byBookId;
          }
          if ((!rel || !rel.data?.length) && bookRow?.bib_ref) {
            const byBibRef = await supabase
              .from("author_books_public")
              .select("author_id,author_name,preferred_name,sort_name,book_id,bib_ref,role,ord")
              .eq("bib_ref", bookRow.bib_ref)
              .order("ord", { ascending: true })
              .limit(20);
            if (!byBibRef.error && Array.isArray(byBibRef.data) && byBibRef.data.length) rel = byBibRef;
          }
          if (rel && Array.isArray(rel.data) && rel.data.length) {
            linkedAuthors.push(...rel.data.map(row => ({
              id: row.author_id,
              display_name: row.author_name,
              preferred_name: row.preferred_name,
              sort_name: row.sort_name,
              ord: row.ord
            })));
          }
        } catch (_) {}
      }

      host.innerHTML = "";
      host.classList.add("author-inline-wrap");

      const entries = names.map(name => ({ label: name, authorId: null }));
      const matchedLinkedAuthors = new Set();
      const canUseOrdinalFallback = names.length > 0 && linkedAuthors.length === names.length;

      const findMatchingEntryIndex = (row) => {
        const targetVariants = new Set();
        [row?.display_name, row?.preferred_name, row?.sort_name, row?.name]
          .filter(Boolean)
          .forEach(value => buildAuthorVariants(value).forEach(variant => targetVariants.add(variant)));
        if (!targetVariants.size) return -1;

        const matches = [];
        entries.forEach((entry, index) => {
          if (entry.authorId) return;
          for (const variant of buildAuthorVariants(entry.label)) {
            if (targetVariants.has(variant)) {
              matches.push(index);
              break;
            }
          }
        });
        return matches.length === 1 ? matches[0] : -1;
      };

      linkedAuthors.forEach((row, linkedIndex) => {
        const authorId = row?.id ?? row?.author_id ?? null;
        if (!authorId) return;
        const matchIndex = findMatchingEntryIndex(row);
        if (matchIndex < 0) return;
        entries[matchIndex].authorId = authorId;
        matchedLinkedAuthors.add(linkedIndex);
      });

      if (canUseOrdinalFallback) {
        linkedAuthors.forEach((row, linkedIndex) => {
          if (matchedLinkedAuthors.has(linkedIndex)) return;
          const authorId = row?.id ?? row?.author_id ?? null;
          if (!authorId) return;
          const ordNumber = Number(row?.ord);
          const fallbackIndex = Number.isInteger(ordNumber) && ordNumber >= 1 && ordNumber <= entries.length
            ? ordNumber - 1
            : (linkedIndex < entries.length ? linkedIndex : -1);
          if (fallbackIndex < 0 || fallbackIndex >= entries.length) return;
          if (entries[fallbackIndex]?.authorId) return;
          entries[fallbackIndex].authorId = String(authorId).trim();
          matchedLinkedAuthors.add(linkedIndex);
        });
      }

      if (!entries.length) {
        linkedAuthors.forEach((row) => {
          const label = String(row?.display_name || row?.preferred_name || row?.sort_name || row?.name || "").trim();
          const authorId = row?.id ?? row?.author_id ?? null;
          if (!label) return;
          entries.push({ label, authorId });
        });
      }

      if (entries.length === 1 && !entries[0].authorId && bookRow?.author_id != null) {
        entries[0].authorId = String(bookRow.author_id).trim();
      }

      const dedupedEntries = [];
      const seenEntries = new Set();
      entries.forEach((entry) => {
        const label = String(entry?.label || "").trim();
        if (!label) return;
        const key = entry?.authorId != null && String(entry.authorId).trim()
          ? `id:${String(entry.authorId).trim()}`
          : `label:${normalizeAuthorName(label)}`;
        if (seenEntries.has(key)) return;
        seenEntries.add(key);
        dedupedEntries.push({ label, authorId: entry?.authorId != null ? String(entry.authorId).trim() : "" });
      });

      if (!dedupedEntries.length) {
        host.textContent = "—";
        return;
      }

      dedupedEntries.forEach((entry, idx) => {
        const label = String(entry.label || "").trim();
        if (!label) return;

        if (entry.authorId) {
          const a = document.createElement("a");
          a.className = "author-card-link";
          a.href = authorUrl(entry.authorId);
          a.dataset.authorId = String(entry.authorId);
          a.textContent = label;
          host.appendChild(a);
        } else {
          const span = document.createElement("span");
          span.className = "author-card-static";
          span.textContent = label;
          span.setAttribute("aria-disabled", "true");
          host.appendChild(span);
        }

        if (idx < dedupedEntries.length - 1) {
          const sep = document.createElement("span");
          sep.className = "author-separator";
          sep.textContent = ";";
          host.appendChild(sep);
        }
      });
    }

      for (const w of wanted) {

      }
      return null;
    }
