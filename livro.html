<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnarBib – livro</title>
  <link rel="icon" type="image/png" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="shortcut icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="apple-touch-icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">

  <style>
    :root{
      --panel:rgba(10,10,10,.90);
      --text:#f4f4f4; --muted:rgba(255,255,255,.78);
      --red:#7a0b14; --red2:#bb1e2c;
      --line:rgba(255,255,255,.12);
      --shadow: 0 16px 38px rgba(0,0,0,.42);
      --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text);font-family:Inter, Segoe UI, Arial, sans-serif;}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,.62), rgba(0,0,0,.62)),
        url('https://cclamazonia.noblogs.org/files/2026/03/ni-dieu-ni-maitre-une-histoire-de-lanarchisme-episodes-3-et-4-09-15-2022-1024x639-1441403844.png');
      background-size:cover;
      background-position:center center;
      background-attachment:fixed;
      background-repeat:no-repeat;
    }
    a, a:visited{color:inherit;text-decoration:none}
    .wrap{max-width:1680px;margin:0 auto;padding:24px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      height:64px;width:auto;max-width:170px;object-fit:contain;display:block;flex-shrink:0;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))
    }
    .btn{
      border:1px solid var(--line);
      background:rgba(12,12,12,.84);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      cursor:pointer;
      box-shadow: var(--shadow);
      font-weight:900;
      font-size:.95rem;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .btn:disabled{opacity:.58;cursor:default}
    .btn.mini{padding:7px 10px;font-size:.85rem;border-radius:12px}
    .btn.disabled, .btn[aria-disabled="true"]{opacity:.55;cursor:not-allowed;pointer-events:none}
    .card{
      border:1px solid rgba(255,255,255,.10);
      background:var(--panel);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow)
    }
    .hero{
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(135deg, rgba(122,11,20,.92), rgba(50,7,11,.94));
      border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px;
    }
    .hero h1{margin:0 0 6px;font-size:1.5rem}
    .hero p{margin:0;color:rgba(255,255,255,.92)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{
      display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.72);padding:7px 10px;border-radius:999px;font-size:.9rem;color:rgba(255,255,255,.86)
    }
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .section-title{margin:0 0 12px;font-size:1.05rem}
    .mini{font-size:.86rem;color:var(--muted)}
    .subtle{opacity:.92}
    .hidden{display:none !important}
    .title{margin:0 0 6px;font-size:1.45rem}
    .muted{color:var(--muted)}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    @media (max-width:720px){.meta{grid-template-columns:1fr}}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.72);
      padding:7px 10px;border-radius:999px;
      font-size:.9rem;color:var(--muted);
      flex-wrap:wrap;overflow-wrap:anywhere;
    }
    .status{margin-top:10px;font-size:.92rem;min-height:1.2em}
    .status.ok{color:var(--ok)} .status.warn{color:var(--warn)} .status.bad{color:var(--bad)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .hr{height:1px;background:rgba(255,255,255,.10);margin:14px 0}
    .detail{
      display:grid;
      grid-template-columns: 260px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }
    @media (max-width:820px){.detail{grid-template-columns:1fr}}
    .coverbox{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.02);
      border-radius:18px;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:320px;
    }
    .coverbox.empty{display:none}
    .coverimg{
      width:100%;
      max-width:220px;
      height:auto;
      max-height:340px;
      object-fit:contain;
      display:block;
      border-radius:12px;
      box-shadow:var(--shadow);
    }
    .contentbox{min-width:0}

    .author-inline-wrap { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .author-name-plain { color: var(--muted); }
    .author-card-link {
      display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px;
      border:1px solid rgba(140,110,115,.65); background:transparent; color:#f4f4f4; text-decoration:none;
      font-weight:600; transition:background .15s ease, border-color .15s ease, transform .15s ease;
    }
    .author-card-link:hover { background:rgba(255,255,255,.04); border-color:rgba(170,140,145,.85); transform:translateY(-1px); }
    .author-separator { color: var(--muted); margin:0 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img class="logo"
             src="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png"
             alt="AnarBib" />
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" id="btnCatalogo" href="#" rel="noopener">Voltar ao(s) catálogo(s)</a>
        <button class="btn" id="btnConta" type="button" aria-disabled="true" title="Disponível apenas quando logado(a/e).">Painel / minha conta</button>
        <a class="btn primary" id="btnEntrar" href="#" rel="noopener">Entrar</a>
      </div>
    </div>

    <div class="hero">
      <h1 id="title">Carregando…</h1>
      <p id="heroIntro">Carregando dados do livro…</p>
      <div class="muted" id="subtitleLine" style="display:none;margin-top:8px"></div>
      <div class="author-inline-wrap" id="authorLine" style="margin-top:10px">—</div>
      <div class="chips">
        <div class="chip" id="heroRefChip" style="display:none"></div>
        <div class="chip" id="heroYearChip" style="display:none"></div>
        <div class="chip" id="heroPubChip" style="display:none"></div>
        <div class="chip" id="heroExemplaresChip" style="display:none"></div>
      </div>
    </div>

    <div class="card">
      <div class="detail">
        <div class="coverbox empty" id="coverBox">
          <img class="coverimg" id="coverImg" alt="Capa do livro" />
        </div>

        <div class="contentbox">
          <h2 class="section-title">Detalhes da edição</h2>

          <div class="meta" style="margin-top:12px">
            <div class="pill" id="bibRefPill">ref: —</div>
            <div class="pill" id="tomboPill">tombo: —</div>
            <div class="pill" id="exemplaresPill" style="display:none"></div>
            <div class="pill" id="yearPill">ano: —</div>
            <div class="pill" id="pubPill">editora: —</div>
            <div class="pill" id="placePill" style="display:none"></div>
            <div class="pill" id="editionPill" style="display:none"></div>
            <div class="pill" id="isbnPill" style="display:none"></div>
            <div class="pill" id="issnPill" style="display:none"></div>
            <div class="pill" id="langPill" style="display:none"></div>
            <div class="pill" id="pagesPill" style="display:none"></div>
            <div class="pill" id="typePill" style="display:none"></div>
            <div class="pill" id="collectionPill" style="display:none"></div>
            <div class="pill" id="volumePill" style="display:none"></div>
            <div class="pill" id="translatorPill" style="display:none"></div>
            <div class="pill" id="organizerPill" style="display:none"></div>
            <div class="pill" id="secondaryAuthorsPill" style="display:none"></div>
            <div class="pill" id="subjectsPill" style="display:none"></div>
            <div class="pill" id="cddPill">CDD: —</div>
          </div>

          <div class="hr"></div>

          <div class="muted" id="desc">—</div>

          <div class="pill" id="serviceModePill" style="display:none;margin-top:12px"></div>
          <div class="muted" id="serviceMessageLine" style="display:none;margin-top:10px"></div>

          <div class="actions">
            <button class="btn primary" id="btnReservar" type="button">Reservar este livro</button>
            <button class="btn" id="btnLer" type="button" style="display:none">Ler</button>
            <button class="btn" id="btnAbrirPdf" type="button" style="display:none">Abrir PDF</button>
          </div>

          <div class="status" id="status"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">

    import { supabase } from "./js/blmf-supabase.js";

    const ROUTES = {
      CATALOGO: "https://cclamazonia-cmd.github.io/anarbib-staging/index.html",
      CADASTRO: "https://cclamazonia-cmd.github.io/anarbib-conta-staging/cadastro.html",
      CONTA: "https://cclamazonia-cmd.github.io/anarbib-conta-staging/conta.html",
      PAINEL: "https://cclamazonia-cmd.github.io/anarbib-conta-staging/painel.html",
      AUTOR: new URL("autor.html", location.href).toString(),
      AUTHOR_PAGE_VERSION: "20260319-1",
    };

    const $ = (id) => document.getElementById(id);
    document.title = "AnarBib – livro";
    document.getElementById("btnCatalogo").href = ROUTES.CATALOGO;

    function buildCadastroUrl(nextUrl = location.href) {
      const u = new URL(ROUTES.CADASTRO);
      u.searchParams.set("next", nextUrl);
      return u.toString();
    }

    document.getElementById("btnEntrar").href = buildCadastroUrl(location.href);

    const DEFAULT_SERVICE_MESSAGES = {
      em_organizacao: "A biblioteca está em organização. O atendimento ocorre conforme a capacidade operacional atual.",
      atendimento_eventual: "A biblioteca funciona com atendimento eventual. Consulte os canais do CCLA para informações atualizadas.",
      atendimento_semanal: "A biblioteca funciona com atendimento semanal em ritmo regular. Consulte os canais do CCLA para os horários e orientações vigentes.",
      funcionamento_normal: "A biblioteca está funcionando normalmente no momento.",
      fechado_temporariamente: "A biblioteca está temporariamente fechada para atendimento presencial. Consulte os canais do CCLA para atualizações e orientações."
    };

    const SERVICE_MODE_LABELS = {
      em_organizacao: "Em organização",
      atendimento_eventual: "Atendimento eventual",
      atendimento_semanal: "Atendimento semanal",
      funcionamento_normal: "Funcionamento normal",
      fechado_temporariamente: "Fechado temporariamente"
    };

    let currentBook = null;
    let currentProfile = null;
    let currentLibraryContext = null;
    let publicServiceState = null;

    function setStatus(msg, cls) {
      const el = $("status");
      el.className = "status" + (cls ? " " + cls : "");
      el.textContent = msg || "";
    }

    function escapeHtml(v) {
      return String(v ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[c]));
    }

    function setPill(id, label, value, showDash = false) {
      const el = $(id);
      if (!el) return;
      const txt = String(value ?? "").trim();

      if (!txt) {
        if (showDash) {
          el.style.display = "inline-flex";
          el.textContent = `${label}: —`;
        } else {
          el.style.display = "none";
          el.textContent = "";
        }
        return;
      }

      el.style.display = "inline-flex";
      el.textContent = `${label}: ${txt}`;
    }

    function setLine(id, value) {
      const el = $(id);
      if (!el) return;
      const txt = String(value ?? "").trim();
      el.textContent = txt;
      el.style.display = txt ? "" : "none";
    }

    function setCover(pathOrUrl) {
      const box = $("coverBox");
      const img = $("coverImg");
      if (!pathOrUrl) {
        box.classList.add("empty");
        img.removeAttribute("src");
        return;
      }

      let src = String(pathOrUrl || "").trim();
      if (!src) {
        box.classList.add("empty");
        img.removeAttribute("src");
        return;
      }

      if (!/^https?:\/\//i.test(src)) {
        const { data } = supabase.storage.from("covers").getPublicUrl(src);
        src = data?.publicUrl || "";
      }

      if (!src) {
        box.classList.add("empty");
        img.removeAttribute("src");
        return;
      }

      img.src = src;
      box.classList.remove("empty");
    }

    function getBibRefFromUrl() {
      const u = new URL(location.href);
      return (u.searchParams.get("ref") || u.searchParams.get("bib_ref") || "").trim();
    }

    function getServiceModeLabel(mode) {
      return SERVICE_MODE_LABELS[String(mode || "").trim()] || "Funcionamento";
    }

    function getServiceMessage(state) {
      const custom = String(state?.public_message || "").trim();
      if (custom) return custom;
      return DEFAULT_SERVICE_MESSAGES[String(state?.service_mode || "").trim()] || "";
    }

    function buildHeroIntro({ tipoMaterial, editora, ano, holdingsCount }) {
      const parts = [];
      const tipo = String(tipoMaterial || "").trim();
      const pub = String(editora || "").trim();
      const year = String(ano || "").trim();

      if (tipo) parts.push(tipo);
      if (pub) parts.push(pub);
      if (year) parts.push(year);

      if (Number.isFinite(Number(holdingsCount)) && Number(holdingsCount) > 0) {
        const n = Number(holdingsCount);
        parts.push(n === 1 ? "1 biblioteca com exemplar" : `${n} bibliotecas com exemplar`);
      }

      return parts.join(" · ") || "Livro publicado no catálogo AnarBib.";
    }

    function normalizeServiceRow(row) {
      if (!row || typeof row !== "object") return null;
      if ("allows_new_reservations" in row) {
        return {
          service_mode: String(row.service_mode || "").trim(),
          public_message: String(row.public_message || "").trim(),
          allows_new_reservations: row.allows_new_reservations === true,
          allows_new_loans: row.allows_new_loans === true
        };
      }
      return {
        service_mode: String(row.service_mode || "").trim(),
        public_message: String(row.public_message || "").trim(),
        allows_new_reservations: row.allows_new_reservations === true || row.allow_reservations === true,
        allows_new_loans: row.allows_new_loans === true || row.allow_loans === true
      };
    }

    function applyServiceState() {
      const state = currentLibraryContext ? normalizeServiceRow(currentLibraryContext) : normalizeServiceRow(publicServiceState);
      const btnReservar = $("btnReservar");
      const serviceModePill = $("serviceModePill");

      if (state?.service_mode) {
        const label = getServiceModeLabel(state.service_mode);
        setPill("serviceModePill", "funcionamento", label);
      } else if (serviceModePill) {
        serviceModePill.style.display = "none";
        serviceModePill.textContent = "";
      }

      setLine("serviceMessageLine", getServiceMessage(state));

      if (!btnReservar) return;

      if (state?.allows_new_reservations === false) {
        btnReservar.textContent = "Reservas temporariamente fechadas";
        btnReservar.classList.add("disabled");
        btnReservar.setAttribute("aria-disabled", "true");
        btnReservar.title = "As reservas públicas estão temporariamente fechadas no momento.";
        btnReservar.disabled = true;
        return;
      }

      btnReservar.textContent = "Reservar este livro";
      btnReservar.classList.remove("disabled");
      btnReservar.setAttribute("aria-disabled", "false");
      btnReservar.title = "Reservar este livro";
      btnReservar.disabled = false;
    }

    async function fetchApiSingle(viewName, columns = "*", filters = null) {
      let query = supabase.schema("api").from(viewName).select(columns);
      if (Array.isArray(filters)) {
        for (const filter of filters) {
          if (!filter || !filter.col || !filter.op) continue;
          if (filter.op === "eq") query = query.eq(filter.col, filter.val);
          if (filter.op === "in") query = query.in(filter.col, filter.val);
        }
      }
      const { data, error } = await query.limit(1).maybeSingle();
      if (error) throw error;
      return data || null;
    }

    async function fetchApiMany(viewName, columns = "*", filters = null, orderBy = null, ascending = false) {
      let query = supabase.schema("api").from(viewName).select(columns);
      if (Array.isArray(filters)) {
        for (const filter of filters) {
          if (!filter || !filter.col || !filter.op) continue;
          if (filter.op === "eq") query = query.eq(filter.col, filter.val);
          if (filter.op === "in") query = query.in(filter.col, filter.val);
        }
      }
      if (orderBy) query = query.order(orderBy, { ascending });
      const { data, error } = await query;
      if (error) throw error;
      return data || [];
    }

    async function fetchProfileCompat() {
      try {
        const profile = await fetchApiSingle("my_profile");
        if (profile) {
          return {
            ...profile,
            can_access_painel: profile.can_access_painel === true || profile.is_librarian === true
          };
        }
      } catch (_) {}

      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user?.id) return null;

      const attempts = [
        () => supabase.from("profiles").select("id, email, is_librarian, is_restricted").eq("id", session.user.id).maybeSingle(),
        () => supabase.schema("api").from("profiles").select("id, email, is_librarian, is_restricted").eq("id", session.user.id).maybeSingle()
      ];

      for (const run of attempts) {
        try {
          const res = await run();
          if (!res?.error && res?.data) {
            return {
              id: session.user.id,
              email: res.data.email || session.user.email || "",
              is_authenticated: true,
              is_librarian: res.data.is_librarian === true,
              is_restricted: res.data.is_restricted === true,
              can_access_painel: res.data.is_librarian === true
            };
          }
        } catch (_) {}
      }

      return {
        id: session.user.id,
        email: session.user.email || "",
        is_authenticated: true,
        is_librarian: false,
        is_restricted: false,
        can_access_painel: false
      };
    }

    function parseRpcError(err) {
      const msg = String(err?.message || "");
      if (msg.includes("AUTH_REQUIRED")) return "Para reservar, você precisa entrar na conta.";
      if (msg.includes("PROFILE_REQUIRED")) return "Sua ficha de perfil ainda não está pronta para reservas.";
      if (msg.includes("ACCOUNT_RESTRICTED")) return "Esta conta está com acesso restrito.";
      if (msg.includes("DEFAULT_LIBRARY_REQUIRED")) return "Não foi possível identificar sua biblioteca padrão.";
      if (msg.includes("REMOTE_LIBRARY_NOT_ENABLED")) return "Por enquanto, a reserva só pode ser feita na sua biblioteca padrão.";
      if (msg.includes("RESERVATIONS_DISABLED")) return "As reservas estão temporariamente fechadas nesta biblioteca.";
      if (msg.includes("BOOK_NOT_HELD_BY_LIBRARY")) return "Este livro não está disponível para reserva na sua biblioteca.";
      if (msg.includes("BOOK_NOT_LOANABLE")) return "Este item não pode ser reservado para empréstimo.";
      if (msg.includes("ACTIVE_RESERVATION_ALREADY_EXISTS")) return "Você já tem uma reserva ativa para este livro.";
      return msg || "Não foi possível concluir a ação agora.";
    }

    function splitAuthorDisplay(raw) {
      const txt = String(raw || "").trim();
      if (!txt) return [];
      return txt.split(/\s*;\s*/).map(v => String(v || "").trim()).filter(Boolean);
    }

    function authorUrl(authorId, authorName = "") {
      const params = new URLSearchParams();
      params.set("v", ROUTES.AUTHOR_PAGE_VERSION);
      params.set("_cb", `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`);
      if (authorId != null && String(authorId).trim()) {
        params.set("id", String(authorId).trim());
        params.set("author_id", String(authorId).trim());
      }
      if (authorName && String(authorName).trim()) {
        params.set("author", String(authorName).trim());
      }
      return `${ROUTES.AUTOR}?${params.toString()}`;
    }

    function renderBookAuthors(mainAuthorText, bookRow) {
      const host = $("authorLine");
      if (!host) return;
      host.innerHTML = "";
      host.classList.add("author-inline-wrap");

      const names = splitAuthorDisplay(mainAuthorText);
      if (!names.length) {
        host.textContent = "—";
        return;
      }

      if (bookRow?.author_id && names.length === 1) {
        const a = document.createElement("a");
        a.className = "author-card-link";
        a.href = authorUrl(bookRow.author_id, names[0]);
        a.textContent = names[0];
        host.appendChild(a);
        return;
      }

      names.forEach((name, idx) => {
        const span = document.createElement("span");
        span.className = "author-name-plain";
        span.textContent = name;
        host.appendChild(span);
        if (idx < names.length - 1) {
          const sep = document.createElement("span");
          sep.className = "author-separator";
          sep.textContent = ";";
          host.appendChild(sep);
        }
      });
    }

    async function setupContaButton() {
      const btnConta = $("btnConta");
      const btnEntrar = $("btnEntrar");
      const { data: { session } } = await supabase.auth.getSession();

      if (session?.user?.id) {
        try {
          currentProfile = await fetchProfileCompat();
        } catch (_) {
          currentProfile = null;
        }

        const canPainel = !!currentProfile?.can_access_painel;
        const targetHref = canPainel ? ROUTES.PAINEL : ROUTES.CONTA;
        btnConta.textContent = canPainel ? "Painel" : "Minha conta";
        btnConta.setAttribute("aria-disabled", "false");
        btnConta.title = canPainel ? "Abrir painel" : "Abrir minha conta";
        btnConta.disabled = false;
        btnConta.onclick = () => location.assign(targetHref);

        btnEntrar.setAttribute("aria-disabled", "true");
        btnEntrar.classList.add("disabled");
        btnEntrar.title = "Você já está logado(a/e).";
        btnEntrar.removeAttribute("href");
        btnEntrar.addEventListener("click", (e) => e.preventDefault());
        return;
      }

      btnConta.textContent = "Painel / minha conta";
      btnConta.setAttribute("aria-disabled", "true");
      btnConta.title = "Disponível apenas quando logado(a/e).";
      btnConta.disabled = true;
      btnConta.onclick = (e) => e.preventDefault();

      btnEntrar.setAttribute("aria-disabled", "false");
      btnEntrar.classList.remove("disabled");
      btnEntrar.title = "Entrar";
      btnEntrar.href = buildCadastroUrl(location.href);
    }

    async function loadServiceState() {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session?.user?.id) {
          currentLibraryContext = await fetchApiSingle("my_library_context");
        }
      } catch (_) {
        currentLibraryContext = null;
      }

      try {
        const { data, error } = await supabase
          .from("v_library_service_public")
          .select("*")
          .limit(1)
          .maybeSingle();

        if (!error) {
          publicServiceState = normalizeServiceRow(data);
        }
      } catch (_) {
        publicServiceState = null;
      }

      applyServiceState();
    }

    async function updateReserveButtonState() {
      const btnReservar = $("btnReservar");
      if (!btnReservar || !currentBook) return;

      applyServiceState();

      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user?.id) {
        btnReservar.disabled = false;
        btnReservar.textContent = "Reservar este livro";
        return;
      }

      try {
        currentProfile = await fetchProfileCompat();
        currentLibraryContext = await fetchApiSingle("my_library_context");
      } catch (_) {}

      if (currentProfile?.is_restricted) {
        btnReservar.disabled = true;
        btnReservar.textContent = "Conta com restrição";
        btnReservar.title = "Esta conta está com acesso restrito.";
        return;
      }

      if (currentLibraryContext?.allows_new_reservations === false) {
        btnReservar.disabled = true;
        btnReservar.textContent = "Reservas temporariamente fechadas";
        btnReservar.title = "As reservas estão temporariamente fechadas nesta biblioteca.";
        return;
      }

      if (currentLibraryContext?.library_id) {
        try {
          const activeRows = await fetchApiMany("my_reservations_active", "id, book_id, library_id", [
            { col: "book_id", op: "eq", val: currentBook.id },
            { col: "library_id", op: "eq", val: currentLibraryContext.library_id }
          ]);
          if (activeRows.length) {
            btnReservar.disabled = true;
            btnReservar.textContent = "Reserva já ativa";
            btnReservar.title = "Você já tem uma reserva ativa para este livro.";
            return;
          }
        } catch (_) {}
      }

      btnReservar.disabled = false;
      btnReservar.textContent = "Reservar este livro";
      btnReservar.title = "Reservar este livro";
    }

    
    async function reserveCurrentBook() {
      setStatus("", "");

      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user?.id) {
        setStatus("Para reservar, você precisa entrar.", "warn");
        location.assign(buildCadastroUrl(location.href));
        return;
      }

      try {
        currentProfile = currentProfile || await fetchProfileCompat();
        currentLibraryContext = currentLibraryContext || await fetchApiSingle("my_library_context");
      } catch (_) {}

      if (currentProfile?.is_restricted) {
        setStatus("Esta conta está com acesso restrito.", "warn");
        return;
      }

      if (!currentBook?.id) {
        setStatus("Não foi possível identificar este livro para reserva.", "warn");
        return;
      }

      const btn = $("btnReservar");
      btn.disabled = true;

      try {
        const { error } = await supabase.rpc("create_my_reservation", {
          p_book_id: currentBook.id,
          p_library_id: null,
          p_notes: "Reserva criada pela página pública do livro."
        });

        if (!error) {
          setStatus("Reserva registrada com sucesso.", "ok");
          btn.disabled = true;
          btn.textContent = "Reserva já ativa";
          return;
        }

        const fallback = await supabase.rpc("fn_v2_create_reserva_by_bib_refs", {
          p_user_id: session.user.id,
          p_bib_refs: [currentBook.bib_ref || getBibRefFromUrl()],
          p_expires_at: null,
          p_notes: "Reserva criada pela página pública do livro."
        });

        if (fallback.error) {
          setStatus(parseRpcError(error), "warn");
          await updateReserveButtonState();
          return;
        }

        setStatus("Reserva registrada com sucesso.", "ok");
        btn.disabled = true;
        btn.textContent = "Reserva já ativa";
      } catch (error) {
        setStatus(parseRpcError(error), "warn");
        await updateReserveButtonState();
      }
    }

    
    async function loadBook() {
      const bib_ref = getBibRefFromUrl();

      if (!bib_ref) {
        $("title").textContent = "Livro não encontrado";
        $("heroIntro").textContent = "Faltou a referência na URL (ex.: livro.html?ref=0000124).";
        setLine("subtitleLine", "");
        $("authorLine").textContent = "—";
        setCover("");
        document.title = "AnarBib – livro";
        setStatus("Faltou a referência na URL (ex.: livro.html?ref=0000124).", "warn");
        return;
      }

      let row = null;
      try {
        row = await fetchApiSingle("catalog_book_detail_public", "*", [
          { col: "bib_ref", op: "eq", val: bib_ref }
        ]);
      } catch (error) {
        console.warn("catalog_book_detail_public indisponível, usando fallback legacy.", error);
      }

      if (row) {
        currentBook = row;

        const titulo = row.titulo || "";
        const subtitulo = row.subtitulo || "";
        const autor = row.autor || "";
        const ano = row.ano || "";
        const editora = row.editora || "";
        const localPublicacao = row.local_publicacao || "";
        const edicao = row.edicao || "";
        const isbn = row.isbn || "";
        const issn = row.issn || "";
        const idioma = row.idioma || "";
        const paginas = row.paginas || "";
        const tipoMaterial = row.tipo_material || "";
        const colecao = row.colecao || "";
        const volume = row.volume || "";
        const tradutor = row.tradutor || "";
        const organizador = row.organizador || "";
        const autoresSecundarios = row.autores_secundarios || "";
        const assuntos = row.assuntos || "";
        const cdd = row.cdd || "";
        const resumo = row.notas || "";
        const cover = row.cover_object_path || "";
        const holdings = Array.isArray(row.holding_libraries_json) ? row.holding_libraries_json : [];
        const holdingsCount = holdings.length || (Number(row.api_exemplares_total || 0) > 0 ? 1 : 0);

        setCover(cover);
        $("title").textContent = titulo || "Sem título";
        setLine("subtitleLine", subtitulo);
        renderBookAuthors(autor, row);

        setPill("bibRefPill", "ref", row.bib_ref || "", true);
        setPill("heroRefChip", "ref", row.bib_ref || "");
        setPill("yearPill", "ano", ano, true);
        setPill("heroYearChip", "ano", ano);
        setPill("pubPill", "editora", editora, true);
        setPill("heroPubChip", "editora", editora);
        setPill("placePill", "local", localPublicacao);
        setPill("editionPill", "edição", edicao);
        setPill("isbnPill", "ISBN", isbn);
        setPill("issnPill", "ISSN", issn);
        setPill("langPill", "idioma", idioma);
        setPill("pagesPill", "páginas", paginas);
        setPill("typePill", "material", tipoMaterial);
        setPill("collectionPill", "coleção", colecao);
        setPill("volumePill", "volume", volume);
        setPill("translatorPill", "tradutor(a)", tradutor);
        setPill("organizerPill", "organização", organizador);
        setPill("secondaryAuthorsPill", "outras responsabilidades", autoresSecundarios);
        setPill("subjectsPill", "assuntos", assuntos);
        setPill("cddPill", "CDD", cdd);

        setLine("resumoLine", resumo);
        setLine("holdingsLine", holdingsCount ? holdings.map((h) => {
          const total = Number(h?.exemplares_total || 0);
          return total > 0 ? `${h.library_name || h.library_slug || "Biblioteca"} (${total})` : `${h.library_name || h.library_slug || "Biblioteca"}`;
        }).join(" • ") : "—");

        $("heroIntro").textContent = holdingsCount
          ? `Livro localizado em ${holdingsCount} biblioteca(s) cadastrada(s).`
          : "Detalhes bibliográficos do livro.";

        document.title = titulo ? `AnarBib – ${titulo}` : "AnarBib – livro";

        const bibEl = $("bibRefValue");
        if (bibEl) bibEl.textContent = row.bib_ref || "—";

        const reserveBtn = $("btnReservar");
        if (reserveBtn) reserveBtn.addEventListener("click", () => reserveCurrentBook(), { once: false });

        await updateReserveButtonState();
        return;
      }

      const candidateTables = ["v_books_catalog_public_v2", "v_books_catalog_public", "books_public", "v_books_public", "books"];

      let booksTable = null;
      let data = null;
      let keys = [];
      let sample = {};

      for (const candidate of candidateTables) {
        const peek = await supabase.from(candidate).select("*").limit(1);
        if (peek.error) continue;

        sample = (peek.data && peek.data[0]) ? peek.data[0] : {};
        keys = Object.keys(sample);

        const candidateRefCol =
          findCol(keys, ["bib_ref", "bibref", "ref", "referencia", "referência"]) || "bib_ref";

        const probe = await supabase
          .from(candidate)
          .select("*")
          .eq(candidateRefCol, bib_ref)
          .maybeSingle();

        if (probe.error) continue;
        if (probe.data) {
          booksTable = candidate;
          data = probe.data;
          break;
        }
      }

      if (!booksTable) {
        $("title").textContent = "Livro não encontrado";
        $("heroIntro").textContent = "Não encontrei esse livro no catálogo público.";
        setLine("subtitleLine", "");
        $("authorLine").textContent = "—";
        setCover("");
        document.title = "AnarBib – livro";
        setStatus("Não encontrei esse livro no catálogo.", "warn");
        return;
      }

      const colRef = findCol(keys, ["bib_ref", "bibref", "ref", "referencia", "referência"]) || "bib_ref";
      const colTit = findCol(keys, ["titulo", "título", "title", "nome"]);
      const colSub = findCol(keys, ["subtitulo", "subtítulo", "subtitle"]);
      const colAut = findCol(keys, ["autor_exibicao", "autor_texto_livro", "autor", "author", "autores"]);
      const colAno = findCol(keys, ["ano", "year"]);
      const colEdi = findCol(keys, ["editora", "publisher"]);
      const colLoc = findCol(keys, ["local_publicacao", "local de publicação", "cidade", "place"]);
      const colEdc = findCol(keys, ["edicao", "edição", "edition"]);
      const colISBN = findCol(keys, ["isbn"]);
      const colISSN = findCol(keys, ["issn"]);
      const colIdi = findCol(keys, ["idioma", "language"]);
      const colPag = findCol(keys, ["paginas", "páginas", "pages"]);
      const colTipo = findCol(keys, ["tipo_material", "tipo de material", "material_type"]);
      const colColecao = findCol(keys, ["colecao", "coleção", "series", "serie", "série", "collection"]);
      const colVolume = findCol(keys, ["volume", "tomo", "vol"]);
      const colTradutor = findCol(keys, ["tradutor", "translator"]);
      const colOrganizador = findCol(keys, ["organizador", "organizadora", "organizer"]);
      const colAutoresSec = findCol(keys, ["autores_secundarios", "autores secundários", "autores secundarios", "secondary_authors"]);
      const colAssuntos = findCol(keys, ["assuntos", "subjects", "subject", "palavras_chave", "palavras-chave"]);
      const colCDD = findCol(keys, ["cdd", "classificacao", "classificação"]);
      const colRes = findCol(keys, ["resumo", "descricao", "descrição", "description", "obs", "observacao", "observação", "notas", "nota", "notes"]);
      const colPdf = findCol(keys, ["pdf_url", "url_pdf", "pdf", "arquivo_pdf", "link_pdf", "url"]);
      const colCover = findCol(keys, ["cover_object_path", "cover_url", "capa_url", "capa", "image_url", "imagem_url"]);

      const titulo = colTit ? (data[colTit] || "") : "";
      const subtitulo = colSub ? (data[colSub] || "") : "";
      const autor = colAut ? (data[colAut] || "") : "";
      const ano = colAno ? (data[colAno] || "") : "";
      const editora = colEdi ? (data[colEdi] || "") : "";
      const localPublicacao = colLoc ? (data[colLoc] || "") : "";
      const edicao = colEdc ? (data[colEdc] || "") : "";
      const isbn = colISBN ? (data[colISBN] || "") : "";
      const issn = colISSN ? (data[colISSN] || "") : "";
      const idioma = colIdi ? (data[colIdi] || "") : "";
      const paginas = colPag ? (data[colPag] || "") : "";
      const tipoMaterial = colTipo ? (data[colTipo] || "") : "";
      let colecao = colColecao ? (data[colColecao] || "") : "";
      const volume = colVolume ? (data[colVolume] || "") : "";
      const tradutor = colTradutor ? (data[colTradutor] || "") : "";
      const organizador = colOrganizador ? (data[colOrganizador] || "") : "";
      const autoresSecundarios = colAutoresSec ? (data[colAutoresSec] || "") : "";
      const assuntos = colAssuntos ? (data[colAssuntos] || "") : "";
      const cdd = colCDD ? (data[colCDD] || "") : "";
      const resumo = colRes ? (data[colRes] || "") : "";
      const pdf = colPdf ? (data[colPdf] || "") : "";
      let cover = colCover ? (data[colCover] || "") : "";

      if (!cover) {
        const fallback = await supabase
          .from("books")
          .select("cover_object_path")
          .eq("bib_ref", bib_ref)
          .maybeSingle();

        if (!fallback.error && fallback.data?.cover_object_path) {
          cover = fallback.data.cover_object_path;
        }
      }

      if (!String(colecao || "").trim()) {
        const fallbackColecao = await supabase
          .from("books")
          .select("colecao")
          .eq("bib_ref", bib_ref)
          .maybeSingle();

        if (!fallbackColecao.error && fallbackColecao.data?.colecao) {
          colecao = fallbackColecao.data.colecao;
        }
      }

      currentBook = { id: data.id || data.book_id || null, bib_ref, loanable: data.loanable ?? true, author_id: data.author_id || null };

      setCover(cover);
      $("title").textContent = titulo || "Sem título";
      setLine("subtitleLine", subtitulo);
      renderBookAuthors(autor, currentBook);

      setPill("bibRefPill", "ref", bib_ref, true);
      setPill("heroRefChip", "ref", bib_ref);
      setPill("yearPill", "ano", ano, true);
      setPill("heroYearChip", "ano", ano);
      setPill("pubPill", "editora", editora, true);
      setPill("heroPubChip", "editora", editora);
      setPill("placePill", "local", localPublicacao);
      setPill("editionPill", "edição", edicao);
      setPill("isbnPill", "ISBN", isbn);
      setPill("issnPill", "ISSN", issn);
      setPill("langPill", "idioma", idioma);
      setPill("pagesPill", "páginas", paginas);
      setPill("typePill", "material", tipoMaterial);
      setPill("collectionPill", "coleção", colecao);
      setPill("volumePill", "volume", volume);
      setPill("translatorPill", "tradutor(a)", tradutor);
      setPill("organizerPill", "organização", organizador);
      setPill("secondaryAuthorsPill", "outras responsabilidades", autoresSecundarios);
      setPill("subjectsPill", "assuntos", assuntos);
      setPill("cddPill", "CDD", cdd);

      setLine("resumoLine", resumo);
      document.title = titulo ? `AnarBib – ${titulo}` : "AnarBib – livro";

      if ($("btnReservar")) {
        $("btnReservar").addEventListener("click", () => reserveCurrentBook(), { once: false });
      }
      await updateReserveButtonState();
    }

    await setupContaButton();
    await loadServiceState();
    await loadBook();

  </script>
</body>
</html>
