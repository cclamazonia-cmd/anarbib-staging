<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnarBib - Livro</title>
  <link rel="icon" type="image/png" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="shortcut icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="apple-touch-icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">

  <style>
    :root{
      --panel:rgba(10,10,10,.90);
      --text:#f4f4f4; --muted:rgba(255,255,255,.78);
      --red:#7a0b14; --red2:#bb1e2c;
      --line:rgba(255,255,255,.12);
      --shadow: 0 16px 38px rgba(0,0,0,.42);
      --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text);font-family:Inter, Segoe UI, Arial, sans-serif;}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,.62), rgba(0,0,0,.62)),
        url('https://cclamazonia.noblogs.org/files/2026/03/ni-dieu-ni-maitre-une-histoire-de-lanarchisme-episodes-3-et-4-09-15-2022-1024x639-1441403844.png');
      background-size:cover;
      background-position:center center;
      background-attachment:fixed;
      background-repeat:no-repeat;
    }
    a, a:visited{color:inherit;text-decoration:none}
    .wrap{max-width:1680px;margin:0 auto;padding:24px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      height:64px;width:auto;max-width:170px;object-fit:contain;display:block;flex-shrink:0;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))
    }
    .btn{
      border:1px solid var(--line);
      background:rgba(12,12,12,.84);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      cursor:pointer;
      box-shadow: var(--shadow);
      font-weight:900;
      font-size:.95rem;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .btn:disabled{opacity:.58;cursor:default}
    .btn.mini{padding:7px 10px;font-size:.85rem;border-radius:12px}
    .btn.disabled, .btn[aria-disabled="true"]{opacity:.55;cursor:not-allowed;pointer-events:none}
    .card{
      border:1px solid rgba(255,255,255,.10);
      background:var(--panel);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow)
    }
    .hero{
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(135deg, rgba(122,11,20,.92), rgba(50,7,11,.94));
      border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px;
    }
    .hero h1{margin:0 0 6px;font-size:1.5rem}
    .hero p{margin:0;color:rgba(255,255,255,.92)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{
      display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.72);padding:7px 10px;border-radius:999px;font-size:.9rem;color:rgba(255,255,255,.86)
    }
    .hero-holdings-detail{display:none;gap:8px;margin-top:12px;flex-direction:column}
    .hero-holding-line{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
      border:1px solid rgba(255,255,255,.12);background:rgba(10,10,10,.38);
      border-radius:14px;padding:10px 12px;color:rgba(255,255,255,.90)
    }
    .hero-holding-library{color:#fff;font-weight:900}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .section-title{margin:0 0 12px;font-size:1.05rem}
    .mini{font-size:.86rem;color:var(--muted)}
    .subtle{opacity:.92}
    .hidden{display:none !important}
    .title{margin:0 0 6px;font-size:1.45rem}
    .muted{color:var(--muted)}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    @media (max-width:720px){.meta{grid-template-columns:1fr}}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.72);
      padding:7px 10px;border-radius:999px;
      font-size:.9rem;color:var(--muted);
      flex-wrap:wrap;overflow-wrap:anywhere;
    }
    .digital-access{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:14px}
    .digital-access-label{font-size:.92rem;color:var(--muted);font-weight:700}
    .digital-chip{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:6px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14);font-size:.88rem;font-weight:800;line-height:1.2}
    .digital-chip.yes{background:rgba(34,197,94,.18);color:#d8ffe2;border-color:rgba(34,197,94,.35)}
    .digital-chip.no{background:rgba(251,191,36,.18);color:#fff2cc;border-color:rgba(251,191,36,.35)}
    .status{margin-top:10px;font-size:.92rem;min-height:1.2em}
    .status.ok{color:var(--ok)} .status.warn{color:var(--warn)} .status.bad{color:var(--bad)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .hr{height:1px;background:rgba(255,255,255,.10);margin:14px 0}
    .detail{
      display:grid;
      grid-template-columns: 260px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }
    @media (max-width:820px){.detail{grid-template-columns:1fr}}
    .coverbox{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.02);
      border-radius:18px;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:320px;
    }
    .coverbox.empty{display:none}
    .coverimg{
      width:100%;
      max-width:220px;
      height:auto;
      max-height:340px;
      object-fit:contain;
      display:block;
      border-radius:12px;
      box-shadow:var(--shadow);
    }
    .contentbox{min-width:0}

    .author-inline-wrap { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .author-card-link,
    .author-card-static {
      display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px;
      border:1px solid rgba(140,110,115,.65); background:transparent; text-decoration:none;
      font-weight:600; transition:background .15s ease, border-color .15s ease, transform .15s ease;
    }
    .author-card-link { color:#f4f4f4; }
    .author-card-static { color: var(--muted); cursor:default; }
    .author-card-link:hover { background:rgba(255,255,255,.04); border-color:rgba(170,140,145,.85); transform:translateY(-1px); }
    .author-separator { color: var(--muted); margin:0 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img class="logo"
             src="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png"
             alt="AnarBib" />
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" id="btnCatalogo" href="#" rel="noopener">Voltar ao(s) catálogo(s)</a>
        <button class="btn" id="btnConta" type="button" aria-disabled="true" title="Disponível apenas quando logado(a/e).">Painel / minha conta</button>
        <a class="btn primary" id="btnEntrar" href="#" rel="noopener">Entrar</a>
      </div>
    </div>

    <div class="hero">
      <h1 id="title">Carregando…</h1>
      <div class="muted" id="subtitleLine" style="display:none;margin-top:8px"></div>
      <p id="heroIntro" style="display:none"></p>
      <div class="author-inline-wrap" id="authorLine" style="margin-top:10px">—</div>
      <div class="chips">
        <div class="chip" id="heroRefChip" style="display:none"></div>
        <div class="chip" id="heroYearChip" style="display:none"></div>
        <div class="chip" id="heroPubChip" style="display:none"></div>
        <div class="chip" id="heroExemplaresChip" style="display:none"></div>
      </div>
      <div class="hero-holdings-detail" id="heroHoldingsDetail"></div>
    </div>

    <div class="card">
      <div class="detail">
        <div class="coverbox empty" id="coverBox">
          <img class="coverimg" id="coverImg" alt="Capa do livro" />
        </div>

        <div class="contentbox">
          <h2 class="section-title">Detalhes da edição</h2>

          <div class="meta" style="margin-top:12px">
            <div class="pill" id="bibRefPill">ref: —</div>
            <div class="pill" id="tomboPill">tombo: —</div>
            <div class="pill" id="exemplaresPill" style="display:none"></div>
            <div class="pill" id="yearPill">ano: —</div>
            <div class="pill" id="pubPill">editora: —</div>
            <div class="pill" id="placePill" style="display:none"></div>
            <div class="pill" id="editionPill" style="display:none"></div>
            <div class="pill" id="isbnPill" style="display:none"></div>
            <div class="pill" id="issnPill" style="display:none"></div>
            <div class="pill" id="langPill" style="display:none"></div>
            <div class="pill" id="pagesPill" style="display:none"></div>
            <div class="pill" id="typePill" style="display:none"></div>
            <div class="pill" id="collectionPill" style="display:none"></div>
            <div class="pill" id="volumePill" style="display:none"></div>
            <div class="pill" id="translatorPill" style="display:none"></div>
            <div class="pill" id="organizerPill" style="display:none"></div>
            <div class="pill" id="secondaryAuthorsPill" style="display:none"></div>
            <div class="pill" id="subjectsPill" style="display:none"></div>
            <div class="pill" id="cddPill">CDD: —</div>
          </div>

          <div class="hr"></div>

          <div class="muted" id="desc">—</div>

          <div class="pill" id="serviceModePill" style="display:none;margin-top:12px"></div>
          <div class="muted" id="serviceMessageLine" style="display:none;margin-top:10px"></div>

          <div class="digital-access">
            <span class="digital-access-label">Exemplar digital disponível:</span>
            <span class="digital-chip no" id="digitalChip">NÃO</span>
            <button class="btn primary" id="btnLer" type="button" style="display:none">Ler</button>
          </div>

          <div class="actions">
            <button class="btn primary" id="btnReservar" type="button">Reservar este livro</button>
            <button class="btn" id="btnAbrirPdf" type="button" style="display:none">Abrir PDF</button>
          </div>

          <div class="status" id="status"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./js/blmf-supabase.js";

    const GH_BASE = location.origin;
    const ROUTES = {
      BLOG_HOME: "https://cclamazonia.noblogs.org/",
      CATALOGO: `${GH_BASE}/anarbib-staging/index.html`,
      CADASTRO: `${GH_BASE}/anarbib-conta-staging/cadastro.html`,
      CONTA: `${GH_BASE}/anarbib-conta-staging/conta.html`,
      PAINEL: `${GH_BASE}/anarbib-conta-staging/painel.html`,
      AUTOR: new URL("autor.html", location.href).toString(),
      AUTHOR_PAGE_VERSION: '20260313-1',
    };

    document.getElementById("btnCatalogo").href = ROUTES.CATALOGO;

    const EXTERNAL_BOOK_COVERS_BASE_URL = "https://asptfmokzykwzlshsncw.supabase.co/storage/v1/object/public/covers/books";
    const $ = (id) => document.getElementById(id);

    function apiFrom(schema, relation) {
      if (typeof supabase?.schema === "function") {
        return supabase.schema(schema).from(relation);
      }
      return supabase.from(`${schema}.${relation}`);
    }

    function firstNonEmptyString(...values) {
      for (const value of values) {
        const txt = String(value ?? "").trim();
        if (txt) return txt;
      }
      return "";
    }

    function buildExternalBookCoverUrl(pathOrUrl) {
      const raw = String(pathOrUrl || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      const clean = raw
        .replace(/^\/+/, "")
        .replace(/^covers\/+?books\/+?/i, "")
        .replace(/^covers\/+?/i, "")
        .replace(/^books\/+?/i, "");
      return clean ? `${EXTERNAL_BOOK_COVERS_BASE_URL}/${clean}` : "";
    }

    function buildCadastroUrl(nextUrl = location.href) {
      const u = new URL(ROUTES.CADASTRO);
      u.searchParams.set("next", nextUrl);
      return u.toString();
    }

    document.getElementById("btnEntrar").href = buildCadastroUrl(location.href);

    const DEFAULT_SERVICE_MESSAGES = {
      funcionamento_normal: "A biblioteca está em funcionamento normal. Consulte os canais da biblioteca para informações atualizadas.",
      somente_consulta: "A biblioteca está aberta apenas para consulta local no momento. Consulte os canais da biblioteca para orientações atualizadas.",
      pausada: "A biblioteca está fechada ao público no momento. Consulte os canais da biblioteca para atualizações e orientações.",
      em_organizacao: "A biblioteca está em organização. O atendimento ocorre conforme a capacidade operacional atual.",
      atendimento_eventual: "A biblioteca funciona com atendimento eventual. Consulte os canais da biblioteca para informações atualizadas.",
      atendimento_semanal: "A biblioteca funciona com atendimento semanal em ritmo regular. Consulte os canais da biblioteca para os horários e orientações vigentes.",
      fechado_temporariamente: "A biblioteca está temporariamente fechada para atendimento presencial. Consulte os canais da biblioteca para atualizações e orientações."
    };

    const SERVICE_MODE_LABELS = {
      funcionamento_normal: "Funcionamento normal",
      somente_consulta: "Somente consulta local",
      pausada: "Fechada ao público",
      em_organizacao: "Em organização",
      atendimento_eventual: "Atendimento eventual",
      atendimento_semanal: "Atendimento semanal",
      fechado_temporariamente: "Fechado temporariamente"
    };

    let publicServiceState = null;
    let currentBookAccessState = {
      key: "",
      label: "",
      cls: "",
      canReserve: true,
      allowLoginReserve: true,
      reserveTitle: "Reservar este livro"
    };
    let currentUserContext = {
      isLoggedIn: false,
      userId: "",
      isLibrarian: false,
      profile: null,
      libraryId: "",
      librarySlug: "",
      libraryName: ""
    };
    let currentResolvedLibraryContext = { libraryId: "", librarySlug: "", libraryName: "" };
    let currentSessionCatalogRow = null;


    function setReserveButtonState(buttonState = {}) {
      currentBookAccessState = {
        key: String(buttonState?.key || "").trim(),
        label: String(buttonState?.label || "").trim(),
        cls: String(buttonState?.cls || "").trim(),
        canReserve: buttonState?.canReserve !== false,
        allowLoginReserve: buttonState?.allowLoginReserve !== false,
        reserveTitle: String(buttonState?.reserveTitle || "Reservar este livro").trim() || "Reservar este livro"
      };
      applyPublicServiceState();
    }

    function normalizeCount(value) {
      const n = Number(value);
      return Number.isFinite(n) && n > 0 ? n : 0;
    }

    function getSessionHoldingForBook(bookRow = {}) {
      const sessionScope = {
        libraryId: currentUserContext?.libraryId,
        librarySlug: currentUserContext?.librarySlug,
        libraryName: currentUserContext?.libraryName
      };

      if (!(sessionScope.libraryId || sessionScope.librarySlug || sessionScope.libraryName)) {
        return null;
      }

      const matchedHolding = findHoldingForLibraryContext(bookRow?.holding_libraries_json, sessionScope);
      if (matchedHolding) {
        return matchedHolding;
      }

      const directScope = {
        libraryId: firstNonEmptyString(bookRow?.library_id),
        librarySlug: firstNonEmptyString(bookRow?.library_slug),
        libraryName: firstNonEmptyString(bookRow?.library_name, bookRow?.biblioteca)
      };

      if (librariesMatch(sessionScope, directScope)) {
        return {
          library_id: directScope.libraryId,
          library_slug: directScope.librarySlug,
          library_name: directScope.libraryName,
          exemplares_total: bookRow?.exemplares_total,
          loanable: bookRow?.loanable
        };
      }

      return null;
    }

    function normalizeSessionStatusHint(value) {
      const hint = normalizeLoose(value);
      if (!hint) return "";
      if (["available", "disponivel", "disponivel agora"].includes(hint)) return "available";
      if (["unavailable now", "unavailable_now", "unavailable", "indisponivel no momento", "indisponivel_now", "indisponivel"].includes(hint)) return "unavailable_now";
      if (["not for you", "not_for_you", "unavailable for you", "unavailable_for_you", "indisponivel para voce", "indisponivel_para_voce", "no session holding", "no_session_holding"].includes(hint)) return "not_for_you";
      if (["other library", "other_library", "present elsewhere", "present_elsewhere", "presente em outra biblioteca", "presente_em_outra_biblioteca", "excluded by filter", "excluded_by_filter"].includes(hint)) return "other_library";
      if (["local only", "local_only", "consultavel no lugar", "consultavel_no_lugar", "consultation only", "consultation_only", "in place only", "in_place_only", "non loanable", "non_loanable"].includes(hint)) return "local_only";
      if (["check", "check availability", "check_availability", "verificar", "disponibilidade a verificar"].includes(hint)) return "check";
      return "";
    }

    function pickSessionCatalogRow(rows = [], libraryContext = {}, bookRow = {}) {
      const list = Array.isArray(rows) ? rows.filter(Boolean) : [];
      if (!list.length) return null;

      const explicitScope = {
        libraryId: firstNonEmptyString(libraryContext?.libraryId),
        librarySlug: firstNonEmptyString(libraryContext?.librarySlug),
        libraryName: firstNonEmptyString(libraryContext?.libraryName)
      };
      const resolvedScope = {
        libraryId: firstNonEmptyString(currentResolvedLibraryContext?.libraryId),
        librarySlug: firstNonEmptyString(currentResolvedLibraryContext?.librarySlug),
        libraryName: firstNonEmptyString(currentResolvedLibraryContext?.libraryName)
      };
      const sessionScope = {
        libraryId: firstNonEmptyString(currentUserContext?.libraryId),
        librarySlug: firstNonEmptyString(currentUserContext?.librarySlug),
        libraryName: firstNonEmptyString(currentUserContext?.libraryName)
      };

      const matchRow = (scope) => {
        if (!(scope?.libraryId || scope?.librarySlug || scope?.libraryName)) return null;
        return list.find((row) => librariesMatch({
          libraryId: firstNonEmptyString(row?.library_id),
          librarySlug: firstNonEmptyString(row?.library_slug),
          libraryName: firstNonEmptyString(row?.library_name, row?.biblioteca)
        }, scope)) || null;
      };

      return matchRow(explicitScope)
        || matchRow(resolvedScope)
        || matchRow(sessionScope)
        || list[0]
        || null;
    }

    async function fetchSessionCatalogRowsByBibRef(bibRef) {
      const cleanRef = String(bibRef || "").trim();
      if (!cleanRef) return [];

      const attempts = [
        () => apiFrom("api", "catalog_books_public_session_v1").select("*").eq("bib_ref", cleanRef).limit(50),
        () => supabase.from("api.catalog_books_public_session_v1").select("*").eq("bib_ref", cleanRef).limit(50)
      ];

      for (const run of attempts) {
        try {
          const { data, error } = await run();
          if (!error && Array.isArray(data)) return data;
        } catch (_) {}
      }

      return [];
    }

    async function loadSessionScopedBookState(bibRef, libraryContext = {}, bookRow = {}) {
      currentSessionCatalogRow = null;
      if (!currentUserContext?.isLoggedIn) return null;
      const rows = await fetchSessionCatalogRowsByBibRef(bibRef);
      const picked = pickSessionCatalogRow(rows, libraryContext, bookRow);
      currentSessionCatalogRow = picked || null;
      return currentSessionCatalogRow;
    }

    function computeBookAccessState(bookRow = {}, libraryContext = {}) {
      const loanable = bookRow?.loanable !== false;

      if (!currentUserContext?.isLoggedIn) {
        if (!loanable) {
          return {
            key: "local_only",
            label: "Consultável no lugar",
            cls: "warn",
            canReserve: false,
            allowLoginReserve: false,
            reserveTitle: "Consulta local"
          };
        }
        return {
          key: "check",
          label: "Disponibilidade a verificar",
          cls: "warn",
          canReserve: true,
          allowLoginReserve: true,
          reserveTitle: "Entre para reservar"
        };
      }

      const sessionHolding = getSessionHoldingForBook(bookRow);
      const sessionCatalogRow = currentSessionCatalogRow || null;
      const sessionHint = normalizeSessionStatusHint(sessionCatalogRow?.session_status_hint);
      const sessionHasHolding = typeof sessionCatalogRow?.session_has_holding === "boolean"
        ? sessionCatalogRow.session_has_holding
        : null;
      const hasSessionHolding = sessionHasHolding === true || !!sessionHolding;

      if (sessionHint === "not_for_you" || (!hasSessionHolding && sessionHasHolding !== true)) {
        return {
          key: "not_for_you",
          label: "Indisponível para você",
          cls: "warn",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Indisponível para sua biblioteca"
        };
      }

      const effectivePageContext = {
        libraryId: firstNonEmptyString(libraryContext?.libraryId, currentResolvedLibraryContext?.libraryId),
        librarySlug: firstNonEmptyString(libraryContext?.librarySlug, currentResolvedLibraryContext?.librarySlug),
        libraryName: firstNonEmptyString(libraryContext?.libraryName, currentResolvedLibraryContext?.libraryName)
      };
      const explicitContextActive = !!(effectivePageContext?.libraryId || effectivePageContext?.librarySlug || effectivePageContext?.libraryName);
      const sessionScope = {
        libraryId: currentUserContext?.libraryId,
        librarySlug: currentUserContext?.librarySlug,
        libraryName: currentUserContext?.libraryName
      };
      const contextMatchesSession = !explicitContextActive || librariesMatch(effectivePageContext, sessionScope);

      if (sessionHint === "other_library" || !contextMatchesSession) {
        return {
          key: "other_library",
          label: "Presente em outra biblioteca",
          cls: "warn",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Mude para sua biblioteca para reservar"
        };
      }

      const effectiveLoanable = sessionCatalogRow?.loanable !== false && sessionHolding?.loanable !== false && loanable;
      if (sessionHint === "local_only" || !effectiveLoanable) {
        return {
          key: "local_only",
          label: "Consultável no lugar",
          cls: "warn",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Consulta local"
        };
      }

      const sessionExemplaresTotal = normalizeCount(
        sessionCatalogRow?.session_exemplares_total
        ?? sessionHolding?.session_exemplares_total
        ?? sessionHolding?.exemplares_total
        ?? bookRow?.session_exemplares_total
        ?? bookRow?.exemplares_total
        ?? 0
      );

      if (sessionHint === "available") {
        return {
          key: "available",
          label: "Disponível",
          cls: "ok",
          canReserve: true,
          allowLoginReserve: true,
          reserveTitle: "Reservar este livro"
        };
      }

      if (sessionHint === "unavailable_now") {
        return {
          key: "unavailable_now",
          label: "Indisponível no momento",
          cls: "warn",
          canReserve: false,
          allowLoginReserve: false,
          reserveTitle: "Indisponível no momento"
        };
      }

      if (sessionExemplaresTotal > 0) {
        return {
          key: "available",
          label: "Disponível",
          cls: "ok",
          canReserve: true,
          allowLoginReserve: true,
          reserveTitle: "Reservar este livro"
        };
      }

      return {
        key: "unavailable_now",
        label: "Indisponível no momento",
        cls: "warn",
        canReserve: false,
        allowLoginReserve: false,
        reserveTitle: "Indisponível no momento"
      };
    }

    function extractHoldingLibraryNames(raw) {
      const rows = Array.isArray(raw)
        ? raw
        : (typeof raw === "string" && raw.trim()
            ? (() => {
                try { return JSON.parse(raw); } catch (_) { return []; }
              })()
            : []);

      const names = [];
      for (const row of rows) {
        const label = firstNonEmptyString(row?.library_name, row?.biblioteca, row?.name)
          .split(" - ")[0]
          .trim();
        if (label && !names.includes(label)) names.push(label);
      }
      return names;
    }

    function parseJsonArray(raw) {
      if (Array.isArray(raw)) return raw;
      if (typeof raw === "string" && raw.trim()) {
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
          return [];
        }
      }
      return [];
    }

    function normalizeLoose(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function extractProfileLibraryScope(profile) {
      return {
        libraryId: firstNonEmptyString(profile?.library_id, profile?.biblioteca_id, profile?.default_library_id, profile?.home_library_id),
        librarySlug: firstNonEmptyString(profile?.library_slug, profile?.biblioteca_slug, profile?.default_library_slug, profile?.home_library_slug),
        libraryName: firstNonEmptyString(profile?.library_name, profile?.biblioteca, profile?.biblioteca_nome, profile?.default_library_name, profile?.home_library_name)
      };
    }

    function librariesMatch(a = {}, b = {}) {
      const aId = String(a.libraryId || "").trim();
      const bId = String(b.libraryId || "").trim();
      if (aId && bId) return aId === bId;

      const aSlug = normalizeLoose(a.librarySlug);
      const bSlug = normalizeLoose(b.librarySlug);
      if (aSlug && bSlug) return aSlug === bSlug;

      const aName = normalizeLoose(firstNonEmptyString(a.libraryName).split(" - ")[0]);
      const bName = normalizeLoose(firstNonEmptyString(b.libraryName).split(" - ")[0]);
      return !!(aName && bName && aName === bName);
    }

    function findHoldingForLibraryContext(rawHoldings, libraryContext = {}) {
      const holdings = parseJsonArray(rawHoldings);
      if (!holdings.length) return null;

      const ctxId = String(libraryContext?.libraryId || "").trim();
      const ctxSlug = normalizeLoose(libraryContext?.librarySlug);
      const ctxName = normalizeLoose(firstNonEmptyString(libraryContext?.libraryName).split(" - ")[0]);

      if (ctxId) {
        const matchById = holdings.find((row) => String(row?.library_id || "").trim() === ctxId);
        if (matchById) return matchById;
      }
      if (ctxSlug) {
        const matchBySlug = holdings.find((row) => normalizeLoose(row?.library_slug) === ctxSlug);
        if (matchBySlug) return matchBySlug;
      }
      if (ctxName) {
        const matchByName = holdings.find((row) => normalizeLoose(firstNonEmptyString(row?.library_name).split(" - ")[0]) === ctxName);
        if (matchByName) return matchByName;
      }
      return null;
    }

    function resolveBookPageLibraryScope(bookRow = {}, libraryContext = {}) {
      const direct = {
        libraryId: firstNonEmptyString(libraryContext?.libraryId, bookRow?.library_id),
        librarySlug: firstNonEmptyString(libraryContext?.librarySlug, bookRow?.library_slug),
        libraryName: firstNonEmptyString(libraryContext?.libraryName, bookRow?.library_name, bookRow?.biblioteca)
      };
      if (direct.libraryId || direct.librarySlug || direct.libraryName) return direct;

      const holdings = parseJsonArray(bookRow?.holding_libraries_json);
      if (holdings.length === 1) {
        return {
          libraryId: firstNonEmptyString(holdings[0]?.library_id),
          librarySlug: firstNonEmptyString(holdings[0]?.library_slug),
          libraryName: firstNonEmptyString(holdings[0]?.library_name)
        };
      }

      return { libraryId: "", librarySlug: "", libraryName: "" };
    }

    function buildLibraryScopeFromHolding(holding = {}) {
      return {
        libraryId: firstNonEmptyString(holding?.library_id),
        librarySlug: firstNonEmptyString(holding?.library_slug),
        libraryName: firstNonEmptyString(holding?.library_name, holding?.biblioteca, holding?.name)
      };
    }

    function normalizeServiceStateRow(row) {
      if (!row || typeof row !== "object") return null;
      const allowReservationsRaw = row.allow_reservations;
      const allowsNewReservationsRaw = row.allows_new_reservations;
      return {
        library_id: firstNonEmptyString(row.library_id),
        slug: firstNonEmptyString(row.slug, row.library_slug),
        name: firstNonEmptyString(row.name, row.library_name),
        service_mode: String(row.service_mode || "").trim(),
        public_message: String(row.public_message || "").trim(),
        allow_reservations: typeof allowReservationsRaw === "boolean"
          ? allowReservationsRaw
          : (typeof allowsNewReservationsRaw === "boolean" ? allowsNewReservationsRaw : true),
        updated_at: row.updated_at || null
      };
    }

    async function fetchLibraryServiceStateByScope(scope = {}) {
      if (!scope?.libraryId && !scope?.librarySlug && !scope?.libraryName) return null;
      try {
        let query = supabase
          .from("v_library_service_public")
          .select("*")
          .limit(1);

        if (scope.libraryId) query = query.eq("library_id", scope.libraryId);
        else if (scope.librarySlug) query = query.eq("slug", scope.librarySlug);
        else if (scope.libraryName) query = query.eq("name", scope.libraryName);
        else return null;

        const { data, error } = await query.maybeSingle();
        if (error || !data) return null;
        return normalizeServiceStateRow(data);
      } catch (err) {
        console.warn("AnarBib livro: falha ao consultar funcionamento da biblioteca", err);
        return null;
      }
    }

    async function loadBookServiceState(bookRow = {}, libraryContext = {}) {
      publicServiceState = null;
      applyPublicServiceState();
      applyReaderScopedServiceChip(null);

      const profileScope = {
        libraryId: currentUserContext?.libraryId,
        librarySlug: currentUserContext?.librarySlug,
        libraryName: currentUserContext?.libraryName
      };

      let serviceScope = { libraryId: "", librarySlug: "", libraryName: "" };

      if (profileScope.libraryId || profileScope.librarySlug || profileScope.libraryName) {
        const matchedHolding = findHoldingForLibraryContext(bookRow?.holding_libraries_json, profileScope);
        if (matchedHolding) serviceScope = buildLibraryScopeFromHolding(matchedHolding);
      }

      if (!serviceScope.libraryId && !serviceScope.librarySlug && !serviceScope.libraryName) {
        serviceScope = resolveBookPageLibraryScope(bookRow, libraryContext);
      }

      const state = await fetchLibraryServiceStateByScope(serviceScope);
      if (!state) return;

      publicServiceState = state;
      applyPublicServiceState();

      const resolvedStateScope = {
        libraryId: firstNonEmptyString(state?.library_id),
        librarySlug: firstNonEmptyString(state?.slug),
        libraryName: firstNonEmptyString(state?.name)
      };

      if (currentUserContext?.isLoggedIn && librariesMatch(profileScope, resolvedStateScope)) {
        applyReaderScopedServiceChip(state);
      }
    }

    function applyReaderScopedServiceChip(state) {
      const chip = $("serviceModePill");
      const line = $("serviceMessageLine");
      if (line) {
        line.style.display = "none";
        line.textContent = "";
      }
      if (!chip) return;

      const label = getServiceModeLabel(state?.service_mode);
      if (!label) {
        chip.style.display = "none";
        chip.textContent = "";
        return;
      }

      setPill("serviceModePill", "funcionamento", label);
    }

    async function loadReaderScopedServiceChip(bookRow = {}, libraryContext = {}) {
      await loadBookServiceState(bookRow, libraryContext);
    }

    async function getDigitalAvailabilityForBibRef(bib_ref, bookRow = null) {
      if (bookRow && typeof bookRow?.has_online_reading === "boolean") {

    async function getLibraryLineForBibRef(bib_ref, bookRow = null, libraryContext = {}) {
  const localContextRequested = !!(libraryContext?.libraryId || libraryContext?.librarySlug);
  const preferredLocal = firstNonEmptyString(
    bookRow?.library_name,
    bookRow?.biblioteca,
    libraryContext?.libraryName
  );
  if (localContextRequested && preferredLocal) {
    return String(preferredLocal).split(" - ")[0].trim();
  }

  const matchedHolding = findHoldingForLibraryContext(bookRow?.holding_libraries_json, libraryContext);
  if (matchedHolding) {
    const matchedLabel = firstNonEmptyString(matchedHolding?.library_name, matchedHolding?.biblioteca, matchedHolding?.name);
    if (matchedLabel) return String(matchedLabel).split(" - ")[0].trim();
  }

  const holdingNames = extractHoldingLibraryNames(bookRow?.holding_libraries_json);
  if (!localContextRequested && holdingNames.length) {
    return holdingNames.join(" / ");
  }

  try {
    const { data, error } = await supabase
      .from("v_book_detail_public_v2")
      .select("holding_libraries_json,biblioteca,library_id,library_slug,library_name")
      .eq("bib_ref", bib_ref)
      .maybeSingle();

    if (!error && data) {
      const localHolding = findHoldingForLibraryContext(data?.holding_libraries_json, libraryContext);
      if (localHolding) {
        const localLabel = firstNonEmptyString(localHolding?.library_name, localHolding?.biblioteca, localHolding?.name);
        if (localLabel) return String(localLabel).split(" - ")[0].trim();
      }

      const names = extractHoldingLibraryNames(data?.holding_libraries_json);
      if (names.length) return names.join(" / ");

      const fallbackLabel = firstNonEmptyString(data?.library_name, data?.biblioteca);
      if (fallbackLabel) return String(fallbackLabel).split(" - ")[0].trim();
    }
  } catch (err) {
    console.warn("AnarBib livro: falha ao consultar bibliotecas na v_book_detail_public_v2", err);
  }

  try {
    let query = supabase
      .from("v_books_public")
      .select("library_id,library_slug,library_name,biblioteca")
      .eq("bib_ref", bib_ref)
      .limit(50);

    if (localContextRequested) {
      if (libraryContext?.libraryId) query = query.eq("library_id", libraryContext.libraryId);
      else if (libraryContext?.librarySlug) query = query.eq("library_slug", libraryContext.librarySlug);
    }

    const { data, error } = await query;

    if (!error && Array.isArray(data) && data.length) {
      if (localContextRequested) {
        const label = firstNonEmptyString(data[0]?.library_name, data[0]?.biblioteca);
        if (label) return String(label).split(" - ")[0].trim();
      }

      const names = [];
      for (const row of data) {
        const preferred = firstNonEmptyString(row?.library_name, row?.biblioteca);
        const cleaned = String(preferred || "")
          .split(" - ")[0]
          .trim();
        if (cleaned && !names.includes(cleaned)) names.push(cleaned);
      }
      if (names.length) return names.join(" / ");
    }
  } catch (err) {
    console.warn("AnarBib livro: falha ao consultar bibliotecas na v_books_public", err);
  }
  return preferredLocal ? String(preferredLocal).split(" - ")[0].trim() : "";
}

    function sanitizePublicResumo(value) {
      return String(value || "")
        .replace(/\r\n?/g, "\n")
        .split("\n")
        .filter((line) => {
          const norm = String(line || "").trim().toLowerCase();
          if (!norm) return true;
          return !(/^(catalog_source|origem do import|import btl|importado da btl)\b/.test(norm)
            || /\b(btl_import_staging|terra_livre_import_staging|blmf_manual_legacy|blmf_reinjection_biblivre)\b/.test(norm));
        })
        .join("\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function getServiceModeLabel(mode) {
      return SERVICE_MODE_LABELS[String(mode || "").trim()] || "";
    }

    function getServiceMessage(state) {
      const custom = String(state?.public_message || "").trim();
      if (custom) return custom;
      return DEFAULT_SERVICE_MESSAGES[String(state?.service_mode || "").trim()] || "";
    }

    function formatExemplarCount(count) {
      const n = Number(count || 0);
      if (!Number.isFinite(n) || n <= 0) return "";
      return n === 1 ? "1 exemplar identificado" : `${n} exemplares identificados`;
    }

    function summarizeHoldings(rawHoldings, libraryContext = {}) {
      const holdings = parseJsonArray(rawHoldings);
      if (!holdings.length) {
        return { lines: [], totalCount: 0, libraryLine: "" };
      }

      let scoped = holdings;
      if (libraryContext?.libraryId || libraryContext?.librarySlug || libraryContext?.libraryName) {
        const matched = findHoldingForLibraryContext(holdings, libraryContext);
        if (matched) scoped = [matched];
      }

      const grouped = new Map();
      for (const row of scoped) {
        const libraryName = firstNonEmptyString(row?.library_name, row?.biblioteca, row?.name)
          .split(" - ")[0]
          .trim();
        if (!libraryName) continue;

        const rowTombos = parseJsonArray(row?.tombos_json)
          .map(v => String(v || "").trim())
          .filter(Boolean);
        const countCandidates = [row?.exemplares_total, row?.holdings_count, row?.copies_count, row?.items_count, row?.count]
          .map(v => Number(v))
          .filter(v => Number.isFinite(v) && v > 0);
        const count = countCandidates.length ? countCandidates[0] : rowTombos.length;
        const previous = grouped.get(libraryName) || { libraryName, count: 0 };
        previous.count += count;
        grouped.set(libraryName, previous);
      }

      const lines = [...grouped.values()].map(entry => ({
        libraryName: entry.libraryName,
        count: entry.count,
        label: formatExemplarCount(entry.count)
      }));

      return {
        lines,
        totalCount: lines.reduce((sum, entry) => sum + (Number(entry.count) || 0), 0),
        libraryLine: lines.map(entry => entry.libraryName).join(" / ")
      };
    }

    function renderHeroHoldingsDetail(holdingsInfo) {

      const lines = Array.isArray(holdingsInfo?.lines) ? holdingsInfo.lines : [];
      if (!lines.length) {

        host.style.display = "none";
        return;
      }

      host.innerHTML = "";
      for (const entry of lines) {
        if (!entry?.libraryName || !entry?.label) continue;
        const line = document.createElement("div");
        line.className = "hero-holding-line";
        line.innerHTML = `<span class="hero-holding-library">${entry.libraryName}</span><span>— ${entry.label}</span>`;
        host.appendChild(line);
      }
      host.style.display = "flex";
    }

    function buildHeroIntro({ tipoMaterial, libraryLine, editora, ano, tombosCount }) {
      const parts = [];
      const tipo = String(tipoMaterial || "").trim();
      const libraries = String(libraryLine || "").trim();
      const fallbackPub = String(editora || "").trim();
      const year = String(ano || "").trim();

      if (tipo) parts.push(tipo);
      if (libraries) parts.push(libraries);
      else if (fallbackPub) parts.push(fallbackPub);
      if (year) parts.push(year);

      const countLabel = formatExemplarCount(tombosCount);
      if (countLabel) {
        parts.push(countLabel);
      }

      return parts.join(" · ") || "Livro publicado no catálogo AnarBib.";
    }

    function applyPublicServiceState() {
      const state = publicServiceState;
      const btnReservar = $("btnReservar");
      const serviceModePill = $("serviceModePill");
      const serviceMessageLine = $("serviceMessageLine");

      if (serviceModePill) {
        serviceModePill.style.display = "none";
        serviceModePill.textContent = "";
      }
      if (serviceMessageLine) {
        serviceMessageLine.style.display = "none";
        serviceMessageLine.textContent = "";

      const baseTitle = currentBookAccessState?.reserveTitle || "Reservar este livro";

      if (state?.allow_reservations === false) {
        btnReservar.textContent = "Reservas temporariamente fechadas";
        btnReservar.classList.add("disabled");
        btnReservar.setAttribute("aria-disabled", "true");
        btnReservar.disabled = true;
        btnReservar.style.display = "inline-flex";
        btnReservar.title = "As reservas públicas estão temporariamente fechadas no momento.";
        return;
      }

      btnReservar.textContent = baseTitle;
      btnReservar.style.display = "inline-flex";

        btnReservar.disabled = true;
        btnReservar.title = baseTitle;
        return;
      }

      btnReservar.classList.remove("disabled");
      btnReservar.setAttribute("aria-disabled", "false");
      btnReservar.disabled = false;

    async function loadPublicServiceState() {
      const { data, error } = await supabase
        .from("v_library_service_public")
        .select("*")
        .limit(1)
        .maybeSingle();

      if (error) {

        public_message: String(data.public_message || "").trim(),
        updated_at: data.updated_at || null
      } : null;

      applyPublicServiceState();

    function normalizeAuthorName(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function splitAuthorDisplay(raw) {
      const txt = String(raw || "").trim();
      if (!txt) return [];
      return txt.split(/\s*;\s*/).map(v => String(v || "").trim()).filter(Boolean);
    }

    function buildAuthorVariants(name) {
      const out = new Set();
      const clean = String(name || "").trim();
      const base = normalizeAuthorName(clean);
      if (base) out.add(base);
      if (clean.includes(",")) {
        const bits = clean.split(",").map(v => v.trim()).filter(Boolean);
        if (bits.length >= 2) {
          const swapped = normalizeAuthorName(bits.slice(1).join(" ") + " " + bits[0]);
          if (swapped) out.add(swapped);
        }
      }
      return Array.from(out);
    }

    function authorUrl(authorId) {
      const params = new URLSearchParams();
      params.set("v", ROUTES.AUTHOR_PAGE_VERSION);
      params.set("_cb", `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`);
      if (authorId != null && String(authorId).trim()) {
        const id = String(authorId).trim();
        params.set("id", id);
        params.set("author_id", id);
      }
      const libraryContext = {
        libraryId: firstNonEmptyString(currentResolvedLibraryContext?.libraryId, getLibraryContextFromUrl()?.libraryId),
        librarySlug: firstNonEmptyString(currentResolvedLibraryContext?.librarySlug, getLibraryContextFromUrl()?.librarySlug),
        libraryName: firstNonEmptyString(currentResolvedLibraryContext?.libraryName, getLibraryContextFromUrl()?.libraryName)
      };
      if (libraryContext?.libraryId) params.set("library_id", libraryContext.libraryId);
      if (libraryContext?.librarySlug) params.set("library_slug", libraryContext.librarySlug);
      if (libraryContext?.libraryName) params.set("library_name", libraryContext.libraryName);
      return `${ROUTES.AUTOR}?${params.toString()}`;
    }

    async function renderBookAuthors(authorText, bookRow) {
      const host = $("authorLine");
      if (!host) return;

      const names = splitAuthorDisplay(authorText);
      const linkedAuthors = [];

      const rawJson = bookRow?.authors_json;
      if (Array.isArray(rawJson)) {
        linkedAuthors.push(...rawJson);
      } else if (typeof rawJson === "string" && rawJson.trim()) {
        try {
          const parsed = JSON.parse(rawJson);
          if (Array.isArray(parsed)) linkedAuthors.push(...parsed);
        } catch (_) {}
      }

      if (!linkedAuthors.length) {
        try {
          let rel = null;
          if (bookRow?.id != null) {
            const byBookId = await supabase
              .from("author_books_public")
              .select("author_id,author_name,preferred_name,sort_name,book_id,bib_ref,role,ord")
              .eq("book_id", bookRow.id)
              .order("ord", { ascending: true })
              .limit(20);
            if (!byBookId.error && Array.isArray(byBookId.data) && byBookId.data.length) rel = byBookId;
          }
          if ((!rel || !rel.data?.length) && bookRow?.bib_ref) {
            const byBibRef = await supabase
              .from("author_books_public")
              .select("author_id,author_name,preferred_name,sort_name,book_id,bib_ref,role,ord")
              .eq("bib_ref", bookRow.bib_ref)
              .order("ord", { ascending: true })
              .limit(20);
            if (!byBibRef.error && Array.isArray(byBibRef.data) && byBibRef.data.length) rel = byBibRef;
          }
          if (rel && Array.isArray(rel.data) && rel.data.length) {
            linkedAuthors.push(...rel.data.map(row => ({
              id: row.author_id,
              display_name: row.author_name,
              preferred_name: row.preferred_name,
              sort_name: row.sort_name,
              ord: row.ord
            })));
          }
        } catch (_) {}
      }

      host.innerHTML = "";
      host.classList.add("author-inline-wrap");

      const entries = names.map(name => ({ label: name, authorId: null }));
      const matchedLinkedAuthors = new Set();
      const canUseOrdinalFallback = names.length > 0 && linkedAuthors.length === names.length;

      const findMatchingEntryIndex = (row) => {
        const targetVariants = new Set();
        [row?.display_name, row?.preferred_name, row?.sort_name, row?.name]
          .filter(Boolean)
          .forEach(value => buildAuthorVariants(value).forEach(variant => targetVariants.add(variant)));
        if (!targetVariants.size) return -1;

        const matches = [];
        entries.forEach((entry, index) => {
          if (entry.authorId) return;
          for (const variant of buildAuthorVariants(entry.label)) {
            if (targetVariants.has(variant)) {
              matches.push(index);
              break;
            }
          }
        });
        return matches.length === 1 ? matches[0] : -1;
      };

      linkedAuthors.forEach((row, linkedIndex) => {
        const authorId = row?.id ?? row?.author_id ?? null;
        if (!authorId) return;
        const matchIndex = findMatchingEntryIndex(row);
        if (matchIndex < 0) return;
        entries[matchIndex].authorId = authorId;
        matchedLinkedAuthors.add(linkedIndex);
      });

      if (canUseOrdinalFallback) {
        linkedAuthors.forEach((row, linkedIndex) => {
          if (matchedLinkedAuthors.has(linkedIndex)) return;
          const authorId = row?.id ?? row?.author_id ?? null;
          if (!authorId) return;
          const ordNumber = Number(row?.ord);
          const fallbackIndex = Number.isInteger(ordNumber) && ordNumber >= 1 && ordNumber <= entries.length
            ? ordNumber - 1
            : (linkedIndex < entries.length ? linkedIndex : -1);
          if (fallbackIndex < 0 || fallbackIndex >= entries.length) return;
          if (entries[fallbackIndex]?.authorId) return;
          entries[fallbackIndex].authorId = String(authorId).trim();
          matchedLinkedAuthors.add(linkedIndex);
        });
      }

      if (!entries.length) {
        linkedAuthors.forEach((row) => {
          const label = String(row?.display_name || row?.preferred_name || row?.sort_name || row?.name || "").trim();
          const authorId = row?.id ?? row?.author_id ?? null;
          if (!label) return;
          entries.push({ label, authorId });
        });
      }

      if (entries.length === 1 && !entries[0].authorId && bookRow?.author_id != null) {
        entries[0].authorId = String(bookRow.author_id).trim();
      }

      const dedupedEntries = [];
      const seenEntries = new Set();
      entries.forEach((entry) => {
        const label = String(entry?.label || "").trim();
        if (!label) return;
        const key = entry?.authorId != null && String(entry.authorId).trim()
          ? `id:${String(entry.authorId).trim()}`
          : `label:${normalizeAuthorName(label)}`;
        if (seenEntries.has(key)) return;
        seenEntries.add(key);
        dedupedEntries.push({ label, authorId: entry?.authorId != null ? String(entry.authorId).trim() : "" });
      });

      if (!dedupedEntries.length) {
        host.textContent = "—";
        return;
      }

      dedupedEntries.forEach((entry, idx) => {
        const label = String(entry.label || "").trim();
        if (!label) return;

        if (entry.authorId) {
          const a = document.createElement("a");
          a.className = "author-card-link";
          a.href = authorUrl(entry.authorId);
          a.dataset.authorId = String(entry.authorId);
          a.textContent = label;
          host.appendChild(a);
        } else {
          const span = document.createElement("span");
          span.className = "author-card-static";
          span.textContent = label;
          span.setAttribute("aria-disabled", "true");
          host.appendChild(span);
        }

        if (idx < dedupedEntries.length - 1) {
          const sep = document.createElement("span");
          sep.className = "author-separator";
          sep.textContent = ";";
          host.appendChild(sep);
        }
      });
    }

    const nk = (s) => String(s || "").normalize("NFD").replace(/\p{Diacritic}/gu, "").toLowerCase();

    function findCol(keys, wanted) {
      const map = new Map(keys.map(k => [nk(k), k]));
      for (const w of wanted) {
        const hit = map.get(nk(w));
        if (hit) return hit;
      }
      return null;
    }

    async function pickFirstExistingTable(candidates) {
      for (const t of candidates) {
        const { error } = await supabase.from(t).select("*").limit(1);
        if (!error) return t;
      }
      return null;
    }

    async function reserve(bib_ref) {
      setStatus("", "");

      if (publicServiceState?.allow_reservations === false) {
        setStatus("As reservas públicas estão temporariamente fechadas no momento.", "warn");
        return;
      }

      if (currentBookAccessState?.canReserve === false && currentUserContext?.isLoggedIn) {
        setStatus(currentBookAccessState?.label || "Esta reserva não está disponível neste contexto.", currentBookAccessState?.cls || "warn");
        return;
      }

      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        if (currentBookAccessState?.allowLoginReserve === false) {
          setStatus(currentBookAccessState?.label || "Esta reserva não está disponível neste contexto.", currentBookAccessState?.cls || "warn");
          return;
        }
        setStatus("Para reservar, você precisa entrar.", "warn");
        location.assign(buildCadastroUrl(location.href));
        return;
      }

      const { error } = await supabase.rpc("fn_v2_create_reserva_by_bib_refs", {
        p_user_id: session.user.id,
        p_bib_refs: [bib_ref],
        p_expires_at: null,
        p_notes: "Reserva criada pela página pública do livro."
      });

      if (error) {
        setStatus("Não foi possível reservar: " + error.message, "warn");
        return;
      }

      setStatus("Reserva registrada.", "ok");
    }

      try {

      async function loadTombosForBook(bookRow, bib_ref, libraryContext = {}) {
        const matchedHolding = findHoldingForLibraryContext(bookRow?.holding_libraries_json, libraryContext);
        let tombos = parseJsonArray(matchedHolding?.tombos_json)
          .map(v => String(v || "").trim())
          .filter(Boolean);

        if (!tombos.length) {
          tombos = parseJsonArray(bookRow?.tombos_json)
            .map(v => String(v || "").trim())
            .filter(Boolean);
        }

        const inBook = findCol(Object.keys(bookRow || {}), ["tombo", "rotulo", "rótulo", "etiqueta", "label"]);

        if (!tombos.length && inBook && bookRow?.[inBook] != null) {
          const raw = bookRow[inBook];
          if (Array.isArray(raw)) {
            tombos = raw
              .flatMap(v => String(v || "").split(/[;,\n]+/))
              .map(v => String(v || "").trim())
              .filter(Boolean);
          } else {
            tombos = String(raw || "")
              .split(/[;,\n]+/)
              .map(v => String(v || "").trim())
              .filter(Boolean);
          }
        }

        if (tombos.length) {
          return Array.from(new Set(tombos));
        }

        const candidates = ["v_exemplares_public", "exemplares_public", "v_exemplares", "exemplares"];

        for (const table of candidates) {
          const peekEx = await supabase.from(table).select("*").limit(1);
          if (peekEx.error) continue;

          const exKeys = Object.keys((peekEx.data && peekEx.data[0]) ? peekEx.data[0] : {});
          const exTombo = findCol(exKeys, ["tombo", "rotulo", "rótulo", "etiqueta", "label"]);
          const exBibRef = findCol(exKeys, ["bib_ref", "bibref", "ref", "referencia", "referência"]);
          const exBookId = findCol(exKeys, ["book_id", "livro_id", "id_livro"]);
          const exLibraryId = findCol(exKeys, ["library_id"]);
          const exLibrarySlug = findCol(exKeys, ["library_slug"]);

          if (!exTombo) continue;

          let rows = [];

          if (exBibRef) {
            let byRefQuery = supabase.from(table).select("*").eq(exBibRef, bib_ref);
            if (libraryContext?.libraryId && exLibraryId) byRefQuery = byRefQuery.eq(exLibraryId, libraryContext.libraryId);
            if (libraryContext?.librarySlug && exLibrarySlug) byRefQuery = byRefQuery.eq(exLibrarySlug, libraryContext.librarySlug);
            const byRef = await byRefQuery.limit(100);
            if (!byRef.error && byRef.data?.length) rows = byRef.data;
          }

          if (!rows.length && exBookId && bookRow?.id != null) {
            let byBookIdQuery = supabase.from(table).select("*").eq(exBookId, bookRow.id);
            if (libraryContext?.libraryId && exLibraryId) byBookIdQuery = byBookIdQuery.eq(exLibraryId, libraryContext.libraryId);
            if (libraryContext?.librarySlug && exLibrarySlug) byBookIdQuery = byBookIdQuery.eq(exLibrarySlug, libraryContext.librarySlug);
            const byBookId = await byBookIdQuery.limit(100);
            if (!byBookId.error && byBookId.data?.length) rows = byBookId.data;
          }

          if (rows.length) {
            const vals = rows.map(r => String(r?.[exTombo] || "").trim()).filter(Boolean);
            if (vals.length) return Array.from(new Set(vals));
          }
        }

        return [];
      }

      const tombos = await loadTombosForBook(data, bib_ref, libraryContext);
      const holdingsInfo = summarizeHoldings(data?.holding_libraries_json, libraryContext);
      const exemplaresCount = holdingsInfo.totalCount || tombos.length;
      document.title = `${titulo || "Livro"} - AnarBib`;
      const libraryLine = holdingsInfo.libraryLine || await getLibraryLineForBibRef(bib_ref, data, libraryContext);
      $("heroIntro").textContent = buildHeroIntro({ tipoMaterial, libraryLine, editora, ano, tombosCount: exemplaresCount });
      renderHeroHoldingsDetail(holdingsInfo);
      setPill("tomboPill", "tombo", tombos.length ? tombos.join(", ") : "", true);
      setPill("exemplaresPill", "exemplares", exemplaresCount > 1 ? String(exemplaresCount) : "");
      setPill("heroExemplaresChip", "exemplares", exemplaresCount ? String(exemplaresCount) : "");

      if (pdf) {
        $("btnAbrirPdf").style.display = "inline-flex";
        $("btnAbrirPdf").addEventListener("click", () => location.assign(pdf));
      }

      const hasDigitalAvailability = await getDigitalAvailabilityForBibRef(bib_ref, data);
      setDigitalAvailability(hasDigitalAvailability);
      await loadReaderScopedServiceChip(data, libraryContext);
      await loadSessionScopedBookState(bib_ref, libraryContext, data);

      const accessState = computeBookAccessState(data, libraryContext);
      setStatus(accessState.label, accessState.cls);
      setReserveButtonState(accessState);

      $("btnLer").addEventListener("click", async () => {
        const targetLerUrl = buildLerUrl(bib_ref, data, libraryContext);
        if (!hasDigitalAvailability) return;

        try {
          const { data: { session } } = await supabase.auth.getSession();

          if (!session?.user?.id) {
            location.assign(buildCadastroUrl(targetLerUrl));
            return;
          }

          try {
            const { error: ensureProfileError } = await supabase.rpc("fn_ensure_current_user_profile");
            if (ensureProfileError) {
              console.warn("AnarBib livro: erro ao garantir profile do usuário", ensureProfileError);
            }
          } catch (ensureProfileException) {
            console.warn("AnarBib livro: exceção ao garantir profile do usuário", ensureProfileException);
          }

          const { data: readState, error: readStateError } = await supabase.rpc(
            "fn_book_restricted_pdf_state_for_current_user",
            { p_bib_ref: bib_ref }
          );

          if (readStateError) {
            console.warn("AnarBib livro: erro na RPC de leitura restrita", readStateError);
            setStatus("Não foi possível verificar o acesso ao exemplar digital agora.", "warn");
            return;
          }

          const row = Array.isArray(readState)
            ? readState[0]
            : (readState && typeof readState === "object" ? readState : null);

          if (row?.can_show_read_button) {
            location.assign(targetLerUrl);
            return;
          }

          setStatus("O exemplar digital existe, mas a leitura está reservada a contas ativas com acesso autorizado.", "warn");
        } catch (err) {
          console.warn("AnarBib livro: falha ao verificar leitura restrita", err);
          setStatus("Não foi possível verificar o acesso ao exemplar digital agora.", "warn");
        }
      });

      $("btnReservar").addEventListener("click", () => reserve(bib_ref));
    }

    await setupContaButton();
    applyPublicServiceState();
    await loadBook();
  </script>
</body>
</html>
