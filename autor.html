<!doctype html>
<html lang="pt-BR" data-library-slug="default" data-theme-slug="default" data-library-name="AnarBib">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnarBib - Autor</title>
  <!-- build: 20260312-3 -->
  <link rel="icon" type="image/png" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="shortcut icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">
  <link rel="apple-touch-icon" href="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png">

  <link rel="stylesheet" href="./assets/css/theme-base.css">
  <script src="./assets/js/library-context.js" defer></script>
  <script src="./assets/js/theme-loader.js" defer></script>

  <style>
    :root{
      --panel:rgba(10,10,10,.90);
      --text:#f4f4f4;
      --muted:rgba(255,255,255,.78);
      --red:#7a0b14;
      --red2:#bb1e2c;
      --line:rgba(255,255,255,.12);
      --shadow:0 16px 38px rgba(0,0,0,.42);
      --ok:#4ade80;
      --warn:#fbbf24;
      --bad:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text);font-family:Inter, Segoe UI, Arial, sans-serif}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,.62), rgba(0,0,0,.62)),
        url('https://cclamazonia.noblogs.org/files/2026/03/ni-dieu-ni-maitre-une-histoire-de-lanarchisme-episodes-3-et-4-09-15-2022-1024x639-1441403844.png');
      background-size:cover;
      background-position:center center;
      background-attachment:fixed;
      background-repeat:no-repeat;
    }
    a,a:visited{color:inherit;text-decoration:none}
    .wrap{max-width:1680px;margin:0 auto;padding:24px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      height:64px;width:auto;max-width:170px;object-fit:contain;display:block;flex-shrink:0;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.35));
    }
    .btn{
      border:1px solid var(--line);
      background:rgba(12,12,12,.84);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      cursor:pointer;
      box-shadow:var(--shadow);
      font-weight:900;
      font-size:.95rem;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .btn:disabled,.btn.disabled,.btn[aria-disabled="true"]{opacity:.58;cursor:default;pointer-events:none}
    .hero{
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(135deg, rgba(122,11,20,.92), rgba(50,7,11,.94));
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .hero h1{margin:0 0 6px;font-size:1.5rem}
    .hero p{margin:0;color:rgba(255,255,255,.92)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.72);
      padding:7px 10px;
      border-radius:999px;
      font-size:.9rem;
      color:rgba(255,255,255,.86);
      flex-wrap:wrap;
      overflow-wrap:anywhere;
    }
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .card{
      border:1px solid rgba(255,255,255,.10);
      background:var(--panel);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .detail{
      display:grid;
      grid-template-columns:260px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }
    @media (max-width:820px){.detail{grid-template-columns:1fr}}
    .detail.no-photo{grid-template-columns:minmax(0,1fr)}
    .photobox{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.02);
      border-radius:18px;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:320px;
    }
    .photobox.empty{display:none}
    .photoimg{
      width:100%;
      max-width:220px;
      height:auto;
      max-height:340px;
      object-fit:contain;
      display:block;
      border-radius:12px;
      box-shadow:var(--shadow);
    }
    .contentbox{min-width:0}
    .section-title{margin:0 0 12px;font-size:1.05rem;color:#fff}
    .mini{font-size:.86rem;color:var(--muted)}
    .subtle{opacity:.92}
    .status{margin-top:10px;font-size:.92rem;min-height:1.2em}
    .status.ok{color:var(--ok)} .status.warn{color:var(--warn)} .status.bad{color:var(--bad)}
    .sep{height:1px;background:rgba(255,255,255,.10);margin:14px 0}
    .bio{
      white-space:pre-wrap;
      line-height:1.62;
      width:100%;
      max-width:none;
      color:var(--muted);
    }
    .books{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:12px;
    }
    .book-card{
      display:flex;
      flex-direction:column;
      gap:8px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
      border-radius:16px;
      padding:12px;
      text-decoration:none;
      transition:transform .12s ease, border-color .12s ease, background .12s ease;
      min-height:140px;
      box-shadow:0 10px 24px rgba(0,0,0,.20);
    }
    .book-card:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.22);
      background:rgba(179,0,24,.12);
    }
    .book-title{font-weight:800;line-height:1.25;color:#fff}
    .book-subtitle{
      color:var(--muted);
      font-style:italic;
      font-size:.95rem;
      line-height:1.3;
    }
    .book-meta{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.35;
    }
    .empty-note{
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.18);
      border-radius:16px;
      padding:14px;
      background:rgba(255,255,255,.02);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img data-brand-logo class="logo"
             src="https://cclamazonia.noblogs.org/files/2026/03/AnarBib_logo.png"
             alt="AnarBib" />
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" id="btnCatalogo" href="#" rel="noopener">Voltar ao catálogo</a>
        <button class="btn" id="btnConta" type="button" aria-disabled="true" title="Disponível apenas quando logado(a/e).">Painel / minha conta</button>
        <a class="btn primary" id="btnEntrar" href="#" rel="noopener">Entrar</a>
      </div>
    </div>

    <div class="hero">
      <h1 id="nameLine">Carregando…</h1>
      <p id="heroIntro">Carregando dados do autor…</p>
      <div class="chips">
        <div class="chip" id="yearsPill" style="display:none"></div>
        <div class="chip" id="countryPill" style="display:none"></div>
        <div class="chip" id="booksCountPill" style="display:none"></div>
        <div class="chip" id="viafPill" style="display:none"></div>
        <div class="chip" id="isniPill" style="display:none"></div>
        <div class="chip" id="wikidataPill" style="display:none"></div>
        <div class="chip" id="sourcePill" style="display:none"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="detail">
          <div class="photobox empty" id="photoBox">
            <img class="photoimg" id="photoImg" alt="Foto do autor" />
          </div>

          <div class="contentbox">
            <div class="mini subtle" id="sortLine" style="display:none"></div>
            <div class="section-title" style="margin-top:0">Biografia e notas</div>
            <div class="bio" id="bioLine">—</div>
            <div class="status" id="status"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Livros no catálogo</h2>
        <div id="booksList" class="books"></div>
        <div id="booksEmpty" class="empty-note" style="display:none">Nenhum livro publicado foi encontrado para este autor.</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./js/blmf-supabase.js";

    const GH_BASE = location.origin;
    const ROUTES = {
      BLOG_HOME: "https://cclamazonia.noblogs.org/",
      CATALOGO: `${GH_BASE}/anarbib-staging/index.html`,
      CADASTRO: `${GH_BASE}/anarbib-conta-staging/cadastro.html`,
      CONTA: `${GH_BASE}/anarbib-conta-staging/conta.html`,
      LIVRO: `${GH_BASE}/anarbib-staging/livro.html`,
      PAINEL: new URL("painel.html", `${GH_BASE}/anarbib-conta-staging/conta.html`).href,
    };

    function buildCadastroUrl(nextUrl = location.href) {
      const u = new URL(ROUTES.CADASTRO);
      u.searchParams.set("next", nextUrl);
      return u.toString();
    }

    function getReturnUrlFromQuery() {
      try {
        const raw = new URL(location.href).searchParams.get("return_to");
        if (!raw) return ROUTES.CATALOGO;
        const fallback = new URL(ROUTES.CATALOGO, location.origin);
        const candidate = new URL(raw, location.origin);
        if (candidate.origin !== fallback.origin) return ROUTES.CATALOGO;
        if (candidate.pathname !== fallback.pathname) return ROUTES.CATALOGO;
        return candidate.toString();
      } catch (_) {
        return ROUTES.CATALOGO;
      }
    }

    function getBookReturnUrlFromQuery() {
      try {
        const raw = new URL(location.href).searchParams.get("book_return_to");
        if (!raw) return "";
        const fallback = new URL(ROUTES.LIVRO, location.origin);
        const candidate = new URL(raw, location.origin);
        if (candidate.origin !== fallback.origin) return "";
        if (candidate.pathname !== fallback.pathname) return "";
        return candidate.toString();
      } catch (_) {
        return "";
      }
    }

    document.getElementById("btnCatalogo").href = getReturnUrlFromQuery();
    document.getElementById("btnEntrar").href = buildCadastroUrl(location.href);

    const SUPABASE_URL = "https://uflwmikiyjfnikiphtcp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_KJBytsICkVClr8iG26b0CQ_BxsVQooZ";

    const AUTHOR_BUILD = "20260313-1";
    const EXTERNAL_AUTHOR_PHOTOS_BASE_URLS = [
      "https://asptfmokzykwzlshsncw.supabase.co/storage/v1/object/public/authors",
      "https://asptfmokzykwzlshsncw.supabase.co/storage/v1/object/public/covers/authors"
    ];
    document.documentElement.setAttribute("data-author-build", AUTHOR_BUILD);

    const $ = (id) => document.getElementById(id);

    function buildExternalAuthorPhotoUrls(pathOrUrl) {
      const raw = String(pathOrUrl || "").trim();
      if (!raw) return [];
      if (/^https?:\/\//i.test(raw)) return [raw];
      const clean = raw.replace(/^\/+/, "");
      const variants = uniqueStrings([
        clean,
        clean.replace(/^authors\/+?/i, ""),
        clean.replace(/^autor\/+?/i, "")
      ]);
      return uniqueStrings(
        EXTERNAL_AUTHOR_PHOTOS_BASE_URLS.flatMap(base => variants.map(variant => `${base}/${variant}`))
      );
    }

    function setStatus(msg, cls) {
      const el = $("status");
      el.className = "status" + (cls ? " " + cls : "");
      el.textContent = msg || "";
    }

    function setPill(id, label, value, showDash = false) {
      const el = $(id);
      if (!el) return;

      const txt = String(value ?? "").trim();
      if (!txt) {
        if (showDash) {
          el.style.display = "inline-flex";
          el.textContent = `${label}: —`;
        } else {
          el.style.display = "none";
          el.textContent = "";
        }
        return;
      }

      el.style.display = "inline-flex";
      el.textContent = `${label}: ${txt}`;
    }

    function setLine(id, value) {
      const el = $(id);
      if (!el) return;
      const txt = String(value ?? "").trim();
      el.textContent = txt;
      el.style.display = txt ? "" : "none";
    }

    function getUrlBits() {
      const u = new URL(location.href);
      const rawId = (u.searchParams.get("id") || u.searchParams.get("author_id") || "").trim();
      const parsedId = Number(rawId);
      const authorId = Number.isFinite(parsedId) && parsedId > 0 ? parsedId : null;
      const authorName = (
        u.searchParams.get("author")
        || u.searchParams.get("name")
        || u.searchParams.get("autor")
        || u.searchParams.get("preferred_name")
        || u.searchParams.get("sort_name")
        || ""
      ).trim() || null;
      const libraryId = (u.searchParams.get("library_id") || "").trim() || null;
      const librarySlug = (u.searchParams.get("library_slug") || "").trim() || null;
      const libraryName = (u.searchParams.get("library_name") || "").trim() || null;
      return { authorId, authorName, libraryId, librarySlug, libraryName };
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function buildNameVariants(name) {
      const txt = String(name || "").trim();
      if (!txt) return [];
      const out = new Set([txt]);
      if (txt.includes(",")) {
        const bits = txt.split(",").map(v => v.trim()).filter(Boolean);
        if (bits.length >= 2) out.add(bits.slice(1).join(" ") + " " + bits[0]);
      } else {
        const bits = txt.split(/\s+/).filter(Boolean);
        if (bits.length >= 2) {
          const last = bits[bits.length - 1];
          const firsts = bits.slice(0, -1).join(" ");
          out.add(`${last}, ${firsts}`);
        }
      }
      return [...out];
    }

    function yearsLabel(birth, death) {
      const hasBirth = birth !== null && birth !== undefined && String(birth).trim() !== "" && String(birth).trim().toLowerCase() !== "null";
      const hasDeath = death !== null && death !== undefined && String(death).trim() !== "" && String(death).trim().toLowerCase() !== "null";
      const b = hasBirth ? String(birth).trim() : "";
      const d = hasDeath ? String(death).trim() : "";
      if (b && d) return `${b}–${d}`;
      if (b && !d) return `${b} /`;
      if (!b && d) return `/ ${d}`;
      if (!b && !d) return "/";
      return "";
    }

    function buildHeroIntro(author, booksCount) {
      const parts = [];
      if (author?.country) parts.push(String(author.country).trim());
      if (Number.isFinite(Number(booksCount))) {
        const n = Number(booksCount);
        parts.push(`${n} ${n === 1 ? "livro ligado" : "livros ligados"}`);
      }
      const sourceLabel = [author?.source_kind || "", author?.source_label || ""].filter(Boolean).join(" · ");
      if (sourceLabel) parts.push(sourceLabel);
      return parts.join(" · ") || "Página pública de autor/a do catálogo AnarBib.";
    }

    function uniqueStrings(values) {
      return [...new Set((values || []).map(v => String(v || "").trim()).filter(Boolean))];
    }

    function buildLivroHref(row, ctx = {}) {
      const url = new URL(ROUTES.LIVRO, location.href);
      const originBookReturnUrl = getBookReturnUrlFromQuery();
      url.searchParams.set("ref", String(row?.bib_ref || "").trim());
      if (ctx.libraryId) url.searchParams.set("library_id", ctx.libraryId);
      if (ctx.librarySlug) url.searchParams.set("library_slug", ctx.librarySlug);
      if (ctx.libraryName) url.searchParams.set("library_name", ctx.libraryName);
      url.searchParams.set("return_to", getReturnUrlFromQuery());
      url.searchParams.set("author_return_to", location.href);
      if (originBookReturnUrl) url.searchParams.set("book_return_to", originBookReturnUrl);
      return url.toString();
    }

    function buildPhotoCandidates(pathOrUrl) {
      return buildExternalAuthorPhotoUrls(pathOrUrl);
    }

    function tryLoadImage(img, box, candidates, idx = 0) {
      const detail = box.closest(".detail");
      if (!candidates.length || idx >= candidates.length) {
        box.classList.add("empty");
        detail?.classList.add("no-photo");
        img.removeAttribute("src");
        img.onerror = null;
        return;
      }
      img.onerror = () => tryLoadImage(img, box, candidates, idx + 1);
      img.onload = () => {
        img.onerror = null;
        box.classList.remove("empty");
        detail?.classList.remove("no-photo");
      };
      img.src = candidates[idx];
    }

    function setPhoto(pathOrUrl) {
      const box = $("photoBox");
      const img = $("photoImg");
      const detail = box.closest(".detail");
      const candidates = buildPhotoCandidates(pathOrUrl);
      if (!candidates.length) {
        box.classList.add("empty");
        detail?.classList.add("no-photo");
        img.removeAttribute("src");
        img.onerror = null;
        return;
      }
      tryLoadImage(img, box, candidates, 0);
    }

    async function fetchRest(path) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            Accept: "application/json"
          },
          cache: "no-store"
        });
        if (!res.ok) return [];
        const text = await res.text();
        return text ? JSON.parse(text) : [];
      } catch (_) {
        return [];
      }
    }

    async function fetchViewOneById(viewName, idValue) {
      try {
        const { data, error } = await supabase
          .from(viewName)
          .select("*")
          .eq("id", idValue)
          .limit(1)
          .maybeSingle();
        if (!error && data) return data;
      } catch (_) {}
      return null;
    }

    async function fetchViewManyByAuthorId(viewName, idValue) {
      try {
        const { data, error } = await supabase
          .from(viewName)
          .select("*")
          .eq("author_id", idValue)
          .order("ord", { ascending: true })
          .order("titulo", { ascending: true });
        if (!error && Array.isArray(data)) return data;
      } catch (_) {}
      return [];
    }

    async function fetchAuthorDetailById(authorId) {
      if (!authorId) return null;

      try {
        const { data, error } = await supabase
          .from("author_detail_public")
          .select("*")
          .eq("id", authorId)
          .limit(1)
          .maybeSingle();
        if (!error && data) return data;
      } catch (_) {}

      const rows = await fetchRest(`author_detail_public?select=*&id=eq.${encodeURIComponent(authorId)}&limit=1`);
      return rows[0] || null;
    }

    async function fetchAuthorBooksById(authorId, author) {
      if (author && Array.isArray(author.books_json) && author.books_json.length) {
        return author.books_json;
      }
      if (!authorId) return [];

      let rows = await fetchViewManyByAuthorId("author_books_public", authorId);
      if (Array.isArray(rows) && rows.length) return rows;

      rows = await fetchRest(`author_books_public?select=*&author_id=eq.${encodeURIComponent(authorId)}&order=ord.asc,titulo.asc`);
      return Array.isArray(rows) ? rows : [];
    }

    function sortBooks(rows) {
      const seen = new Set();
      return [...(rows || [])]
        .filter(row => {
          const key = String(row?.book_id || row?.bib_ref || "").trim();
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => {
          const ao = Number.isFinite(Number(a?.ord)) ? Number(a.ord) : 9999;
          const bo = Number.isFinite(Number(b?.ord)) ? Number(b.ord) : 9999;
          if (ao !== bo) return ao - bo;
          const at = String(a?.titulo || "").localeCompare(String(b?.titulo || ""), "pt-BR", { sensitivity: "base" });
          if (at !== 0) return at;
          return String(a?.bib_ref || "").localeCompare(String(b?.bib_ref || ""), "pt-BR", { sensitivity: "base" });
        });
    }

    function renderBooks(books, ctx = {}) {
      const list = $("booksList");
      const empty = $("booksEmpty");
      list.innerHTML = "";
      if (!books.length) {
        empty.style.display = "";
        return;
      }
      empty.style.display = "none";
      for (const row of books) {
        const a = document.createElement("a");
        a.className = "book-card";
        a.href = buildLivroHref(row, ctx);

        const title = document.createElement("div");
        title.className = "book-title";
        title.textContent = row.titulo || "Sem título";

        const subtitle = document.createElement("div");
        subtitle.className = "book-subtitle";
        const sub = String(row.subtitulo || "").trim();
        if (sub) subtitle.textContent = sub;
        else subtitle.style.display = "none";

        const meta1 = document.createElement("div");
        meta1.className = "book-meta";
        meta1.textContent = [
          row.bib_ref ? `ref: ${row.bib_ref}` : "",
          row.ano ? `ano: ${row.ano}` : "",
        ].filter(Boolean).join(" · ") || "—";

        const meta2 = document.createElement("div");
        meta2.className = "book-meta";
        meta2.textContent = [row.editora || "", row.role ? `função: ${row.role}` : ""].filter(Boolean).join(" · ") || "";

        a.append(title, subtitle, meta1, meta2);
        list.appendChild(a);
      }
    }

    async function setupContaButton() {

      const btnConta = $("btnConta");
      const btnEntrar = $("btnEntrar");
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user?.id) {
        let isLibrarian = false;
        try {
          const { data } = await supabase
            .from("profiles")
            .select("is_librarian")
            .eq("id", session.user.id)
            .maybeSingle();
          isLibrarian = !!data?.is_librarian;
        } catch (_) {}

        const targetHref = isLibrarian ? ROUTES.PAINEL : ROUTES.CONTA;
        btnConta.textContent = isLibrarian ? "Painel" : "Minha conta";
        btnConta.setAttribute("aria-disabled", "false");
        btnConta.title = isLibrarian ? "Abrir painel" : "Abrir minha conta";
        btnConta.onclick = () => location.assign(targetHref);

        btnEntrar.setAttribute("aria-disabled", "false");
        btnEntrar.classList.remove("disabled");
        btnEntrar.textContent = "Logout";
        btnEntrar.title = "Sair";
        btnEntrar.removeAttribute("href");
        btnEntrar.onclick = async (e) => {
          e.preventDefault();
          try {
            await supabase.auth.signOut();
          } catch (_) {}
          location.assign(location.pathname + location.search + location.hash);
        };
      } else {
        btnConta.textContent = "Painel / minha conta";
        btnConta.setAttribute("aria-disabled", "true");
        btnConta.title = "Disponível apenas quando logado(a/e).";
        btnConta.onclick = (e) => e.preventDefault();

        btnEntrar.setAttribute("aria-disabled", "false");
        btnEntrar.classList.remove("disabled");
        btnEntrar.textContent = "Entrar";
        btnEntrar.title = "Entrar";
        btnEntrar.onclick = null;
        btnEntrar.href = buildCadastroUrl(location.href);
      }
    }

    async function loadAuthor() {
      const { authorId, libraryId, librarySlug, libraryName } = getUrlBits();

      if (!authorId) {
        $("nameLine").textContent = "Autor não encontrado";
        $("heroIntro").textContent = "Faltou um id válido de autor na URL.";
        $("bioLine").textContent = "Abra esta página a partir de um chip de autor clicável no catálogo ou na ficha do livro.";
        setPhoto("");
        document.title = "AnarBib - Autor";
        setStatus("Abra esta página a partir de um chip de autor clicável no catálogo ou na ficha do livro.", "warn");
        $("booksEmpty").style.display = "";
        return;
      }

      const author = await fetchAuthorDetailById(authorId);

      if (!author) {
        $("nameLine").textContent = "Autor não encontrado";
        $("heroIntro").textContent = "Não encontrei este autor na superfície pública author_detail_public.";
        $("bioLine").textContent = "Confira o link de origem ou volte ao catálogo para tentar de novo.";
        setPhoto("");
        document.title = "AnarBib - Autor não encontrado";
        setStatus("Autor não encontrado.", "warn");
        $("booksEmpty").style.display = "";
        return;
      }

      const books = sortBooks(await fetchAuthorBooksById(author.id || author.author_id, author));

      const displayName = author.preferred_name || author.sort_name || "Sem nome";
      const secondaryName = [author.sort_name, author.preferred_name]
        .map(v => String(v || "").trim())
        .find(v => v && v !== displayName) || "";

      $("nameLine").textContent = displayName;
      $("heroIntro").textContent = buildHeroIntro(author, books.length);
      setLine("sortLine", secondaryName);
      $("bioLine").textContent = String(author.biography || author.notes || "—").trim() || "—";

      setPill("yearsPill", "nascimento - falecimento", yearsLabel(author.birth_year, author.death_year));
      $("countryPill").style.display = "none";
      $("countryPill").textContent = "";
      $("booksCountPill").style.display = "none";
      $("booksCountPill").textContent = "";
      setPill("viafPill", "VIAF", author.viaf_id || "");
      setPill("isniPill", "ISNI", author.isni || "");
      setPill("wikidataPill", "Wikidata", author.wikidata_id || "");
      const sourceLabel = [author.source_kind || "", author.source_label || ""].filter(Boolean).join(" · ");
      setPill("sourcePill", "fonte", sourceLabel);

      setPhoto(author.photo_object_path || "");
      renderBooks(books || [], { libraryId, librarySlug, libraryName });
      setStatus("", "");
      document.title = `${author.preferred_name || author.sort_name || "Autor"} - AnarBib`;
    }

    await setupContaButton();
    await loadAuthor();
  </script>
</body>
</html>
